\n    <button class=\"nav-tab\" onclick=\"switchTab('export',this)\" role=\"tab\" aria-selected=\"false\">Export<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"topbar-actions\">\n    <!-- All desktop actions live in the right-rail (sidebar) now.\n         Topbar keeps only the mobile menu button on small screens. -->\n    <button class=\"top-btn mobile-only\" id=\"mobileMenuBtn\" onclick=\"toggleMobileMenu(event)\" title=\"Menu\" aria-haspopup=\"true\" aria-label=\"Open menu\"><span class=\"btn-icon\" aria-hidden=\"true\">⋯<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"mobile-menu\" id=\"mobileMenu\">\n    <button class=\"mm-item\" onclick=\"closeMobileMenu();toggleGlobalLock()\">\n      <span class=\"mm-icon\" id=\"mmLockIcon\">🔓<\u002Fspan> <span id=\"mmLockLabel\">Lock to edit<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"mm-item\" onclick=\"closeMobileMenu();toggleTheme()\">\n      <span class=\"mm-icon\" id=\"mmThemeIcon\">🌙<\u002Fspan> <span>Toggle dark mode<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"mm-item\" onclick=\"closeMobileMenu();refreshFromCloud()\">\n      <span class=\"mm-icon\">⟳<\u002Fspan> <span>Refresh from cloud<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"mm-item\" onclick=\"closeMobileMenu();toggleSidebar()\">\n      <span class=\"mm-icon\">📅<\u002Fspan> <span>Weekly Versions<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"mm-item\" onclick=\"closeMobileMenu();_openImportModal()\">\n      <span class=\"mm-icon\">⬆<\u002Fspan> <span>Import JSON<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ RIGHT RAIL — global vertical action toolbar (desktop only) ════ -->\n<aside class=\"right-rail\" role=\"toolbar\" aria-label=\"Dashboard actions\">\n  <div id=\"rrSync\" class=\"rr-sync\" role=\"status\" aria-live=\"polite\"><span class=\"rr-sync-dot\"><\u002Fspan><span id=\"rrSyncTxt\">…<\u002Fspan><\u002Fdiv>\n  <hr class=\"rr-divider\">\n  <button class=\"rr-btn\" id=\"rrLockBtn\" data-tip=\"Lock to edit\" onclick=\"toggleGlobalLock()\" aria-label=\"Lock the dashboard for editing\">🔓<\u002Fbutton>\n  <button class=\"rr-btn\" id=\"rrThemeBtn\" data-tip=\"Toggle dark mode\" onclick=\"toggleTheme()\" aria-label=\"Toggle dark mode\">🌙<\u002Fbutton>\n  <button class=\"rr-btn\" data-tip=\"Refresh from cloud\" onclick=\"refreshFromCloud()\" aria-label=\"Refresh data from cloud\">⟳<\u002Fbutton>\n  <button class=\"rr-btn\" id=\"rrVersionsBtn\" data-tip=\"Weekly Versions\" onclick=\"toggleSidebar()\" aria-label=\"Toggle weekly version history\">📅<span class=\"rr-badge\" id=\"rrBadge\">0<\u002Fspan><\u002Fbutton>\n  <button class=\"rr-btn\" data-tip=\"Import JSON\" onclick=\"_openImportModal()\" aria-label=\"Import data from JSON\">⬆<\u002Fbutton>\n<\u002Faside>\n\n<!-- ══ LOADING OVERLAY ════════════════════════════════════════ -->\n<div id=\"loadingOverlay\" style=\"\n  position:fixed;inset:0;background:rgba(255,255,255,0.92);\n  z-index:9000;display:flex;flex-direction:column;\n  align-items:center;justify-content:center;gap:16px;\n  backdrop-filter:blur(3px)\">\n  <div style=\"width:44px;height:44px;border:4px solid var(--gray-10);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite\"><\u002Fdiv>\n  <div style=\"font-size:14px;color:var(--gray-50);font-weight:600\">Loading team data…<\u002Fdiv>\n  <div style=\"font-size:11px;color:var(--gray-30)\" id=\"loadingMsg\">Connecting to shared database<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ VERSION SIDEBAR ══════════════════════════════════════ -->\n<div class=\"vsidebar\" id=\"vSidebar\">\n  <div class=\"vsb-hdr\">\n    <div class=\"vsb-title\">📅 Weekly History<\u002Fdiv>\n    <button class=\"vsb-close\" onclick=\"toggleSidebar()\" title=\"Close\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"vsb-save-wrap\">\n    <button class=\"vsb-save-btn\" onclick=\"saveWeeklyVersion()\">\n      💾 Save This Week's Snapshot\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"vsb-count\" id=\"vsbCount\">No snapshots yet<\u002Fdiv>\n  <div class=\"vsb-list\" id=\"versionList\">\n    <div class=\"vsb-empty\"><strong>No snapshots yet<\u002Fstrong>Click \"Save This Week's Snapshot\" after your weekly call to create the first version.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"vsb-footer\" id=\"vsbFooter\" style=\"padding:10px 14px;border-top:1px solid rgba(255,255,255,0.07);font-size:10.5px;color:rgba(255,255,255,0.5);text-align:center\">\n    <div id=\"vsbStorageInfo\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"wrap\" id=\"mainWrap\" role=\"main\"><a id=\"main-content\" tabindex=\"-1\"><\u002Fa>\n\n<!-- ════ EDIT-MODE BAR — view vs. edit status + how to edit ════ -->\n<div class=\"mode-bar-dock\">\n<div class=\"mode-bar mb-view\" id=\"modeBar\" role=\"status\" aria-live=\"polite\">\n  <span class=\"mb-ico\" id=\"mbIco\" aria-hidden=\"true\">👁<\u002Fspan>\n  <span class=\"mb-text\" id=\"mbText\">\n    <b>View mode<\u002Fb>\n    <span class=\"mb-sub\" id=\"mbSub\">The dashboard is locked so only one person edits at a time. Click “Lock to edit” to make changes.<\u002Fspan>\n  <\u002Fspan>\n  <span class=\"mb-sync\" id=\"mbSync\"><\u002Fspan>\n  <button class=\"mb-btn\" id=\"mbBtn\" onclick=\"toggleGlobalLock()\">🔓 Lock to edit<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- ════ OVERVIEW ════════════════════════════════════════════ -->\n<div class=\"tab-pane active\" id=\"tab-overview\">\n  <div class=\"pg-hdr\">\n    <div class=\"pg-title\">Team Dashboard<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TEAM STATS SPLIT: Counts | Health -->\n  <div class=\"health-split\">\n    <div id=\"healthBar\" class=\"health-bar\"><\u002Fdiv>\n    <div id=\"healthStatus\" class=\"health-status\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- UTILIZATION CARDS -->\n  <div class=\"sec-label\">Team Utilization<\u002Fdiv>\n  <div class=\"util-grid\" id=\"utilGrid\"><\u002Fdiv>\n\n  <!-- UTILIZATION CHART + BLOCKERS side by side -->\n  <div class=\"dash-two-col\" style=\"margin-bottom:28px\">\n    <div class=\"card\" style=\"padding:20px\">\n      <div class=\"chart-hdr\">\n        <div class=\"card-inner-title\" style=\"margin-bottom:0\">📊 Team Utilization Overview<\u002Fdiv>\n        <div class=\"chart-view-switch\" role=\"tablist\">\n          <button class=\"cvs-btn active\" data-view=\"bar\" onclick=\"setChartView('bar',this)\" title=\"Bar chart\">📊<\u002Fbutton>\n          <button class=\"cvs-btn\" data-view=\"donut\" onclick=\"setChartView('donut',this)\" title=\"Donut chart\">🍩<\u002Fbutton>\n          <button class=\"cvs-btn\" data-view=\"pie\" onclick=\"setChartView('pie',this)\" title=\"Pie chart\">🥧<\u002Fbutton>\n          <button class=\"cvs-btn\" data-view=\"hbar\" onclick=\"setChartView('hbar',this)\" title=\"Horizontal bars\">📶<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <canvas id=\"utilChart\" height=\"220\"><\u002Fcanvas>\n      <div id=\"chartDrilldown\" class=\"chart-drilldown\" aria-live=\"polite\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:0;overflow:hidden\">\n      <div class=\"card-hdr\">\n        <div class=\"card-hdr-title\">🔴 On-Hold Tasks<\u002Fdiv>\n        <span id=\"blockerCount\" style=\"font-size:11px;color:var(--hold-c);font-weight:700\"><\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"blockerList\" style=\"max-height:240px;overflow-y:auto\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- OVERDUE + HIGH PRIORITY side by side -->\n  <div class=\"dash-two-col\" style=\"margin-bottom:28px\">\n    <div class=\"card\" style=\"padding:0;overflow:hidden\">\n      <div class=\"card-hdr\">\n        <div class=\"card-hdr-title\">📅 Overdue Tasks<\u002Fdiv>\n        <span id=\"overdueCount\" style=\"font-size:11px;color:var(--hold-c);font-weight:700\"><\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"overdueList\" style=\"max-height:220px;overflow-y:auto\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:0;overflow:hidden\">\n      <div class=\"card-hdr\">\n        <div class=\"card-hdr-title\">🔥 High Priority Tasks<\u002Fdiv>\n        <span id=\"prioCount\" style=\"font-size:11px;color:var(--prio-c);font-weight:700\"><\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"prioList\" style=\"max-height:220px;overflow-y:auto\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WEEKLY MEETING PREP -->\n  <div class=\"sec-label\">Weekly Meeting Prep<\u002Fdiv>\n  <div class=\"card\" style=\"overflow:hidden;margin-bottom:28px\">\n    <div class=\"card-hdr\">\n      <div class=\"card-hdr-title\">📋 Auto-Generated Meeting Summary<\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <button class=\"icon-btn\" onclick=\"copyMeetingSummary()\" title=\"Copy to clipboard\">📋 Copy<\u002Fbutton>\n        <button class=\"icon-btn\" onclick=\"renderOverviewWidgets()\" title=\"Refresh\">⟳ Refresh<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"meetingSummary\" style=\"padding:18px;font-size:12px;line-height:1.8;color:var(--gray-70);max-height:360px;overflow-y:auto\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- POLICIES -->\n  <div class=\"sec-label\">Standing Policies<\u002Fdiv>\n  <div class=\"policy-list\" id=\"policyWrap\">\n    <div id=\"policyList\"><\u002Fdiv>\n    <button class=\"add-policy-btn\" onclick=\"openAddPolicy()\">＋ Add Policy<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════ TASKS ════════════════════════════════════════════════ -->\n<div class=\"tab-pane\" id=\"tab-tasks\">\n  <div class=\"pg-hdr\">\n    <div class=\"pg-title\">Task Tracker<\u002Fdiv>\n    <div class=\"pg-sub\">Click status badge to cycle · hover rows for actions · 🔥 marks high priority<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"search-bar\">\n    <input class=\"search-input\" id=\"searchInput\" placeholder=\"Search tasks, projects, notes…  ( press / )\" oninput=\"onInputSearch()\" onkeydown=\"if(event.key==='Escape'){clearTaskFilters();this.blur();}\">\n    <select class=\"filter-select\" id=\"filterStatus\" onchange=\"renderTasks()\">\n      <option value=\"\">All Statuses<\u002Foption>\n      <option value=\"done\">✅ Done<\u002Foption>\n      <option value=\"prog\">🔄 In Progress<\u002Foption>\n      <option value=\"wait\">⏳ Waiting<\u002Foption>\n      <option value=\"hold\">🔴 On Hold<\u002Foption>\n      <option value=\"none\">⬜ Not Started<\u002Foption>\n    <\u002Fselect>\n    <select class=\"filter-select\" id=\"filterEng\" onchange=\"renderTasks()\">\n      <option value=\"\">All Engineers<\u002Foption>\n    <\u002Fselect>\n    <select class=\"filter-select\" id=\"filterPrio\" onchange=\"renderTasks()\">\n      <option value=\"\">All Priorities<\u002Foption>\n      <option value=\"high\">🔥 High Priority Only<\u002Foption>\n    <\u002Fselect>\n    <button class=\"search-clear\" id=\"searchClear\" onclick=\"clearTaskFilters()\" title=\"Clear search &amp; filters\" style=\"display:none\">✕ Clear<\u002Fbutton>\n    <span class=\"search-count\" id=\"searchCount\" aria-live=\"polite\"><\u002Fspan>\n    <div class=\"search-bar-spacer\"><\u002Fdiv>\n    <button class=\"toolbar-btn\" onclick=\"expandAllSections()\" title=\"Expand all engineer sections\">\n      <span class=\"btn-icon\">▾<\u002Fspan><span class=\"btn-label\">Expand all<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"toolbar-btn\" onclick=\"collapseAllSections()\" title=\"Collapse all engineer sections\">\n      <span class=\"btn-icon\">▴<\u002Fspan><span class=\"btn-label\">Collapse all<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"legend\">\n    <div class=\"legend-item\"><div class=\"ldot\" style=\"background:var(--done-c)\"><\u002Fdiv>Done<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"ldot\" style=\"background:var(--prog-c)\"><\u002Fdiv>In Progress<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"ldot\" style=\"background:var(--wait-c)\"><\u002Fdiv>Waiting<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"ldot\" style=\"background:var(--hold-c)\"><\u002Fdiv>Blocked<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"ldot\" style=\"background:var(--gray-30)\"><\u002Fdiv>Not Started<\u002Fdiv>\n    <div class=\"legend-prio\">🔥 High Priority<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"taskSections\"><\u002Fdiv>\n  <div style=\"text-align:center;padding:16px\">\n    <button class=\"add-task-btn\" onclick=\"openAddEngineer()\" style=\"border:2px dashed var(--gray-10);padding:10px 24px;border-radius:4px;color:var(--gray-30)\">\n      ＋ Add Engineer\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════ REFERENCES ═══════════════════════════════════════════ -->\n<div class=\"tab-pane\" id=\"tab-references\">\n  <div class=\"pg-hdr\">\n    <div class=\"pg-title\">References<\u002Fdiv>\n    <div class=\"pg-sub\">Organize links, codes, contacts, or any custom reference section your team needs<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:flex-end;margin-bottom:14px\">\n    <button class=\"btn btn-save\" onclick=\"openAddSection()\">＋ Add New Section<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"ref-grid\" id=\"refSectionsGrid\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════ CHANGELOG ═══════════════════════════════════════════ -->\n<div class=\"tab-pane\" id=\"tab-changelog\">\n  <div class=\"pg-hdr\">\n    <div class=\"pg-title\">Changelog<\u002Fdiv>\n    <div class=\"pg-sub\">Audit trail of all edits. Shows who changed what and when. Kept for the last 500 actions.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"cl-toolbar\">\n    <div class=\"cl-user\">\n      <span class=\"cl-user-label\">Logged as:<\u002Fspan>\n      <button class=\"cl-user-chip\" id=\"cl-user-chip\" onclick=\"handleUserChipClick(event)\" title=\"Click to change name · Shift+click to re-open welcome modal\">\n        <span id=\"cl-user-name\">Unknown<\u002Fspan>\n        <span class=\"cl-user-edit\">✎<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <input class=\"search-input cl-search\" id=\"cl-search\" placeholder=\"Search changelog…\" oninput=\"renderChangelog()\" style=\"max-width:260px\">\n    <select class=\"filter-select cl-filter\" id=\"cl-filter-entity\" onchange=\"renderChangelog()\">\n      <option value=\"\">All types<\u002Foption>\n      <option value=\"task\">Tasks<\u002Foption>\n      <option value=\"engineer\">Engineers<\u002Foption>\n      <option value=\"reference\">References<\u002Foption>\n      <option value=\"policy\">Policies<\u002Foption>\n      <option value=\"link\">Links<\u002Foption>\n      <option value=\"code\">Codes<\u002Foption>\n      <option value=\"system\">System<\u002Foption>\n    <\u002Fselect>\n    <select class=\"filter-select cl-filter\" id=\"cl-filter-action\" onchange=\"renderChangelog()\">\n      <option value=\"\">All actions<\u002Foption>\n      <option value=\"create\">Created<\u002Foption>\n      <option value=\"update\">Updated<\u002Foption>\n      <option value=\"delete\">Deleted<\u002Foption>\n      <option value=\"import\">Imported<\u002Foption>\n      <option value=\"revert\">Reverted<\u002Foption>\n    <\u002Fselect>\n    <div class=\"search-bar-spacer\"><\u002Fdiv>\n    <button class=\"toolbar-btn\" onclick=\"exportChangelogCsv()\" title=\"Download changelog as CSV\">\n      <span class=\"btn-icon\">⬇<\u002Fspan><span class=\"btn-label\">Export CSV<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"toolbar-btn\" onclick=\"clearChangelogConfirm()\" title=\"Clear entire changelog\">\n      <span class=\"btn-icon\" style=\"color:var(--hold-c)\">✕<\u002Fspan><span class=\"btn-label\">Clear<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"cl-list\" class=\"cl-list\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════ EXPORT ═══════════════════════════════════════════════ -->\n<div class=\"tab-pane\" id=\"tab-export\">\n  <div class=\"pg-hdr\">\n    <div class=\"pg-title\">Export<\u002Fdiv>\n    <div class=\"pg-sub\">Multiple formats — PDF for distribution, Excel for analysis, OneNote text for pasting, JSON for backup<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec-label\">📄 PDF Export<\u002Fdiv>\n  <div class=\"export-area\" style=\"padding:16px\">\n    <div style=\"font-size:12px;color:var(--gray-50);margin-bottom:10px\">\n      Generates a print-ready snapshot of the current tracker state. Opens the print dialog — choose <b>\"Save as PDF\"<\u002Fb> as the destination.\n    <\u002Fdiv>\n    <div class=\"export-btns\">\n      <button class=\"btn btn-save\" onclick=\"exportPDF()\">📄 Export as PDF<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec-label\">📊 Excel Export<\u002Fdiv>\n  <div class=\"export-area\" style=\"padding:16px\">\n    <div style=\"font-size:12px;color:var(--gray-50);margin-bottom:10px\">\n      Downloads an <b>.xlsx<\u002Fb> file with three sheets: <b>Tasks<\u002Fb> (full task list), <b>Utilization<\u002Fb> (per-engineer summary), and <b>References<\u002Fb> (all reference sections).\n    <\u002Fdiv>\n    <div class=\"export-btns\">\n      <button class=\"btn btn-save\" onclick=\"exportExcel()\">📊 Export as Excel (.xlsx)<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec-label\">📝 OneNote / Plain Text<\u002Fdiv>\n  <div class=\"export-area\">\n    <textarea class=\"export-textarea\" id=\"oneNoteOut\" readonly=\"\"><\u002Ftextarea>\n    <div class=\"export-btns\">\n      <button class=\"btn btn-save\" onclick=\"generateOneNote()\">⟳ Refresh<\u002Fbutton>\n      <button class=\"btn btn-cancel\" onclick=\"copyOneNote()\">📋 Copy to Clipboard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec-label\">💾 JSON Backup<\u002Fdiv>\n  <div class=\"export-area\" style=\"padding:16px\">\n    <div class=\"export-btns\">\n      <button class=\"btn btn-save\" onclick=\"downloadJSON()\">⬇ Download JSON<\u002Fbutton>\n      <button class=\"btn btn-cancel\" onclick=\"_openImportModal()\">⬆ Import JSON<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv><!-- /wrap -->\n\n<!-- ════ MODALS ════════════════════════════════════════════════ -->\n\n<!-- TASK MODAL -->\n<div class=\"overlay\" id=\"taskModal\">\n  <div class=\"modal\">\n    <div class=\"modal-title\" id=\"taskModalTitle\">Add Task<\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Engineer<\u002Flabel><select class=\"form-select\" id=\"tm-eng\"><\u002Fselect><\u002Fdiv>\n    <div class=\"form-row-2\">\n      <div><label class=\"form-label\">Project<\u002Flabel><input class=\"form-input\" id=\"tm-proj\" placeholder=\"e.g. HAVI, Haleon, XWAN\"><\u002Fdiv>\n      <div><label class=\"form-label\">Status<\u002Flabel>\n        <select class=\"form-select\" id=\"tm-status\">\n          <option value=\"none\">⬜ Not Started<\u002Foption>\n          <option value=\"prog\">🔄 In Progress<\u002Foption>\n          <option value=\"wait\">⏳ Waiting/Pending<\u002Foption>\n          <option value=\"hold\">🔴 On Hold/Blocked<\u002Foption>\n          <option value=\"done\">✅ Done<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Task / Phase<\u002Flabel><input class=\"form-input\" id=\"tm-task\" placeholder=\"Describe the task\"><\u002Fdiv>\n    <div class=\"form-row-2\">\n      <div><label class=\"form-label\">Target Date<\u002Flabel><input class=\"form-input\" type=\"date\" id=\"tm-date\"><\u002Fdiv>\n      <div><label class=\"form-label\">Priority<\u002Flabel>\n        <select class=\"form-select\" id=\"tm-prio\">\n          <option value=\"normal\">Normal<\u002Foption>\n          <option value=\"high\">🔥 High Priority<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Notes / Blockers<\u002Flabel><textarea class=\"form-textarea\" id=\"tm-notes\" placeholder=\"Context, blockers, dependencies…\"><\u002Ftextarea><\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-danger\" id=\"tm-del-btn\" style=\"margin-right:auto;display:none\" onclick=\"deleteCurrentTask()\">Delete<\u002Fbutton>\n      <button class=\"btn btn-cancel\" onclick=\"closeModal('taskModal')\">Cancel<\u002Fbutton>\n      <button class=\"btn btn-save\" onclick=\"saveTask()\">Save Task<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ENGINEER MODAL -->\n<div class=\"overlay\" id=\"engModal\">\n  <div class=\"modal\">\n    <div class=\"modal-title\" id=\"engModalTitle\">Add Engineer<\u002Fdiv>\n\n    <div class=\"form-row-2\">\n      <div><label class=\"form-label\">Full Name<\u002Flabel><input class=\"form-input\" id=\"em-name\" placeholder=\"e.g. John Smith\"><\u002Fdiv>\n      <div><label class=\"form-label\">Initials (2 chars)<\u002Flabel><input class=\"form-input\" id=\"em-init\" maxlength=\"2\" placeholder=\"JS\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Role / Title<\u002Flabel><input class=\"form-input\" id=\"em-role\" placeholder=\"e.g. Delivery Architect\"><\u002Fdiv>\n    <div class=\"form-row\">\n      <label class=\"form-label\">Active Projects <span style=\"font-weight:400;text-transform:none;color:var(--gray-30)\">(auto-derived from tasks)<\u002Fspan><\u002Flabel>\n      <div class=\"form-readonly\" id=\"em-projs-display\">—<\u002Fdiv>\n      <div class=\"form-hint\">This is computed from the engineer's live non-done tasks. To change it, add or edit tasks in the Tasks tab.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- UTILIZATION SECTION -->\n    <div class=\"form-row\">\n      <label class=\"form-label\">Utilization<\u002Flabel>\n      <div class=\"util-mode-toggle\">\n        <div class=\"toggle-label\" id=\"util-mode-label\">Auto-calculated from tasks<\u002Fdiv>\n        <label class=\"toggle-switch\">\n          <input type=\"checkbox\" id=\"em-manual-toggle\" onchange=\"toggleUtilMode()\">\n          <div class=\"toggle-slider\"><\u002Fdiv>\n        <\u002Flabel>\n        <span style=\"font-size:11px;color:var(--gray-30)\">Manual<\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"util-manual-field\" style=\"display: div class=\"modal-title\" id=\"lm-title\">Add Link<\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Display Name<\u002Flabel><input class=\"form-input\" id=\"lm-name\" placeholder=\"e.g. Revenue Sheet\"><div class=\"form-hint\">This is what users will see — the URL is hidden behind it<\u002Fdiv><\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">URL (full link)<\u002Flabel><input class=\"form-input\" id=\"lm-url\" placeholder=\"https://… or onenote:// or any URL\"><\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Short Note (optional)<\u002Flabel><input class=\"form-input\" id=\"lm-note\" placeholder=\"e.g. IPs: 10.x.x.x\"><\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-danger\" id=\"lm-del-btn\" style=\"margin-right:auto;display:none\" onclick=\"deleteCurrentLink()\">Delete<\u002Fbutton>\n      <button class=\"btn btn-cancel\" onclick=\"closeModal('linkModal')\">Cancel<\u002Fbutton>\n      <button class=\"btn btn-save\" onclick=\"saveLink()\">Save<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CODE MODAL -->\n<div class=\"overlay\" id=\"codeModal\">\n  <div class=\"modal\">\n    <div class=\"modal-title\" id=\"cm-title\">Add Prime Code<\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Project / Task<\u002Flabel><input class=\"form-input\" id=\"cm-proj\" placeholder=\"e.g. HAVI\"><\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Prime Code<\u002Flabel><input class=\"form-input\" id=\"cm-code\" placeholder=\"CSI-CU-B-…\"><\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Project Owner (email)<\u002Flabel><input class=\"form-input\" id=\"cm-owner\" placeholder=\"name@orange.com\"><\u002Fdiv>\n    <div class=\"form-row\"><label class=\"form-label\">Flag / Note<\u002Flabel><input class=\"form-input\" id=\"cm-note\" placeholder=\"e.g. ⚠ Needs verification\"><\u002Fdiv>\n    <div class=\"modal-footer\">\n      <butt global lock first. Leave unchecked for a local-only preview.<\u002Fdiv>\n        <\u002Fspan>\n      <\u002Flabel>\n    <\u002Fdiv>\n\n    <!-- Warning banner -->\n    <div id=\"importWarning\" style=\"display:none;background:#FFF4E5;border-left:3px solid var(--prog-c);padding:9px 12px;margin:8px 0;border-radius:3px;font-size:11.5px;color:var(--gray-90)\"><\u002Fdiv>\n\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-cancel\" onclick=\"closeModal('importModal')\">Cancel<\u002Fbutton>\n      <button class=\"btn btn-save\" onclick=\"importJSON()\" id=\"importBtn\" disabled=\"\">Import<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SAVE SNAPSHOT MODAL — backdate or label a weekly snapshot -->\n<div class=\"overlay\" id=\"saveSnapshotModal\">\n  <div class=\"modal\" style=\"max-width:480px\">\n    <div class=\"modal-title\">📅 Save Weekly Snapshot<\u002Fdiv>\n    <div style=\"font-size:12px;color:var(--gray-50);margin-bottom:14px;line-height:1.5\">\n      Captures the current state of all engineers and tasks. Pick any date — useful for backdating last week's review or labeling a milestone.\n    <\u002Fdiv>\n    <div class=\"form-row-2\">\n      <div>\n        <label class=\"form-label\">Snapshot Date<\u002Flabel>\n        <input type=\"date\" class=\"form-input\" id=\"ss-date\">\n      <\u002Fdiv>\n      <div>\n        <label class=\"form-label\">Quick pick<\u002Flabel>\n        <select class=\"form-select\" id=\"ss-quick\">\n          <option value=\"today\">Today<\u002Foption>\n          <option value=\"yesterday\">Yesterday<\u002Foption>\n          <option value=\"last-friday\">Last Friday<\u002Foption>\n          <option value=\"last-monday\">Last Monday<\u002Foption>\n          <option value=\"custom\">Custom date…<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label class=\"form-label\">Label<\u002Flabel>\n      <input type=\"text\" class=\"form-input\" id=\"ss-labe B7B10-44C1-4AA4-9E68-020CD9F19CCB%2F%29 onenote:https://orange0.sharepoint.com/sites/sdwanincubation/FTSharedDocuments/Engineering/ENGINEERING/Tasks.one#Engineering%20Weekly%2017/04/2026&section-id={33B80B4B-041B-4B06-A5E0-DBE8A2A015EA}&page-id={141B7B10-44C1-4AA4-9E68-020CD9F19CCB}&object-id={AA906D70-6F72-00C7-24AD-886DE8A16A71}&6E',note:'ENG SDWAN | OB Unified Lab | MS Teams'},\n    {id:'l6',name:'Learning Hub',url:'https://orange0.sharepoint.com/sites/sdwanincubation/_layouts/OneNote.aspx?id=%2Fsites%2Fsdwanincubation%2FFTSharedDocuments%2FEngineering%2FENGINEERING&wd=target%28Tasks.one%7C33B80B4B-041B-4B06-A5E0-DBE8A2A015EA%2FEngineering%20Weekly%2017%5C%2F04%5C%2F2026%7C141B7B10-44C1-4AA4-9E68-020CD9F19CCB%2F%29 onenote:https://orange0.sharepoint.com/sites/sdwanincubation/FTSharedDocuments/Engineering/ENGINEERING/Tasks.one#Engineering%20Weekly%2017/04/2026&section-id={33B80B4B-041B-4B06-A5E0-DBE8A2A015EA}&page-id={141B7B10-44C1-4AA4-9E68-020CD9F19CCB}&object-id={AA906D70-6F72-00C7-24AD-886DE8A16A71}&7B',note:'ENG SDWAN | Learning Hub | MS Teams'},\n  ],\n  codes: [\n    {id:'c1',proj:'EVP-VNE',code:'MKT/CS-CS BL-OSA-OE-00770-VNFaaS VNE',owner:'michael.bouge@orange.com',note:''},\n    {id:'c2',proj:'HAVI',code:'CSI-CU-B-Havi Global Solutions LLC-1000223708',owner:'jann.gudmundsson@orange.com / gabor.joo@orange.com',note:''},\n    {id:'c3',proj:'Elopak',code:'CSI-CU-B-Elopak-1000246362',owner:'harshal.maniar@orange.com',note:''},\n    {id:'c4',proj:'EVP-Zscaler-SSE',code:'MKT-CS-OSA-OE-00459-SSE',owner:'emmanuelle.christophe@orange.com',note:''},\n    {id:'c5',proj:'CIMB',code:'TBC',owner:'TBC',note:'⚠ Needs verification'},\n  ]\n};\n\nlet data = JSON.parse(JSON.stringify(DEFAULT_DATA));\n\n/* ══════════════════════════════════════════════════════════\n   CLOUD STORAGE — JSONBin.io\n   All team members read/write the same shared bin.\n══════════════════════════════════════════════════════════ */\nconst BIN_ID  = '69e22d1936566621a8c3430d';\nconst API_KEY = '$2a$10$uI2D6aMal2kpFYCHUUQWausscVbm2f0fj.s7Jsd6XokmHOG7xtCy2';\nconst BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;\n\n// localStorage keys (used only as offline fallback)\nconst LS_DATA = 'ob_da_data_fallback';\nconst LS_VERS = 'ob_da_vers_fallback';\nlet versions  = [];  // [{id, label, timestamp, taskCount, engCount, snapshot}]\n                     // declared early so the hydration block below can populate it\n\nlet _saveTimer  = null;   // debounce handle\nlet _isSaving   = false;  // prevent overlapping writes\nlet _lastSaveTs = 0;      // track when we last pushed\nlet _lastLocalEditTs = 0; // tracks the most recent local data mutation;\n                          // used to block cloud overwrites that would\n                          // discard recent local edits.\n\n/* SYNCHRONOUS HYDRATION — happens at script-parse time so the user's\n   last-known state is on screen immediately, never a blank page. The\n   subsequent loadFromCloud() will merge fresher remote data on top. */\n/* SCHEMA / SYNC ARCHITECTURE VERSION ───────────────────────────\n   Bump this when changing the sync model in a way that requires\n   clients to discard cached state and re-pull from cloud. The\n   strict-lock rollout requires a one-time wipe so the three\n   diverged browsers converge on the cloud's current state. */\nconst SYNC_SCHEMA_VERSION = 'strict-lock-v1';\nconst LS_SYNC_VERSION = 'ob_sync_schema_v';\n\n(function _maybeWipeForSchemaUpgrade() {\n  try {\n    const stored = localStorage.getItem(LS_SYNC_VERSION);\n    if (stored !== SYNC_SCHEMA_VERSION) {\n      // Wipe cached data so the next loadFromCloud() pulls clean truth.\n      // Preserve user identity, name, theme, collapse state, etc.\n      localStorage.removeItem(LS_DATA);\n      localStorage.removeItem(LS_VERS);\n      localStorage.setItem(LS_SYNC_VERSION, SYNC_SCHEMA_VERSION);\n      console.info('Sync schema upgraded to', SYNC_SCHEMA_VERSION, '— local cache cleared, fetching fresh cloud state.');\n    }\n  } catch (e) {}\n})();\n\n(function _hydrateFromLocalStorage() {\n  try {\n    const r = localStorage.getItem(LS_DATA);\n    if (r) {\n      const parsed = JSON.parse(r);\n      if (parsed && Array.isArray(parsed.engineers)) {\n        data = parsed;\n      }\n    }\n  } catch (e) { console.warn('localStorage hydration failed:', e); }\n  try {\n    const r = localStorage.getItem(LS_VERS);\n    if (r) {\n      const parsed = JSON.parse(r);\n      if (Array.isArray(parsed)) versions = parsed;\n    }\n  } catch (e) {}\n})();\n\n/* ── SYNC INDICATOR ─────────────────────────────────────── */\nfunction setSyncState(state, msg) {\n  const labels = {\n    loading: 'Loading…',\n    saving:  'Saving…',\n    synced:  'Saved',\n    error:   'Sync error',\n  };\n  const txt = labels[state] || '?';\n  // Plain-language wording for the wider edit-mode bar\n  const barLabels = {\n    loading: 'Loading…',\n    saving:  'Saving…',\n    synced:  'All changes saved ✓',\n    error:   'Couldn’t save — check your connection',\n  };\n  const mbSync = document.getElementById('mbSync');\n  if (mbSync) {\n    mbSync.className = 'mb-sync ' + state;\n    mbSync.textContent = barLabels[state] || '';\n  }\n\n  // Legacy topbar indicator (kept for backward-compat if still present)\n  const el = document.getElementById('syncIndicator');\n  if (el) {\n    el.className = 'sync-indicator sync-' + state;\n    el.textContent = state === 'error' ? 'Sync error' : txt;\n    if (msg) el.title = msg;\n  }\n\n  // New right-rail sync chip\n  const rr = document.getElementById('rrSync');\n  const rrTxt = document.getElementById('rrSyncTxt');\n  if (rr && rrTxt) {\n    rr.className = 'rr-sync ' + state;\n    rrTxt.textContent = txt;\n    rr.title = msg || txt;\n  }\n\n  // When sync completes, briefly flash the page-edge glow\n  if (state === 'synced' && typeof _flashSaveGlow === 'function') _flashSaveGlow();\n}\n\n/* ── READ FROM CLOUD ────────────────────────────────────── */\nasync function loadFromCloud() {\n  setSyncState('loading');\n  setLoadingMsg('Fetching latest data from shared database…');\n  try {\n    // Note on file:// — Chrome and Edge on Windows allow file:// pages to\n    // fetch https://api.jsonbin.io with CORS. The previous early-return on\n    // protocol==='file:' was the root cause of \"data doesn't load until I\n    // click Lock\" — only the acquireGlobalLock path skipped the guard, so\n    // it was the only path that ever reached the cloud. If CORS does block\n    // (strict Firefox config), the catch below shows the hosting banner.\n    const res = await fetch(BIN_URL + '/latest?_=' + Date.now(), {\n      method: 'GET',\n      mode:   'cors',\n      cache:  'no-cache',\n      headers: {\n        'X-Master-Key': API_KEY,\n        'Cache-Control': 'no-cache, no-store, must-revalidate',\n        'Pragma':        'no-cache',\n      },\n    });\n    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);\n    let json;\n    try {\n      json = await res.json();\n    } catch (e) {\n      throw new Error('Cloud returned invalid JSON: ' + (e.message || 'parse failed'));\n    }\n    const record = (json && (json.record || json)) || {};\n\n    if (!record.appData || typeof record.appData !== 'object' || !Array.isArray(record.appData.engineers)) {\n      console.warn('Cloud returned malformed record; keeping local state.');\n      setSyncState('error', 'malformed cloud response');\n      return;\n    }\n\n    // STRICT-LOCK MODE — adopt cloud state wholesale.\n    // Non-lock-holders cannot have edited anything (pushToCloud refuses\n    // to write without the lock), so there's nothing local to merge in.\n    // The previous _mergeRemoteIntoLocal logic that tried to preserve\n    // local edits caused the three-way fork problem you hit in production.\n    data     = record.appData;\n    versions = (record.versions && Array.isArray(record.versions)) ? record.versions : [];\n\n    migrateData();\n    try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n    try { localStorage.setItem(LS_VERS, JSON.stringify(versions)); } catch(e) {}\n    setSyncState('synced');\n  } catch(err) {\n    console.warn('Cloud load failed:', err);\n    setSyncState('error', err.message);\n    // Only show the \"host this file on a server\" banner if the failure\n    // is plausibly CORS-related (we're on file://). On http(s), it's a\n    // real network/auth/server issue — different message.\n    if (window.location.protocol === 'file:') {\n      showHostingBanner();\n    } else {\n      showCloudError(err.message);\n    }\n  }\n}\n\nfunction loadFromLocalFallback() {\n  try { const r=localStorage.getItem(LS_DATA); if(r) data=JSON.parse(r); } catch(e) {}\n  try { const r=localStorage.getItem(LS_VERS); if(r) versions=JSON.parse(r); } catch(e) {}\n  migrateData();\n}\n\n/* ── HOSTING BANNER (shown when opened from file://) ───── */\nfunction showHostingBanner() {\n  setSyncState('error', 'file:// protocol — cloud disabled');\n  const b = document.createElement('div');\n  b.id = 'hostingBanner';\n  b.style.cssText = [\n    'position:fixed','bottom:0','left:0','right:0','z-index:888',\n    'background:#1A1A2E','color:#E8E8F2','padding:14px 28px',\n    'display:flex','align-items:center','gap:16px',\n    'border-top:3px solid var(--orange)','font-size:13px',\n    'box-shadow:0 -4px 20px rgba(0,0,0,0.2)'\n  ].join(';');\n  b.innerHTML = `\n    <span style=\"font-size:20px\">⚠<\u002Fspan>\n    <div style=\"flex:1\">\n      <b style=\"color:var(--orange)\">Cloud sync disabled — file opened locally<\u002Fb><br>\n      <span style=\"color:rgba(255,255,255,0.6);font-size:11px\">\n        The browser blocks external requests when a file is opened directly from your computer (<code>file://<\u002Fcode>).\n        To enable real-time team sharing, <b>upload this HTML file to SharePoint<\u002Fb> and open it via its \n        SharePoint URL (https://…). All team members then open the same URL and share one live database.\n      <\u002Fspan>\n    <\u002Fdiv>\n    <button onclick=\"document.getElementById('hostingBanner').remove()\"\n      style=\"background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;\n             border-radius:4px;padding:6px 14px;cursor:pointer;font-size:12px;white-space:nowrap\">\n      ✕ Dismiss\n    <\u002Fbutton>`;\n  document.body.appendChild(b);\n}\n\n/* ── CLOUD ERROR TOAST with guidance ────────────────────── */\nfunction showCloudError(msg) {\n  console.error('[cloud sync]', msg);\n  const isNetworkErr = /fetch|network|offline/i.test(msg);\n  const guidance = isNetworkErr\n    ? 'You appear to be offline. Your changes are safe on this device and will sync when you reconnect.'\n    : 'Couldn’t reach the shared tracker. Your changes are kept on this device — it will keep retrying.';\n  toast(guidance, 'error');\n}\n\n/* ── WRITE TO CLOUD (debounced) ─────────────────────────── */\nfunction save() {\n  // Update local fallback immediately\n  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n  scheduleSave();\n}\nfunction saveVersions() {\n  try { localStorage.setItem(LS_VERS, JSON.stringify(versions)); } catch(e) {}\n  scheduleSave();\n}\n\n/* ══════════════════════════════════════════════════════════\n   CHANGELOG — lightweight audit trail of mutations\n   Stored in data.changelog[]; kept to last 500 entries.\n   Attribution is self-reported (trust-based), not tamper-proof.\n══════════════════════════════════════════════════════════ */\nconst CHANGELOG_MAX = 500;\nconst LS_USER_NAME  = 'ob_user_name';\n\nfunction getCurrentUser() {\n  let name = localStorage.getItem(LS_USER_NAME);\n  if (!name) return 'Unknown';\n  return name;\n}\n\nfunction setCurrentUser(name) {\n  name = (name || '').trim().slice(0, 40);\n  if (!name) return;\n  try { localStorage.setItem(LS_USER_NAME, name); } catch (e) { console.warn('localStorage write failed:', e); }\n  renderUserBadge();\n}\n\nfunction promptForUserName() {\n  const current = localStorage.getItem(LS_USER_NAME) || '';\n  const name = window.prompt('Your name (shown in the changelog for attribution):', current);\n  if (name !== null) setCurrentUser(name);\n}\n\n/* Click = quick rename via prompt. Shift+click = re-open the welcome modal,\n   so a team lead can demo or QA the onboarding flow without clearing localStorage. */\nfunction handleUserChipClick(e) {\n  if (e && e.shiftKey) {\n    const input = document.getElementById('nm-name');\n    if (input) input.value = localStorage.getItem(LS_USER_NAME) || '';\n    showNameModal();\n    return;\n  }\n  promptForUserName();\n}\n\n/* Core logger — entity: 'task'|'engineer'|'reference'|'policy'|'system'\n   action: 'create'|'update'|'delete'|'import'|'revert'\n   summary: human-readable one-liner\n   details: optional array of {field, old, new} */\nfunction logChange(entity, action, summary, details) {\n  if (!data.changelog) data.changelog = [];\n  data.changelog.push({\n    id: uid(),\n    ts: Date.now(),\n    user: getCurrentUser(),\n    entity,\n    action,\n    summary,\n    details: details || null,\n  });\n  // Trim oldest when we exceed cap\n  if (data.changelog.length > CHANGELOG_MAX) {\n    data.changelog = data.changelog.slice(-CHANGELOG_MAX);\n  }\n  // Re-render the changelog tab if it's currently visible (cheap no-op otherwise)\n  const pane = document.getElementById('tab-changelog');\n  if (pane && pane.classList.contains('active')) renderChangelog();\n}\n\n/* Helpers for building diff details */\nfunction diffObjects(before, after, trackFields) {\n  if (!before) return null;\n  const details = [];\n  trackFields.forEach(f => {\n    const o = before[f];\n    const n = after[f];\n    if (o !== n && !(o == null && n == null)) {\n      details.push({ field: f, old: o, new: n });\n    }\n  });\n  return details.length ? details : null;\n}\n\n/* ══════════════════════════════════════════════════════════\n   COLLABORATION — Global Edit Lock (Option C)\n   One person edits the whole dashboard at a time. Others see\n   a persistent toast naming who's editing. Auto-release after\n   10 minutes of no heartbeat (handles closed-tab orphans).\n═══════════════════════════════════════════════════════════ */\nconst LOCK_AUTO_RELEASE_MS = 3 * 60 * 1000;    // 3 minutes — = 6 missed heartbeats\nconst LOCK_HEARTBEAT_MS    = 30 * 1000;        // refresh every 30s while held\n\nlet _lockHeartbeatTimer = null;\nlet _lockNotificationEl = null;\nlet _lastNotifiedLockHolder = null;   // tracks last user we showed a banner for\n\n/* Get the active global lock if it exists and isn't expired. Pruning is lazy:\n   any caller that finds a stale lock simply ignores it. */\nfunction getGlobalLock() {\n  if (!data.globalLock) return null;\n  const now = Date.now();\n  if ((now - data.globalLock.heartbeatTs) > LOCK_AUTO_RELEASE_MS) return null;\n  return data.globalLock;\n}\n\nfunction isLockHeldByMe() {\n  const lock = getGlobalLock();\n  return lock && lock.userId === getUserId();\n}\n\n/* True when the lock is held under MY display name but a DIFFERENT browser\n   id — almost always \"me, from another device/session/origin\". This is the\n   common way people get stuck: the standalone file and the hosted page each\n   generate their own per-browser id, so a lock I set in one looks foreign\n   in the other. We let the same-named person reclaim it instead of waiting. */\nfunction lockLooksLikeMe() {\n  const lock = getGlobalLock();\n  if (!lock || lock.userId === getUserId()) return false;\n  const a = (lock.user || '').trim().toLowerCase();\n  const b = (getCurrentUser() || '').trim().toLowerCase();\n  return !!a && a === b && b !== 'unknown';\n}\n\nfunction isLockHeldByOther() {\n  const lock = getGlobalLock();\n  return lock && lock.userId !== getUserId();\n}\n\n/* Stable per-browser ID. Survives renames; doesn't survive incognito. */\nfunction getUserId() {\n  let id = null;\n  try { id = localStorage.getItem('ob_user_id'); } catch (e) {}\n  if (!id) {\n    id = 'u-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);\n    try { localStorage.setItem('ob_user_id', id); } catch (e) { console.warn('localStorage write failed:', e); }\n  }\n  return id;\n}\n\n/* Mutex for lock operations. While true, sync tick must NOT overwrite\n   data — otherwise a concurrent GET resolving mid-acquire wipes the\n   freshly-stamped local lock, and the UI doesn't reflect the new state\n   until next sync tick. Without this flag the user sees \"I clicked lock\n   but nothing happened — until I refresh\". */\nlet _lockOpInFlight = false;\n\nasync function acquireGlobalLock(force = false) {\n  const myId = getUserId();\n  const myName = getCurrentUser();\n  _lockOpInFlight = true;\n  try {\n\n  // Step 1: pull latest cloud state so we don't clobber remote edits\n  // that arrived while we were viewing-only. This is critical — without\n  // it, our \"lock acquire\" PUT would overwrite cloud with our stale local\n  // copy, undoing whatever happened since we opened the page.\n  let pullOK = false;\n  try {\n    const res = await fetch(BIN_URL + '/latest', {\n      method: 'GET', mode: 'cors',\n      headers: { 'X-Master-Key': API_KEY },\n      cache: 'no-cache',\n    });\n    if (res.ok) {\n      const json = await res.json().catch(() => null);\n      const record = (json && (json.record || json)) || {};\n      if (record.appData && Array.isArray(record.appData.engineers)) {\n        // Check existing lock — refuse to take it if someone else holds it\n        const existing = record.appData.globalLock;\n        const STALE_MS = LOCK_AUTO_RELEASE_MS;\n        const isStale = existing && (Date.now() - (existing.heartbeatTs || 0)) > STALE_MS;\n        if (existing && existing.userId !== myId && !isStale && !force) {\n          toast(`Locked by ${existing.user}. Wait or ask them to unlock.`, 'error');\n          return false;\n        }\n        // Adopt cloud state as our base before writing the lock\n        data = record.appData;\n        if (record.versions && Array.isArray(record.versions)) versions = record.versions;\n        migrateData();\n        pullOK = true;\n      }\n    }\n  } catch (e) {\n    console.warn('Lock pre-pull failed, proceeding with local state:', e);\n  }\n\n  // Step 2: stamp the lock onto our (now fresh) state\n  const now = Date.now();\n  data.globalLock = {\n    userId:      myId,\n    user:        myName,\n    acquiredAt:  now,\n    heartbeatTs: now,\n  };\n  // Update local cache immediately\n  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n\n  // Step 3: write to cloud directly (bypassing pushToCloud's lock-gate,\n  // since the WHOLE POINT of this call is to claim the lock).\n  setSyncState('saving');\n  try {\n    const body = _buildCloudPayload();\n    const res = await fetch(BIN_URL, {\n      method: 'PUT', mode: 'cors',\n      headers: { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' },\n      body\n    });\n    if (!res.ok) throw new Error(`HTTP ${res.status}`);\n    setSyncState('synced');\n  } catch (err) {\n    console.error('Lock acquire — cloud write failed:', err);\n    // Roll back: don't pretend we have the lock if cloud doesn't know\n    data.globalLock = null;\n    try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n    setSyncState('error', err.message);\n    toast('Couldn’t start editing right now — please try again in a moment.', 'error');\n    renderLockButton();\n    return false;\n  }\n\n  startLockHeartbeat();\n  // ALWAYS re-render — strict-lock mode means the readonly mask must flip\n  // off the moment we acquire, regardless of whether the pre-pull succeeded.\n  renderAll();\n  renderLockButton();\n  hideLockNotification();\n  logChange('system', 'update', `🔒 ${myName} locked the dashboard`);\n  toast('You are now editing — others are read-only', 'success');\n  return true;\n  } finally {\n    _lockOpInFlight = false;\n  }\n}\n\nasync function releaseGlobalLock(silent) {\n  _lockOpInFlight = true;\n  try {\n  const lock = data.globalLock;\n  if (!lock || lock.userId !== getUserId()) return;\n\n  // Flush ANY pending writes before releasing — otherwise a debounced\n  // edit could be left unsynced and the next lock holder won't see it.\n  if (_saveTimer) {\n    clearTimeout(_saveTimer); _saveTimer = null;\n    await pushToCloud();   // still ours at this moment, will succeed\n  }\n\n  data.globalLock = null;\n  stopLockHeartbeat();\n  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n\n  // Direct cloud write — bypass pushToCloud's gate since we're handing\n  // the lock back. Do this AFTER clearing data.globalLock so the cloud\n  // record reflects \"unlocked\" state.\n  try {\n    setSyncState('saving');\n    const body = _buildCloudPayload();\n    const res = await fetch(BIN_URL, {\n      method: 'PUT', mode: 'cors',\n      headers: { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' },\n      body\n    });\n    if (!res.ok) throw new Error(`HTTP ${res.status}`);\n    setSyncState('synced');\n  } catch (err) {\n    console.error('Lock release — cloud write failed:', err);\n    setSyncState('error', err.message);\n    // Don't roll back — local says unlocked, the cloud will catch up\n    // on the next sync tick when someone else acquires.\n  }\n\n  renderAll();          // strict-lock: re-render to apply readonly mask\n  renderLockButton();\n  if (!silent) {\n    logChange('system', 'update', `🔓 ${getCurrentUser()} unlocked the dashboard`);\n    toast('Unlocked — others can edit now', 'success');\n  }\n  } finally {\n    _lockOpInFlight = false;\n  }\n}\n\nfunction startLockHeartbeat() {\n  if (_lockHeartbeatTimer) return;\n  _lockHeartbeatTimer = setInterval(() => {\n    if (!isLockHeldByMe()) { stopLockHeartbeat(); return; }\n    data.globalLock.heartbeatTs = Date.now();\n    scheduleSave(false);   // debounced — heartbeat doesn't need urgency\n  }, LOCK_HEARTBEAT_MS);\n}\nfunction stopLockHeartbeat() {\n  if (_lockHeartbeatTimer) { clearInterval(_lockHeartbeatTimer); _lockHeartbeatTimer = null; }\n}\n\n/* Single point all edit attempts go through. Returns true if edit allowed. */\n/* Single point all edit attempts go through.\n   To edit, the user MUST currently hold the global lock.\n   Free state = nobody can edit until they lock first. */\nfunction canEdit() {\n  // Gate 1: user must have set a real name (not the 'Unknown' default).\n  // Without this, all changelog entries and lock acquisitions are anonymous.\n  if (getCurrentUser() === 'Unknown') {\n    showNameModal();\n    toast('Please enter your name first', 'error');\n    return false;\n  }\n  const lock = getGlobalLock();\n  if (!lock) {\n    // Lock is free — user must acquire it first\n    toast('🔒 Click \"Lock to edit\" in the top bar before making changes', 'error');\n    return false;\n  }\n  if (lock.userId !== getUserId()) {\n    // Someone else holds it\n    toast(`Locked by ${lock.user}. Wait for them to unlock.`, 'error');\n    return false;\n  }\n  return true;\n}\n\n/* Render the topbar lock button to reflect current state. Called on every\n   sync tick + after every lock action. */\nfunction renderLockButton() {\n  const lock = getGlobalLock();\n\n  // Resolve lock state once.\n  // Icons are STATE-oriented (not action-oriented):\n  //   🔓 open  = dashboard is currently unlocked → click locks it\n  //   🔒 closed = dashboard is currently locked (by me OR someone else)\n  let stateClass, icon, label, titleAttr, disabled;\n  if (!lock) {\n    stateClass = 'lock-free';\n    icon = '🔓'; label = 'Lock to edit';\n    titleAttr = 'Click to lock the dashboard so only you can edit';\n    disabled = false;\n  } else if (lock.userId === getUserId()) {\n    stateClass = 'lock-mine';\n    icon = '🔒'; label = \"You're editing — Unlock\";\n    titleAttr = 'Click to release the lock so others can edit';\n    disabled = false;\n  } else if (lockLooksLikeMe()) {\n    // Same name, different session — let them reclaim it from any control.\n    stateClass = 'lock-others';\n    icon = '↩'; label = 'Locked under your name — take over';\n    titleAttr = 'This lock is under your name from another session. Click to take editing back.';\n    disabled = false;\n  } else {\n    stateClass = 'lock-others';\n    icon = '🔒'; label = `Locked by ${lock.user}`;\n    titleAttr = `${lock.user} is editing. Auto-releases after about 3 min of inactivity.`;\n    disabled = true;\n  }\n\n  // Legacy topbar lock button (kept in case markup is still present)\n  const btn = document.getElementById('globalLockBtn');\n  if (btn) {\n    btn.classList.remove('lock-mine', 'lock-others', 'lock-free');\n    btn.classList.add(stateClass);\n    const labelEl = btn.querySelector('.btn-label');\n    const iconEl  = btn.querySelector('.btn-icon');\n    if (iconEl)  iconEl.textContent  = icon;\n    if (labelEl) labelEl.textContent = label;\n    btn.title = titleAttr;\n    btn.disabled = disabled;\n  }\n\n  // Right-rail lock button\n  const rrBtn = document.getElementById('rrLockBtn');\n  if (rrBtn) {\n    rrBtn.classList.remove('lock-active', 'lock-other');\n    rrBtn.textContent = icon;\n    rrBtn.dataset.tip = label;\n    rrBtn.title = titleAttr;\n    rrBtn.disabled = disabled;\n    if (stateClass === 'lock-mine')   rrBtn.classList.add('lock-active');\n    if (stateClass === 'lock-others') rrBtn.classList.add('lock-other');\n  }\n\n  // Mobile menu mirror\n  const mmIcon = document.getElementById('mmLockIcon');\n  const mmLabel = document.getElementById('mmLockLabel');\n  if (mmIcon)  mmIcon.textContent = icon;\n  if (mmLabel) mmLabel.textContent = label;\n\n  // Grey out UI when someone else holds the lock\n  // STRICT-LOCK MODE: anyone not currently holding the lock is in\n  // read-only mode (including when nobody holds it — you must lock\n  // explicitly to edit). This visually reinforces the new convention.\n  document.body.classList.toggle('is-readonly', !isLockHeldByMe());\n\n  // The sticky edit-mode bar is now the single, always-visible source of\n  // lock state (replaces the old bottom-right popup, which added clutter).\n  updateModeBar(stateClass, lock);\n  hideLockNotification();\n  _lastNotifiedLockHolder = (lock && lock.userId !== getUserId()) ? lock.userId : null;\n}\n\n/* Update the sticky edit-mode bar to match the current lock state. */\nfunction updateModeBar(stateClass, lock) {\n  const bar  = document.getElementById('modeBar');\n  if (!bar) return;\n  const ico  = document.getElementById('mbIco');\n  const txt  = document.getElementById('mbText');\n  const btn  = document.getElementById('mbBtn');\n  const sync = document.getElementById('mbSync');\n  bar.classList.remove('mb-view','mb-edit','mb-watch');\n  if (stateClass === 'lock-mine') {\n    bar.classList.add('mb-edit');\n    if (ico) ico.textContent = '✏️';\n    if (txt) txt.innerHTML = `<b>You're editing<\u002Fb><span class=\"mb-sub\">Changes save automatically and sync to the team. Click “Done editing” when finished so others can edit.<\u002Fspan>`;\n    if (btn) { btn.style.display = ''; btn.textContent = '✓ Done editing'; }\n    if (sync) sync.style.display = '';\n  } else if (stateClass === 'lock-others' && lock) {\n    // Special-case: the lock is under MY OWN name from another session.\n    // Don't strand the user in view mode — let them reclaim it.\n    if (lockLooksLikeMe()) {\n      bar.classList.add('mb-view');\n      if (ico) ico.textContent = '↩️';\n      if (txt) txt.innerHTML = `<b>Locked under your name from another session<\u002Fb><span class=\"mb-sub\">This happens when you open the tracker in a different browser or the offline copy. Take editing back to continue.<\u002Fspan>`;\n      if (btn) { btn.style.display = ''; btn.textContent = '↩ Take over editing'; }\n      if (sync) { sync.style.display = 'none'; sync.textContent = ''; }\n    } else {\n      bar.classList.add('mb-watch');\n      if (ico) ico.textContent = '🔒';\n      if (txt) txt.innerHTML = `<b>${_esc(lock.user)} is editing<\u002Fb><span class=\"mb-sub\">You're in view mode. It unlocks automatically about 3 minutes after they stop. <a href=\"#\" onclick=\"forceUnlock(event)\" style=\"color:inherit;text-decoration:underline\">Not them? Take over<\u002Fa><\u002Fspan>`;\n      if (btn) btn.style.display = 'none';\n      if (sync) { sync.style.display = 'none'; sync.textContent = ''; }\n    }\n  } else {\n    bar.classList.add('mb-view');\n    if (ico) ico.textContent = '👁';\n    if (txt) txt.innerHTML = `<b>View mode<\u002Fb><span class=\"mb-sub\">The dashboard is locked so only one person edits at a time. Click “Lock to edit” to make changes.<\u002Fspan>`;\n    if (btn) { btn.style.display = ''; btn.textContent = '🔓 Lock to edit'; }\n    if (sync) { sync.style.display = 'none'; sync.textContent = ''; }\n  }\n}\n\n/* Escape hatch for a genuinely stuck lock held by someone else (e.g. they\n   closed their tab without unlocking and you don't want to wait out the\n   3-minute auto-release). Confirms first, then force-acquires. */\nasync function forceUnlock(ev) {\n  if (ev) ev.preventDefault();\n  const lock = getGlobalLock();\n  const who = lock ? lock.user : 'someone';\n  if (!confirm(`Take over editing from ${who}?\\n\\nOnly do this if they're no longer editing — any unsaved changes of theirs could be lost.`)) return;\n  if (_lockOpInFlight) return;\n  await acquireGlobalLock(true);\n}\n\nasync function toggleGlobalLock() {\n  // Don't allow anonymous lock acquisition — it pollutes the lock\n  // notification (\"Unknown is editing\") and the changelog attribution.\n  if (!isLockHeldByMe() && getCurrentUser() === 'Unknown') {\n    showNameModal();\n    toast('Enter your name before locking the dashboard', 'error');\n    return;\n  }\n  // Per-call guard — prevent double-tap during the async cloud round-trip.\n  if (_lockOpInFlight) return;\n  if (isLockHeldByMe()) {\n    await releaseGlobalLock();\n  } else if (lockLooksLikeMe()) {\n    // Reclaim a lock sitting under our own name from another session.\n    await acquireGlobalLock(true);\n  } else {\n    await acquireGlobalLock();\n  }\n  // renderLockButton inside acquire/release sets the correct `disabled`\n  // state for each button based on whether someone else holds the lock.\n  // Don't override it here.\n}\n\n/* Persistent bottom-right notification — does NOT auto-dismiss. */\nfunction showLockNotification(name) {\n  hideLockNotification();   // remove any stale one first\n  const el = document.createElement('div');\n  el.className = 'lock-notification';\n  el.id = 'lockNotification';\n  el.innerHTML = `\n    <div class=\"ln-icon\">🔒<\u002Fdiv>\n    <div class=\"ln-body\">\n      <div class=\"ln-title\">${_esc(name)} is editing<\u002Fdiv>\n      <div class=\"ln-sub\">The dashboard is read-only until they unlock or stop editing for about 3 min.<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"ln-close\" onclick=\"hideLockNotification()\" aria-label=\"Dismiss notification\">×<\u002Fbutton>`;\n  document.body.appendChild(el);\n  _lockNotificationEl = el;\n  // Trigger entrance animation\n  requestAnimationFrame(() => el.classList.add('ln-show'));\n}\nfunction hideLockNotification() {\n  if (_lockNotificationEl) {\n    _lockNotificationEl.remove();\n    _lockNotificationEl = null;\n  }\n  const stale = document.getElementById('lockNotification');\n  if (stale) stale.remove();\n}\n\n/* Lock release on page exit:\n   PREVIOUSLY this had a `beforeunload` handler that cleared the lock\n   and PUT to cloud, intending to \"free the lock when the user closes the\n   tab\". But `beforeunload` fires on REFRESH too, and there's no reliable\n   way during unload to distinguish refresh from close. Result: every\n   refresh silently dropped the user's lock — visible bug.\n\n   Now relying on the heartbeat-staleness mechanism instead:\n     - While held, heartbeat bumps every 30s (LOCK_HEARTBEAT_MS)\n     - If user closes tab, heartbeat stops\n     - After LOCK_AUTO_RELEASE_MS of no heartbeat, getGlobalLock() returns\n       null to other clients (lock is effectively free)\n   This means a tab-close holds the lock for ~3 min before others can\n   take it — acceptable, and survives refresh cleanly. */\n\nfunction scheduleSave(immediate) {\n  clearTimeout(_saveTimer);\n  const delay = immediate ? 0 : 1400;   // debounce inline edits; immediate for explicit actions\n  _saveTimer = setTimeout(pushToCloud, delay);\n}\n\n/* ══ PAYLOAD SIZE CAP (JSONBin free tier = 100KB per PUT) ═════════\n   Before every cloud write, trim the two unbounded data sources:\n     - changelog: cap to 50 most recent entries\n     - versions:  keep only the 1 most recent snapshot\n   The trim is destructive (older entries / snapshots are deleted both\n   locally and in the next cloud write). User chose this trade-off\n   explicitly over the alternatives (manual cleanup, paid tier).\n\n   Returns the JSON body string ready to PUT. Logs trim events to\n   the console so power-users can see what was discarded. */\nconst CHANGELOG_KEEP_MAX = 50;\nconst SNAPSHOTS_KEEP_MAX = 1;\nconst CLOUD_PAYLOAD_HARD_CAP_BYTES = 95 * 1024;   // safety margin under JSONBin's 100KB\n\nfunction _buildCloudPayload() {\n  let trimmedLog = 0;\n  let trimmedSnaps = 0;\n\n  // Trim changelog (newest at end after sort)\n  if (Array.isArray(data.changelog) && data.changelog.length > CHANGELOG_KEEP_MAX) {\n    data.changelog.sort((a, b) => (a.ts || 0) - (b.ts || 0));\n    trimmedLog = data.changelog.length - CHANGELOG_KEEP_MAX;\n    data.changelog = data.changelog.slice(-CHANGELOG_KEEP_MAX);\n  }\n\n  // Trim snapshots (newest at end after sort by timestamp)\n  if (Array.isArray(versions) && versions.length > SNAPSHOTS_KEEP_MAX) {\n    versions.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));\n    trimmedSnaps = versions.length - SNAPSHOTS_KEEP_MAX;\n    versions = versions.slice(-SNAPSHOTS_KEEP_MAX);\n  }\n\n  if (trimmedLog || trimmedSnaps) {\n    console.info(`Cloud payload auto-trimmed: -${trimmedLog} changelog entries, -${trimmedSnaps} snapshots (JSONBin 100KB cap)`);\n  }\n\n  // CRITICAL: serialize directly with JSON.stringify here — do NOT call\n  // _buildCloudPayload() (an earlier sed bulk-rename accidentally replaced\n  // this line with a recursive call, blowing the stack on every save).\n  const body = JSON.stringify({ appData: data, versions });\n\n  // If even after trim we exceed the hard cap, the real data has grown\n  // beyond what free tier can hold. Surface a clear error rather than\n  // letting JSONBin reject with the cryptic 403.\n  if (body.length > CLOUD_PAYLOAD_HARD_CAP_BYTES) {\n    const kb = Math.round(body.length / 1024);\n    throw new Error(`Payload ${kb}KB exceeds JSONBin free-tier 100KB cap even after auto-trim. Delete tasks or upgrade JSONBin to Pro plan.`);\n  }\n  return body;\n}\n\nasync function pushToCloud() {\n  // ─── STRICT-LOCK MODE ─────────────────────────────────────────\n  // Only the lock holder may write to the shared cloud bin. This is\n  // the architectural fix for the multi-browser fork problem: if N\n  // browsers can push concurrently, JSONBin (no atomic CAS) will\n  // silently overwrite each other and clients diverge. With this\n  // gate, at most ONE browser is ever pushing at a time.\n  //\n  // Local edits without the lock are still saved to localStorage\n  // (via save()), so the user's typing isn't lost — but those\n  // changes won't propagate until they acquire the lock.\n  if (!isLockHeldByMe()) {\n    // Stale debounce timer no longer relevant — clear it\n    if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }\n    return;\n  }\n\n  if (_isSaving) { scheduleSave(false); return; }\n  _isSaving = true;\n  setSyncState('saving');\n  let bodyKB = 0;\n  try {\n    const body = _buildCloudPayload();   // auto-trims changelog + snapshots before serializing\n    bodyKB = Math.round(body.length / 1024);\n    // Approaching free-tier 100KB cap — warn at 90KB\n    if (body.length > 90 * 1024) {\n      toast(`⚠ Payload ${bodyKB}KB — close to JSONBin 100KB free-tier cap. Delete tasks or upgrade plan.`, 'error');\n    }\n    const res = await fetch(BIN_URL, {\n      method:  'PUT',\n      mode:    'cors',\n      headers: {\n        'X-Master-Key': API_KEY,\n        'Content-Type': 'application/json',\n      },\n      body\n    });\n    if (!res.ok) {\n      const txt = await res.text().catch(() => '');\n      throw new Error(`HTTP ${res.status} (${bodyKB}KB)${txt ? ' — ' + txt.slice(0,200) : ''}`);\n    }\n    _lastSaveTs = Date.now();\n    setSyncState('synced');\n  } catch(err) {\n    console.error('Cloud save failed:', err, '| payload', bodyKB + 'KB');\n    setSyncState('error', err.message);\n    let msg;\n    if (/413|too large|payload|100kb|Free users|403/i.test(err.message)) {\n      // Free-tier storage cap (403/413). Not something a regular teammate can fix.\n      msg = 'Couldn’t save — the tracker’s storage is full. Please tell an admin to archive old snapshots so saving works again.';\n    } else if (/401|unauthor/i.test(err.message)) {\n      msg = 'Couldn’t save — the app can’t access the database. Please let an admin know.';\n    } else if (/429|rate/i.test(err.message)) {\n      msg = 'Saving too quickly — wait a few seconds and try again. Your changes are kept.';\n    } else if (/Failed to fetch|NetworkError/i.test(err.message)) {\n      msg = 'You appear to be offline — your changes are saved on this device and will sync when you reconnect.';\n    } else {\n      msg = 'Couldn’t save right now — your changes are kept on this device. Please try again in a moment.';\n    }\n    toast(msg, 'error');\n  } finally {\n    _isSaving = false;\n  }\n}\n\n/* ── MANUAL REFRESH ─────────────────────────────────────── */\nasync function refreshFromCloud() {\n  // Before pulling, flush any pending debounced local save so we don't lose it\n  if (_saveTimer) {\n    clearTimeout(_saveTimer); _saveTimer = null;\n    await pushToCloud();\n  }\n  await loadFromCloud();\n  renderAll(); renderVersionSidebar(); updateSbBadge();\n  toast('Refreshed from shared database','success');\n}\n\n/* ══════════════════════════════════════════════════════════\n   COLLABORATIVE SYNC LOOP\n   Runs every 12s when tab visible. Designed to handle concurrent\n   edits without clobbering in-flight local changes:\n     1. If user is actively typing (focused input/editable), skip this cycle\n     2. If a local debounced save is pending, flush it first\n     3. Pull latest from cloud; if remote differs from local, merge\n     4. Merge strategy: remote tasks + engineers are authoritative EXCEPT\n        for fields the local user has edited since last sync (tracked in _dirtyFields)\n═══════════════════════════════════════════════════════════ */\nconst SYNC_INTERVAL_MS = 12000;\nlet _lastRemoteFingerprint = null;\nlet _syncInFlight = false;\n\nfunction _userIsTyping() {\n  const a = document.activeElement;\n  if (!a) return false;\n  const tag = a.tagName;\n  if (tag === 'INPUT' || tag === 'TEXTAREA') return true;\n  if (a.isContentEditable) return true;\n  return false;\n}\n\nasync function syncTick() {\n  if (_syncInFlight) return;\n  if (document.hidden) return;\n\n  // CRITICAL: skip if a lock acquire/release is mid-flight. Otherwise the\n  // sync tick's GET resolves AFTER acquireGlobalLock has stamped the lock\n  // locally, the read-only path overwrites `data` from cloud (which doesn't\n  // yet have our lock), and the UI fails to flip out of readonly mode until\n  // the next sync tick. This is the \"I clicked lock but had to refresh\" bug.\n  if (_lockOpInFlight) return;\n\n  // If lock holder is mid-typing, skip — let pushToCloud's debounce\n  // handle the next persistence cycle.\n  if (_userIsTyping() && _saveTimer) return;\n\n  _syncInFlight = true;\n  try {\n    // STRICT-LOCK MODE — flow:\n    //\n    // If WE hold the lock:\n    //   Push pending local edits. We are the writer; no merge needed.\n    //\n    // If we DON'T hold the lock:\n    //   Pull-only. Adopt remote state wholesale. No merge needed — only\n    //   the lock holder produces writes, so remote is always the truth.\n    if (isLockHeldByMe()) {\n      // Just flush pending writes — pushToCloud handles cloud auth & errors.\n      if (_saveTimer) {\n        clearTimeout(_saveTimer); _saveTimer = null;\n        await pushToCloud();\n      }\n      setSyncState('synced');\n      return;\n    }\n\n    // Read-only path: pull and adopt\n    const res = await fetch(BIN_URL + '/latest', {\n      method: 'GET', mode: 'cors',\n      headers: { 'X-Master-Key': API_KEY },\n      cache: 'no-cache',\n    });\n    if (!res.ok) { setSyncState('error'); return; }\n\n    let json;\n    try { json = await res.json(); }\n    catch (e) { setSyncState('error'); return; }\n\n    const record = (json && (json.record || json)) || {};\n    const remoteData     = record.appData || null;\n    const remoteVersions = record.versions || [];\n    if (!remoteData || !Array.isArray(remoteData.engineers)) return;\n\n    // Fingerprint guard — skip if remote hasn't changed since last tick\n    const remoteFp = JSON.stringify(remoteData) + '|' + JSON.stringify(remoteVersions);\n    if (remoteFp === _lastRemoteFingerprint) {\n      setSyncState('synced');\n      return;\n    }\n    _lastRemoteFingerprint = remoteFp;\n\n    // Adopt remote wholesale (we don't have local edits to preserve —\n    // we don't hold the lock, so we couldn't have made any). This is\n    // the architectural simplification that prevents fork divergence.\n    const oldFp = JSON.stringify(data);\n    data     = remoteData;\n    versions = remoteVersions;\n    migrateData();\n    try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n    try { localStorage.setItem(LS_VERS, JSON.stringify(versions)); } catch(e) {}\n\n    if (JSON.stringify(data) !== oldFp) {\n      renderAll(); renderVersionSidebar(); updateSbBadge();\n      if (_meaningfulDiff(data, JSON.parse(oldFp))) {\n        toast('↓ Team data updated', 'success');\n      }\n    }\n    renderLockButton();   // remote lock state may have changed\n    setSyncState('synced');\n  } catch (e) {\n    console.error('Sync tick failed:', e);\n    setSyncState('error');\n  } finally {\n    _syncInFlight = false;\n  }\n}\n\n/* True iff the user-facing portion of two states differs. Used to\n   decide whether to show a \"Team data updated\" toast — heartbeat\n   ticks and metadata bumps shouldn't trigger it. */\nfunction _meaningfulDiff(a, b) {\n  const project = (s) => {\n    if (!s) return '';\n    const slim = (arr) => (arr || []).map(x => {\n      const c = { ...x };\n      delete c._localEditTs;\n      return c;\n    });\n    return JSON.stringify({\n      tasks:     slim(s.tasks),\n      engineers: slim(s.engineers),\n      changelog: s.changelog,\n      refSections: s.refSections,\n    });\n  };\n  return project(a) !== project(b);\n}\n\n/* Merge remote state into local, preserving local edits if present.\n   Returns true if anything actually changed. */\nfunction _mergeRemoteIntoLocal(remoteData, remoteVersions) {\n  // Simple strategy: remote wins for everything, BUT preserve any task\n  // whose id exists locally with a newer _localEditTs than in remote.\n  let changed = false;\n\n  // Tombstones — IDs that were locally deleted and must not be resurrected\n  // even if a stale remote payload still contains them.\n  const taskTombs = _tombstoneSet('task');\n  const engTombs  = _tombstoneSet('engineer');\n\n  // Build id → task map for both sides\n  const localTaskById  = new Map((data.tasks  || []).map(t => [t.id, t]));\n  const remoteTaskById = new Map((remoteData.tasks || []).map(t => [t.id, t]));\n  const mergedTasks = [];\n\n  // Preserve remote task ordering; substitute local version when local is newer;\n  // skip entirely if the user deleted it locally (tombstoned).\n  (remoteData.tasks || []).forEach(rt => {\n    if (taskTombs.has(rt.id)) return;\n    const lt = localTaskById.get(rt.id);\n    if (lt && lt._localEditTs && lt._localEditTs > (rt._localEditTs || 0)) {\n      mergedTasks.push(lt);       // keep local (it's newer)\n    } else {\n      mergedTasks.push(rt);       // take remote\n    }\n  });\n\n  // Append any local-only tasks (created by us, not yet pushed in the last cycle)\n  (data.tasks || []).forEach(lt => {\n    if (!remoteTaskById.has(lt.id) && !taskTombs.has(lt.id)) mergedTasks.push(lt);\n  });\n\n  // Same logic for engineers\n  const localEngById  = new Map((data.engineers || []).map(e => [e.id, e]));\n  const remoteEngById = new Map((remoteData.engineers || []).map(e => [e.id, e]));\n  const mergedEngineers = [];\n  (remoteData.engineers || []).forEach(re => {\n    if (engTombs.has(re.id)) return;\n    const le = localEngById.get(re.id);\n    if (le && le._localEditTs && le._localEditTs > (re._localEditTs || 0)) {\n      mergedEngineers.push(le);\n    } else {\n      mergedEngineers.push(re);\n    }\n  });\n  (data.engineers || []).forEach(le => {\n    if (!remoteEngById.has(le.id) && !engTombs.has(le.id)) mergedEngineers.push(le);\n  });\n\n  // Merge changelog (append-only, dedupe by id, keep latest CHANGELOG_MAX)\n  const localLog  = data.changelog || [];\n  const remoteLog = remoteData.changelog || [];\n  const logById = new Map();\n  [...remoteLog, ...localLog].forEach(e => logById.set(e.id, e));\n  const mergedLog = Array.from(logById.values())\n    .sort((a, b) => a.ts - b.ts)\n    .slice(-CHANGELOG_MAX);\n\n  // Apply merged state.\n  // CRITICAL: preserve our own active lock heartbeat. The remote payload\n  // may carry an older heartbeatTs than what we just bumped locally; if\n  // we let remote win we'd silently expire our own lock on the next read.\n  // Also: union local + remote tombstones so deletes propagate across clients.\n  const cutoff = Date.now() - TOMBSTONE_TTL_MS;\n  const tombMap = new Map();\n  [...(remoteData._tombstones || []), ...(data._tombstones || [])].forEach(t => {\n    if (t && t.id && t.ts > cutoff) {\n      const key = `${t.kind}:${t.id}`;\n      const existing = tombMap.get(key);\n      if (!existing || existing.ts < t.ts) tombMap.set(key, t);\n    }\n  });\n  const newData = {\n    ...remoteData,\n    tasks: mergedTasks,\n    engineers: mergedEngineers,\n    changelog: mergedLog,\n    _tombstones: Array.from(tombMap.values())\n  };\n  if (data.globalLock && data.globalLock.userId === getUserId()) {\n    const localTs  = data.globalLock.heartbeatTs || 0;\n    const remoteTs = (newData.globalLock && newData.globalLock.userId === getUserId())\n      ? (newData.globalLock.heartbeatTs || 0) : 0;\n    // Keep whichever heartbeat is more recent\n    if (localTs > remoteTs) {\n      newData.globalLock = data.globalLock;\n    }\n  }\n  const newFp = JSON.stringify(newData) + '|' + JSON.stringify(remoteVersions);\n  const oldFp = JSON.stringify(data)    + '|' + JSON.stringify(versions);\n  if (newFp !== oldFp) {\n    data     = newData;\n    versions = remoteVersions;\n    try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n    try { localStorage.setItem(LS_VERS, JSON.stringify(versions)); } catch(e) {}\n    changed = true;\n\n    // If we merged in a newer local change that remote didn't know about,\n    // push it back up so everyone else sees it\n    const hasLocalWinners = mergedTasks.some(t => {\n      const r = remoteTaskById.get(t.id);\n      return t._localEditTs && (!r || t._localEditTs > (r._localEditTs || 0));\n    });\n    if (hasLocalWinners) scheduleSave(true);\n  }\n  return changed;\n}\n\n/* Start the sync loop */\nsetInterval(syncTick, SYNC_INTERVAL_MS);\n// Also sync when user returns to the tab after being away\ndocument.addEventListener('visibilitychange', () => {\n  if (!document.hidden) syncTick();\n});\n\n/* ── LOADING OVERLAY HELPERS ─────────────────────────────── */\nfunction setLoadingMsg(msg) {\n  const el = document.getElementById('loadingMsg');\n  if (el) el.textContent = msg;\n}\nfunction hideLoading() {\n  const el = document.getElementById('loadingOverlay');\n  if (el) { el.style.opacity='0'; el.style.transition='opacity .4s'; setTimeout(()=>el.remove(),400); }\n}\n\n/* Legacy shims so old code still compiles */\nfunction load()         { try { const r=localStorage.getItem(LS_DATA); if(r) data=JSON.parse(r); } catch(e){} }\nfunction loadVersions() { try { const r=localStorage.getItem(LS_VERS); if(r) versions=JSON.parse(r); } catch(e){} }\nfunction uid()          { return 'id'+Math.random().toString(36).slice(2,9); }\n\n/* ══ SECURITY HELPERS ════════════════════════════════════════\n   Defense-in-depth string + URL escapers. Used everywhere user input\n   is rendered into the DOM via innerHTML or href attributes.\n   These are NOT a substitute for server-side enforcement (which this\n   file does not have) but they prevent the most common XSS vectors\n   from data already in the cloud or from imported JSON.\n═══════════════════════════════════════════════════════════════ */\nfunction _esc(s) {\n  if (s === null || s === undefined) return '';\n  return String(s)\n    .replace(/&/g, '&amp;')\n    .replace(/<\u002Fg, '&lt;')\n    .replace(/>/g, '&gt;')\n    .replace(/\"/g, '&quot;')\n    .replace(/'/g, '&#39;')\n    .replace(/`/g, '&#96;');\n}\n\n/* Validate URL scheme — reject javascript:, data:, vbscript:, file:, etc.\n   Returns the URL if safe, '#' if not. */\nfunction _safeUrl(url) {\n  if (!url) return '#';\n  const trimmed = String(url).trim();\n  if (!trimmed) return '#';\n  // Allow relative URLs and http(s)/mailto only\n  const lower = trimmed.toLowerCase();\n  if (lower.startsWith('javascript:') || lower.startsWith('data:')\n      || lower.startsWith('vbscript:') || lower.startsWith('file:')) {\n    return '#';\n  }\n  // Accept http://, https://, mailto:, /relative, ./relative, or bare domain\n  if (/^(https?:\\/\\/|mailto:|\\/|\\.\\/|#)/.test(lower)) return trimmed;\n  if (/^[a-z0-9.-]+\\.[a-z]{2,}/i.test(trimmed)) return 'https://' + trimmed;\n  return '#';\n}\n\n/* Safe error message — strips stack traces, internal paths, and lengthy details\n   before showing to the user. Full error still goes to console for debugging. */\nfunction _safeErrMsg(e, fallback) {\n  if (!e) return fallback || 'An error occurred';\n  console.error('[error]', e);\n  const msg = (e && e.message) ? String(e.message) : String(e);\n  // Strip anything that looks like a stack trace, file path, or HTTP body dump\n  const cleaned = msg\n    .replace(/\\bat\\s+\\S+\\s+\\(.+?\\)/g, '')\n    .replace(/\\/[\\w\\/\\-.]+\\.(js|html|json):\\d+/g, '')\n    .replace(/\\s+/g, ' ')\n    .trim()\n    .slice(0, 140);\n  return cleaned || fallback || 'An error occurred';\n}\n\n/* ══ UTILIZATION AUTO-CALCULATION ══════════════════════════\n   Per-task weight = statusWeight × complexityMultiplier\n   Status weights: In Progress=3 (scaled by % complete remaining),\n                   Waiting=2, Not Started=1, Done=0 (done = no more load),\n                   On Hold=0 (excluded — task isn't consuming capacity)\n   Complexity: Low=0.7, Medium=1.0, High=1.5\n   Capacity baseline: 10 weight-points = 100%\n   Tasks with excludeFromUtil=true are skipped entirely\n══════════════════════════════════════════════════════════ */\nconst STATUS_WEIGHTS = { prog: 3, wait: 2, hold: 0, none: 1, done: 0 };\nconst COMPLEXITY_MULT = { low: 0.7, medium: 1.0, high: 1.5 };\nconst CAPACITY = 10;\n\nfunction taskWeight(t) {\n  if (t.excludeFromUtil) return 0;\n  let w = STATUS_WEIGHTS[t.status] ?? 0;\n  // If In Progress with a completion % set, weight decreases as % rises\n  if (t.status === 'prog') {\n    const raw = t.progressPct;\n    const pct = (raw === null || raw === undefined || raw === '') ? 0 : Number(raw);\n    if (!isNaN(pct)) {\n      const remaining = Math.max(0, Math.min(100, 100 - pct)) / 100;\n      w = 3 * remaining;  // 0% → weight 3, 100% → weight 0\n    }\n  }\n  const mult = COMPLEXITY_MULT[t.complexity] ?? 1.0;\n  return w * mult;\n}\n\n/* Add missing fields to tasks / refs for backward compatibility */\nfunction migrateData() {\n  (data.tasks || []).forEach(t => {\n    if (t.complexity === undefined)      t.complexity = 'medium';\n    if (t.progressPct === undefined)     t.progressPct = 0;\n    if (t.excludeFromUtil === undefined) t.excludeFromUtil = false;\n    if (t.hideDate === undefined)        t.hideDate = !t.date;\n  });\n  // PHOTO REMOVAL MIGRATION — strip photos everywhere they linger.\n  // Photos were removed because JSONBin's 1MB cap couldn't accommodate them\n  // alongside tasks + snapshots. Initials avatars are now the only avatar.\n  let strippedAny = false;\n  (data.engineers || []).forEach(e => {\n    if (e.photo) { e.photo = null; strippedAny = true; }\n    delete e.photo;\n  });\n  (versions || []).forEach(v => {\n    const engs = v && v.snapshot && v.snapshot.engineers;\n    if (Array.isArray(engs)) {\n      engs.forEach(e => { if (e.photo) { strippedAny = true; } delete e.photo; });\n    }\n  });\n  // Persist the strip back so the next save reflects the smaller payload.\n  // Done lazily — caller will save() naturally, no need to force here.\n  // Ensure changelog array exists\n  if (!data.changelog) data.changelog = [];\n  // Global lock state (Option C — single dashboard-wide pessimistic lock)\n  if (data.globalLock === undefined) data.globalLock = null;\n  // Drop legacy per-section collab state if present (replaced by globalLock)\n  if (data.presence) delete data.presence;\n  if (data.locks)    delete data.locks;\n  if (data.settings && data.settings.collabMode !== undefined) delete data.settings.collabMode;\n  // Ensure _tombstones array exists and prune anything older than TTL.\n  // (Used by the merge logic to prevent deleted-task resurrection.)\n  if (!Array.isArray(data._tombstones)) data._tombstones = [];\n  const tombCutoff = Date.now() - TOMBSTONE_TTL_MS;\n  data._tombstones = data._tombstones.filter(t => t && t.id && (t.ts || 0) > tombCutoff);\n\n  if (!data.refSections) {\
