 ${_fmtValue(d.old)} → ${_fmtValue(d.new)}`).join('; ') : '';\n    rows.push([\n      new Date(e.ts).toISOString(),\n      e.user || '',\n      e.entity || '',\n      e.action || '',\n      e.summary || '',\n      detailsStr,\n    ]);\n  });\n  const csv = rows.map(r => r.map(c => `\"${String(c).replace(/\"/g, '\"\"')}\"`).join(',')).join('\\n');\n  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  a.download = `changelog-${new Date().toISOString().slice(0,10)}.csv`;\n  a.click();\n  URL.revokeObjectURL(url);\n  toast('Changelog exported', 'success');\n}\n\nasync function clearChangelogConfirm() {\n  // Mutating shared state requires the global lock. Without this gate\n  // the clear \"succeeds\" locally but the cloud PUT silently fails, so\n  // the next page refresh pulls the un-cleared log back from cloud and\n  // it looks like Clear did nothing.\n  if (!canEdit()) {\n    toast('Lock the dashboard before clearing the changelog.', 'error');\n    return;\n  }\n  const count = (data.changelog || []).length;\n  if (!count) { toast('Changelog is already empty.', 'success'); return; }\n  if (!confirm(`Clear the entire changelog (${count} entries)? This cannot be undone and affects everyone on the team.`)) return;\n\n  data.changelog = [];\n  // Intentionally do NOT call logChange() here — adding \"Cleared changelog\"\n  // immediately re-pollutes the empty log with a self-referential entry.\n  // The action is visible via the toast and the user's session memory.\n\n  // Force an immediate cloud push so the cleared state persists on refresh.\n  // Without this, the 1.4s debounce + a quick refresh would lose the change\n  // (cloud still has the un-cleared log; reload re-adopts it).\n  save();\n  if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }\n  try {\n    await pushToCloud();\n    renderChangelog();\n    toast(`Changelog cleared (${count} entries removed)`, 'success');\n  } catch (e) {\n    console.error('clearChangelogConfirm: cloud push failed', e);\n    toast('Clear failed — cloud rejected the update. Check console.', 'error');\n  }\n}\n\n/* ══ KEYBOARD SHORTCUTS ══════════════════════════════════════\n   Give power users fast navigation without taking mouse-to-screen.\n   Skip when the user is typing in an input / contentEditable.\n═══════════════════════════════════════════════════════════════ */\nfunction _isTyping(e) {\n  const t = e.target;\n  if (!t) return false;\n  const tag = t.tagName;\n  return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || t.isContentEditable;\n}\n\ndocument.addEventListener('keydown', (e) => {\n  // Esc: close any open modal/sidebar/menu — EXCEPT the name entry modal,\n  // which is mandatory (lock + changelog attribution depends on it).\n  if (e.key === 'Escape') {\n    const nameModal = document.getElementById('nameModal');\n    document.querySelectorAll('.overlay.open').forEach(o => {\n      if (o !== nameModal) o.classList.remove('open');\n    });\n    const sb = document.getElementById('vsidebar');\n    if (sb && sb.classList.contains('open')) toggleSidebar();\n    closeMobileMenu();\n    return;\n  }\n\n  if (_isTyping(e)) return;\n  if (e.ctrlKey || e.metaKey || e.altKey) return;\n\n  switch (e.key) {\n    case '/':\n      e.preventDefault();\n      // Switch to Tasks tab and focus the search field\n      const tasksTabBtn = Array.from(document.querySelectorAll('.nav-tab')).find(b => b.textContent.trim() === 'Tasks');\n      if (tasksTabBtn) tasksTabBtn.click();\n      setTimeout(() => { const s = document.getElementById('searchInput'); if (s) s.focus(); }, 60);\n      break;\n\n    case 'd': case 'D':\n      e.preventDefault();\n      const overviewBtn = Array.from(document.querySelectorAll('.nav-tab')).find(b => b.textContent.trim() === 'Overview');\n      if (overviewBtn) overviewBtn.click();\n      break;\n\n    case 't': case 'T':\n      e.preventDefault();\n      const tBtn = Array.from(document.querySelectorAll('.nav-tab')).find(b => b.textContent.trim() === 'Tasks');\n      if (tBtn) tBtn.click();\n      break;\n\n    case 'r': case 'R':\n      e.preventDefault();\n      const rBtn = Array.from(document.querySelectorAll('.nav-tab')).find(b => b.textContent.trim() === 'References');\n      if (rBtn) rBtn.click();\n      break;\n\n    case 'e': case 'E':\n      e.preventDefault();\n      const eBtn = Array.from(document.querySelectorAll('.nav-tab')).find(b => b.textContent.trim() === 'Export');\n      if (eBtn) eBtn.click();\n      break;\n\n    case 'n': case 'N':\n      // Quick add task when on Tasks tab\n      if (document.getElementById('tab-tasks')?.classList.contains('active')) {\n        e.preventDefault();\n        if (typeof openAddTask === 'function') openAddTask();\n      }\n      break;\n\n    case '?':\n      e.preventDefault();\n      _showShortcutsHelp();\n      break;\n\n    case 'v': case 'V':\n      // Open versions sidebar\n      e.preventDefault();\n      if (typeof toggleSidebar === 'function') toggleSidebar();\n      break;\n  }\n});\n\nfunction _showShortcutsHelp() {\n  if (document.getElementById('shortcutsHelp')) {\n    document.getElementById('shortcutsHelp').remove();\n    return;\n  }\n  const div = document.createElement('div');\n  div.id = 'shortcutsHelp';\n  div.innerHTML = `\n    <div class=\"sh-title\">⌨ Keyboard Shortcuts<\u002Fdiv>\n    <table>\n      <tr><td><kbd>D<\u002Fkbd><\u002Ftd><td>Dashboard<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>T<\u002Fkbd><\u002Ftd><td>Tasks<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>R<\u002Fkbd><\u002Ftd><td>References<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>E<\u002Fkbd><\u002Ftd><td>Export<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>/<\u002Fkbd><\u002Ftd><td>Search tasks<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>N<\u002Fkbd><\u002Ftd><td>New task <span class=\"sh-hint\">(on Tasks tab)<\u002Fspan><\u002Ftd><\u002Ftr>\n      <tr><td><kbd>V<\u002Fkbd><\u002Ftd><td>Toggle versions sidebar<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>?<\u002Fkbd><\u002Ftd><td>Toggle this help<\u002Ftd><\u002Ftr>\n      <tr><td><kbd>Esc<\u002Fkbd><\u002Ftd><td>Close modals / sidebars<\u002Ftd><\u002Ftr>\n    <\u002Ftable>\n    <div class=\"sh-dismiss\">Press <kbd>?<\u002Fkbd> or <kbd>Esc<\u002Fkbd> to dismiss<\u002Fdiv>\n  `;\n  document.body.appendChild(div);\n  setTimeout(() => div.classList.add('open'), 20);\n  // auto-dismiss on outside click\n  setTimeout(() => {\n    document.addEventListener('click', function _dismiss(e) {\n      if (!div.contains(e.target)) {\n        div.remove();\n        document.removeEventListener('click', _dismiss);\n      }\n    });\n  }, 100);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
