n    // Convert existing links/codes into the new pluggable sections\n    data.refSections = [\n      { id: 'rs-links', title: 'General Links', icon: '🔗', type: 'links', items: data.links || [] },\n      { id: 'rs-codes', title: 'Prime Codes',   icon: '🔑', type: 'codes', items: data.codes || [] },\n    ];\n  }\n}\n\nfunction calcUtil(engId) {\n  const tasks = data.tasks.filter(t => t.engId === engId);\n  if (!tasks.length) return 0;\n  const total = tasks.reduce((sum, t) => sum + taskWeight(t), 0);\n  return Math.min(Math.round((total / CAPACITY) * 100), 100);\n}\n\nfunction getUtil(eng) {\n  if (eng.manualUtil !== null && eng.manualUtil !== undefined && eng.manualUtil !== '') {\n    return { value: parseInt(eng.manualUtil), isManual: true };\n  }\n  return { value: calcUtil(eng.id), isManual: false };\n}\n\nfunction utilClass(u) {\n  if (u === 0) return 'u-zero';\n  if (u <= 30) return 'u-low';\n  if (u <= 60) return 'u-mid';\n  return 'u-hi';\n}\n\n/* ══ STATUS HELPERS ══════════════════════════════════════════ */\nconst STATUS_MAP = {\n  done: { label:'✅ Done',       cls:'done' },\n  prog: { label:'🔄 In Progress', cls:'prog' },\n  wait: { label:'⏳ Waiting',     cls:'wait' },\n  hold: { label:'🔴 On Hold',     cls:'hold' },\n  none: { label:'⬜ Not Started', cls:'none' },\n};\nfunction badgeHTML(status, taskId) {\n  const s = STATUS_MAP[status] || STATUS_MAP.none;\n  return `<span class=\"badge ${s.cls}\" onclick=\"cycleStatus('${taskId}')\" title=\"Click to cycle status\">${s.label}<\u002Fspan>`;\n}\nfunction cycleStatus(taskId) {\n  const order = ['none','prog','wait','hold','done'];\n  const t = data.tasks.find(x => x.id === taskId);\n  if (!t) return;\n  t.status = order[(order.indexOf(t.status) + 1) % order.length];\n  t._localEditTs = Date.now();\n  save(); renderAll(); toast('Status updated', 'success');\n}\nfunction togglePriority(taskId) {\n  const t = data.tasks.find(x => x.id === taskId);\n  if (!t) return;\n  t.priority = t.priority === 'high' ? 'normal' : 'high';\n  t._localEditTs = Date.now();\n  save(); renderAll(); toast(t.priority === 'high' ? '🔥 Marked high priority' : 'Priority cleared', 'success');\n}\n\nfunction toggleExclude(taskId) {\n  const t = data.tasks.find(x => x.id === taskId);\n  if (!t) return;\n  t.excludeFromUtil = !t.excludeFromUtil;\n  t._localEditTs = Date.now();\n  save(); renderAll();\n  toast(t.excludeFromUtil ? '∅ Excluded from utilization calc' : '✓ Included in utilization calc', 'success');\n}\n\nfunction toggleHideDate(taskId) {\n  const t = data.tasks.find(x => x.id === taskId);\n  if (!t) return;\n  t.hideDate = !t.hideDate;\n  if (t.hideDate) t.date = '';\n  t._localEditTs = Date.now();\n  save(); renderAll();\n}\n\n/* ══ RENDER ══════════════════════════════════════════════════ */\nfunction renderAll() { renderUtil(); renderPolicies(); renderTasks(); renderRefs(); renderOverviewWidgets(); }\n\n/* ── NOTES: convert stored text to bullet HTML and back ────── */\nfunction notesToHTML(notes) {\n  if (!notes || !notes.trim()) return '';\n  // Detect bullet markers: lines starting with •, -, *, >, or numbers like 1.\n  const lines = notes.split('\\n').filter(l => l.trim());\n  const isBullet = lines.some(l => /^[\\•\\-\\*\\>]|\\d+[\\.\\)]/.test(l.trim()));\n  if (isBullet || lines.length > 1) {\n    const items = lines.map(l => {\n      const clean = l.replace(/^[\\•\\-\\*\\>\\d\\.\\)]+\\s*/, '').trim();\n      return clean ? `<li>${escH(clean)}<\u002Fli>` : '';\n    }).join('');\n    return `<ul>${items}<\u002Ful>`;\n  }\n  return `<p style=\"margin:0\">${escH(notes)}<\u002Fp>`;\n}\nfunction htmlToNotes(html) {\n  // Convert bullet HTML back to plain text with • prefix\n  const tmp = document.createElement('div');\n  tmp.innerHTML = html;\n  const lis = tmp.querySelectorAll('li');\n  if (lis.length) return Array.from(lis).map(li => '• ' + li.innerText.trim()).join('\\n');\n  return tmp.innerText.trim();\n}\nfunction escH(s) {\n  return String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n}\n\nfunction renderUtil() {\n  const grid = document.getElementById('utilGrid');\n  grid.innerHTML = '';\n  data.engineers.forEach(eng => {\n    const tasks   = data.tasks.filter(t => t.engId === eng.id);\n    const blocked = tasks.filter(t => t.status === 'hold').length;\n    const done    = tasks.filter(t => t.status === 'done').length;\n    const prio    = tasks.filter(t => t.priority === 'high' && t.status !== 'done').length;\n    const overdue = tasks.filter(t => t.date && new Date(t.date) < new Date() && t.status !== 'done').length;\n    const { value: u, isManual } = getUtil(eng);\n    const uc  = utilClass(u);\n\n    // Derive active projects from actual tasks (exclude fully-completed projects)\n    const activeProjects = [...new Set(\n      tasks.filter(t => t.status !== 'done').map(t => t.project).filter(Boolean)\n    )];\n    const tags = activeProjects.length\n      ? activeProjects.map(p => `<span class=\"util-tag\">${p}<\u002Fspan>`).join('')\n      : '<span style=\"font-size:10px;color:var(--gray-30);font-style:italic\">No active projects<\u002Fspan>';\n\n    // Auto-generate the flag from the engineer's actual task state.\n    // Ignores any stale `eng.flag` string that may exist in older records.\n    const heldTasks = tasks.filter(t => t.status === 'hold');\n    const heldHi    = heldTasks.filter(t => t.priority === 'high');\n    let flagText = '';\n    let flagType = 'warn';\n    if (!tasks.length) {\n      flagText = 'No tasks assigned';\n      flagType = 'info';\n    } else if (tasks.every(t => t.status === 'done')) {\n      flagText = 'All tasks completed';\n      flagType = 'info';\n    } else if (heldHi.length) {\n      // Name the highest-priority on-hold task for immediate context\n      const pick = heldHi[0];\n      flagText = `🔴 ${pick.project}: ${pick.task}${heldHi.length>1?` (+${heldHi.length-1} more)`:''}`;\n      flagType = 'critical';\n    } else if (overdue) {\n      flagText = `${overdue} overdue task${overdue>1?'s':''} — action needed`;\n      flagType = 'critical';\n    } else if (heldTasks.length) {\n      flagText = `${heldTasks.length} task${heldTasks.length>1?'s':''} on hold`;\n      flagType = 'warn';\n    } else if (u > 85) {\n      flagText = 'Over-utilized — consider rebalancing';\n      flagType = 'warn';\n    }\n    const flagHTML = flagText ? `<div class=\"util-flag util-flag-${flagType}\">⚠ ${flagText}<\u002Fdiv>` : '';\n    const manualTag = isManual ? `<span class=\"util-manual-tag\">manual<\u002Fspan>` : '';\n    const autoNote = !isManual\n      ? `<div style=\"font-size:10px;color:var(--gray-30);margin-top:4px\">Auto-calculated from ${tasks.length} task${tasks.length!==1?'s':''}<\u002Fdiv>`\n      : '';\n\n    grid.innerHTML += `\n    <div class=\"util-card ${uc}\">\n      <div class=\"util-top\">\n        <div class=\"util-top-left\">\n          ${_avHTML(eng, 'util-av util-clickable', `onclick=\"goToEngineer('${eng.id}')\" title=\"Jump to ${_esc(eng.name.split(' ')[0])}'s tasks\"`)}\n          <div class=\"util-top-text\">\n            <div class=\"util-name util-clickable\" onclick=\"goToEngineer('${eng.id}')\" title=\"Jump to ${_esc(eng.name.split(' ')[0])}'s tasks\">${_esc(eng.name)}<\u002Fdiv>\n            <div class=\"util-role\">${_esc(eng.role)}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"util-edit-btn\" onclick=\"openEditEngineer('${eng.id}')\" title=\"Edit\">✎<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"util-pct-row\">\n        <div class=\"util-pct\">${u}%<\u002Fdiv>\n        ${manualTag}\n      <\u002Fdiv>\n      <div class=\"util-bar-bg\"><div class=\"util-bar\" style=\"width:${Math.max(u,1)}%\"><\u002Fdiv><\u002Fdiv>\n      ${autoNote}\n      <div class=\"util-tags\" style=\"margin-top:8px\">${tags}<\u002Fdiv>\n      <div class=\"util-stats\" style=\"margin-top:8px\">\n        <div class=\"util-stat\">Tasks <b>${tasks.length}<\u002Fb><\u002Fdiv>\n        ${blocked ? `<div class=\"util-stat\" style=\"color:var(--hold-c)\">On Hold <b>${blocked}<\u002Fb><\u002Fdiv>` : ''}\n        ${overdue ? `<div class=\"util-stat\" style=\"color:var(--hold-c)\">Overdue <b>${overdue}<\u002Fb><\u002Fdiv>` : ''}\n        ${prio    ? `<div class=\"util-stat\" style=\"color:var(--prio-c)\">🔥 <b>${prio}<\u002Fb><\u002Fdiv>` : ''}\n        <div class=\"util-stat\">Done <b>${done}<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      ${flagHTML}\n    <\u002Fdiv>`;\n  });\n  grid.innerHTML += `<div class=\"add-eng-card\" onclick=\"openAddEngineer()\"><div class=\"plus\">＋<\u002Fdiv><div class=\"lbl\">Add Engineer<\u002Fdiv><\u002Fdiv>`;\n}\n\n/* ══ NAVIGATION HELPERS (dashboard → tasks tab drill-down) ══ */\nfunction goToEngineer(engId) {\n  // Switch to Tasks tab\n  const tabBtn = document.querySelector('.nav-tab[onclick*=\"\\'tasks\\'\"]');\n  if (tabBtn) switchTab('tasks', tabBtn);\n  // Scroll to engineer section after render\n  setTimeout(() => {\n    const el = document.getElementById('sec-' + engId);\n    if (el) {\n      el.scrollIntoView({behavior:'smooth', block:'start'});\n      el.style.transition = 'background .6s';\n      el.style.background = 'var(--orange-l)';\n      setTimeout(() => { el.style.background = ''; }, 1400);\n    }\n  }, 60);\n}\nfunction goToTask(taskId) {\n  const tabBtn = document.querySelector('.nav-tab[onclick*=\"\\'tasks\\'\"]');\n  if (tabBtn) switchTab('tasks', tabBtn);\n  setTimeout(() => {\n    const row = document.getElementById('tr-' + taskId);\n    if (row) {\n      row.scrollIntoView({behavior:'smooth', block:'center'});\n      row.style.transition = 'background .6s, box-shadow .6s';\n      row.querySelectorAll('td').forEach(td => {\n        td.style.background = 'var(--orange-l)';\n        td.style.boxShadow = 'inset 0 0 0 2px var(--orange)';\n      });\n      setTimeout(() => {\n        row.querySelectorAll('td').forEach(td => {\n          td.style.background = '';\n          td.style.boxShadow = '';\n        });\n      }, 1800);\n    }\n  }, 60);\n}\nfunction goToDashboard() {\n  const tabBtn = document.querySelector('.nav-tab[onclick*=\"\\'overview\\'\"]');\n  if (tabBtn) switchTab('overview', tabBtn);\n  // If already there, refresh the cloud data\n  if (document.getElementById('tab-overview').classList.contains('active')) {\n    refreshFromCloud();\n  }\n}\n\n/* ══ DARK MODE ════════════════════════════════════════════════ */\nfunction applyTheme(theme) {\n  const iconDesktop = document.querySelector('#themeToggle .btn-icon');\n  const iconMobile  = document.getElementById('mmThemeIcon');\n  const iconRail    = document.getElementById('rrThemeBtn');\n  const isDark = theme === 'dark';\n  const ico = isDark ? '☀' : '🌙';\n  const tip = isDark ? 'Toggle light mode' : 'Toggle dark mode';\n  if (isDark) document.body.classList.add('dark');\n  else        document.body.classList.remove('dark');\n  if (iconDesktop) iconDesktop.textContent = ico;\n  if (iconMobile)  iconMobile.textContent  = ico;\n  if (iconRail) {\n    iconRail.textContent = ico;\n    iconRail.dataset.tip = tip;\n    iconRail.setAttribute('aria-label', tip);\n  }\n  // Redraw chart so SVG fills pick up the new palette\n  if (typeof renderUtilChart === 'function') renderUtilChart();\n}\nfunction toggleTheme() {\n  let current = 'light';\n  try { current = localStorage.getItem('ob_theme') || 'light'; } catch (e) {}\n  const next = current === 'dark' ? 'light' : 'dark';\n  try { localStorage.setItem('ob_theme', next); } catch (e) {}\n  applyTheme(next);\n}\n\n/* ══ MOBILE ACTION MENU ═══════════════════════════════════════ */\nfunction toggleMobileMenu(e) {\n  if (e) e.stopPropagation();\n  const menu = document.getElementById('mobileMenu');\n  if (!menu) return;\n  menu.classList.toggle('open');\n  // Close on outside tap\n  if (menu.classList.contains('open')) {\n    setTimeout(() => document.addEventListener('click', _mmCloseOnOutside, { once: true }), 10);\n  }\n}\nfunction closeMobileMenu() {\n  const menu = document.getElementById('mobileMenu');\n  if (menu) menu.classList.remove('open');\n}\nfunction _mmCloseOnOutside(e) {\n  const menu = document.getElementById('mobileMenu');\n  const btn  = document.getElementById('mobileMenuBtn');\n  if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {\n    menu.classList.remove('open');\n  }\n}\n\n/* ══ OVERVIEW WIDGETS ════════════════════════════════════════ */\nfunction renderOverviewWidgets() {\n  renderHealthBar();\n  renderUtilChart();\n  renderBlockersList();\n  renderOverdueList();\n  renderPrioList();\n  renderMeetingSummary();\n}\n\n/* ── HEALTH BAR ─────────────────────────────────────────────── */\nfunction renderHealthBar() {\n  const bar    = document.getElementById('healthBar');\n  const status = document.getElementById('healthStatus');\n  if (!bar || !status) return;\n\n  const all     = data.tasks;\n  const total   = all.length;\n  const done    = all.filter(t => t.status==='done').length;\n  const blocked = all.filter(t => t.status==='hold').length;\n  const inprog  = all.filter(t => t.status==='prog').length;\n  const overdue = all.filter(t => t.date && new Date(t.date)<new Date() && t.status!=='done').length;\n\n  // Stats as attractive tile cards with icons, animated numbers, tinted backgrounds\n  bar.innerHTML = `\n    <div class=\"stat-tile stat-primary\">\n      <div class=\"stat-icon\">📋<\u002Fdiv>\n      <div class=\"stat-num\" data-target=\"${total}\">0<\u002Fdiv>\n      <div class=\"stat-label\">Total Tasks<\u002Fdiv>\n      <div class=\"stat-trend\">All engineers<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-tile stat-prog\">\n      <div class=\"stat-icon\">\n        <svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\">\n          <path d=\"M21 12a9 9 0 11-6.2-8.6\"/><path d=\"M21 4v5h-5\"/>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"stat-num\" data-target=\"${inprog}\">0<\u002Fdiv>\n      <div class=\"stat-label\">In Progress<\u002Fdiv>\n      <div class=\"stat-trend\">${total ? Math.round(inprog/total*100) : 0}% of all<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-tile stat-done\">\n      <div class=\"stat-icon\">\n        <svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M20 6L9 17l-5-5\"/>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"stat-num\" data-target=\"${done}\">0<\u002Fdiv>\n      <div class=\"stat-label\">Completed<\u002Fdiv>\n      <div class=\"stat-trend\">${total ? Math.round(done/total*100) : 0}% done<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-tile stat-hold ${blocked ? 'has-attention' : ''}\">\n      <div class=\"stat-icon\">\n        <svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\">\n          <rect x=\"6\" y=\"5\" width=\"4\" height=\"14\"/><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\"/>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"stat-num\" data-target=\"${blocked}\">0<\u002Fdiv>\n      <div class=\"stat-label\">On Hold<\u002Fdiv>\n      <div class=\"stat-trend\">${blocked ? 'Needs attention' : 'None blocked'}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-tile stat-overdue ${overdue ? 'has-attention pulse' : ''}\">\n      <div class=\"stat-icon\">\n        <svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\">\n          <circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M12 7v5l3 2\"/>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"stat-num\" data-target=\"${overdue}\">0<\u002Fdiv>\n      <div class=\"stat-label\">Overdue<\u002Fdiv>\n      <div class=\"stat-trend\">${overdue ? 'Take action' : 'All on track'}<\u002Fdiv>\n    <\u002Fdiv>`;\n\n  // Team health — circular progress gauge with animated arc\n  const utils   = data.engineers.map(e => getUtil(e).value);\n  const avgUtil = utils.length ? Math.round(utils.reduce((a,b)=>a+b,0) / utils.length) : 0;\n  const overU   = utils.filter(u => u > 85).length;\n  const underU  = utils.filter(u => u < 25 && u > 0).length;\n\n  let hlth;\n  if (overU >= 2 || avgUtil > 85)      hlth = 'burnout';\n  else if (overU === 1 || avgUtil > 70) hlth = 'stretched';\n  else if (avgUtil < 25)                hlth = 'relaxed';\n  else                                  hlth = 'healthy';\n\n  const hlthCfg = {\n    relaxed:   ['🌿','var(--wait-c)', 'Relaxed',   `${underU} engineer${underU!==1?'s':''} under-utilized`],\n    healthy:   ['✅','var(--done-c)', 'Healthy',   'Team load is balanced'],\n    stretched: ['⚠','var(--prog-c)', 'Stretched', `${overU} engineer${overU!==1?'s':''} running at >85%`],\n    burnout:   ['🔴','var(--hold-c)','Overloaded',`${overU} engineer${overU!==1?'s':''} over 85%`]\n  }[hlth];\n\n  // Circumference of a circle with r=52 ≈ 326.7; we animate from 326.7 down to the remaining portion\n  const R = 52;\n  const C = 2 * Math.PI * R;\n  const offset = C - (Math.min(avgUtil, 100) / 100) * C;\n\n  // Gauge color based on utilization tier\n  const gaugeColor = avgUtil === 0 ? 'var(--gray-30)'\n                   : avgUtil <= 30 ? 'var(--done-c)'\n                   : avgUtil <= 70 ? 'var(--prog-c)'\n                   : 'var(--hold-c)';\n\n  status.innerHTML = `\n    <div class=\"health-ring-wrap\">\n      <svg class=\"health-ring\" viewBox=\"0 0 120 120\">\n        <defs>\n          <linearGradient id=\"ringGrad-${hlth}\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n            <stop offset=\"0%\"   stop-color=\"${gaugeColor}\" stop-opacity=\"0.9\"/>\n            <stop offset=\"100%\" stop-color=\"${gaugeColor}\" stop-opacity=\"1\"/>\n          <\u002FlinearGradient>\n        <\u002Fdefs>\n        <circle cx=\"60\" cy=\"60\" r=\"${R}\" stroke=\"var(--gray-10)\" stroke-width=\"10\" fill=\"none\"/>\n        <circle class=\"health-ring-progress\" cx=\"60\" cy=\"60\" r=\"${R}\"\n                stroke=\"url(#ringGrad-${hlth})\" stroke-width=\"10\" fill=\"none\"\n                stroke-linecap=\"round\"\n                stroke-dasharray=\"${C}\"\n                stroke-dashoffset=\"${C}\"\n                data-target-offset=\"${offset}\"\n                transform=\"rotate(-90 60 60)\"/>\n      <\u002Fsvg>\n      <div class=\"health-ring-center\">\n        <div class=\"health-ring-num\" data-target=\"${avgUtil}\">0<\u002Fdiv>\n        <div class=\"health-ring-unit\">% AVG<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"health-ring-info\">\n      <div class=\"health-ring-title\" style=\"color:${hlthCfg[1]}\">\n        <span class=\"health-pulse-dot\" style=\"background:${hlthCfg[1]}\"><\u002Fspan>\n        ${hlthCfg[2]}\n      <\u002Fdiv>\n      <div class=\"health-ring-sub\">${hlthCfg[3]}<\u002Fdiv>\n      <div class=\"health-ring-metrics\">\n        <div class=\"hrm-item\"><span class=\"hrm-dot\" style=\"background:var(--done-c)\"><\u002Fspan><b>${utils.filter(u=>u<=30&&u>0).length}<\u002Fb><span>healthy<\u002Fspan><\u002Fdiv>\n        <div class=\"hrm-item\"><span class=\"hrm-dot\" style=\"background:var(--prog-c)\"><\u002Fspan><b>${utils.filter(u=>u>30&&u<=70).length}<\u002Fb><span>engaged<\u002Fspan><\u002Fdiv>\n        <div class=\"hrm-item\"><span class=\"hrm-dot\" style=\"background:var(--hold-c)\"><\u002Fspan><b>${overU}<\u002Fb><span>stretched<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n\n  // Animate numbers counting up + ring stroke drawing\n  setTimeout(() => {\n    document.querySelectorAll('#healthBar .stat-num, #healthStatus .health-ring-num').forEach(animateCountUp);\n    const ringProg = document.querySelector('.health-ring-progress');\n    if (ringProg) {\n      ringProg.style.strokeDashoffset = ringProg.dataset.targetOffset;\n    }\n  }, 50);\n}\n\n/* Animate a number element from 0 up to its data-target value over ~900ms */\nfunction animateCountUp(el) {\n  const target = parseInt(el.dataset.target || '0', 10);\n  if (isNaN(target) || target === 0) { el.textContent = '0'; return; }\n  const duration = 900;\n  const start = performance.now();\n  function tick(now) {\n    const t = Math.min((now - start) / duration, 1);\n    // ease-out cubic\n    const eased = 1 - Math.pow(1 - t, 3);\n    el.textContent = Math.round(target * eased);\n    if (t < 1) requestAnimationFrame(tick);\n  }\n  requestAnimationFrame(tick);\n}\n\n/* ── UTILIZATION CHART — multiple views (bar / donut / pie / hbar) ── */\nlet _chartView = 'bar';\ntry { _chartView = localStorage.getItem('ob_chart_view') || 'bar'; } catch (e) {}\n\nfunction setChartView(view, btn) {\n  _chartView = view;\n  try { localStorage.setItem('ob_chart_view', view); } catch (e) {}\n  // Update active button state\n  document.querySelectorAll('.cvs-btn').forEach(b => b.classList.toggle('active', b === btn));\n  renderUtilChart();\n}\n\nfunction _chartContainer() {\n  let container = document.getElementById('utilChart');\n  if (!container) container = document.querySelector('.chart-svg-wrap');\n  if (!container) return null;\n  // Convert canvas to stable div on first render\n  if (container.tagName === 'CANVAS') {\n    const div = document.createElement('div');\n    div.className = 'chart-svg-wrap';\n    div.id = 'utilChart';\n    container.replaceWith(div);\n    container = div;\n  }\n  return container;\n}\n\nfunction _utilColor(u) {\n  if (u === 0)  return '#CCCCCC';\n  if (u <= 30)  return '#008A00';  // green\n  if (u <= 70)  return '#B05E00';  // amber\n  return '#CC0000';                // red\n}\n\n/* ══ CHART RENDERING — interactive SVG ════════════════════════\n   Custom tooltip, sibling dim-on-hover, entrance animations,\n   smooth fade between view types, click-to-drilldown panel.\n   Event handlers are bound ONCE via delegation on first render. */\n\nlet _chartListenersAttached = false;\nlet _chartTipEl = null;\nlet _chartDrilldownEngId = null;\n\nfunction _ensureChartTip() {\n  if (_chartTipEl && document.body.contains(_chartTipEl)) return _chartTipEl;\n  const el = document.createElement('div');\n  el.className = 'chart-tip';\n  el.id = 'chartTip';\n  el.setAttribute('role', 'tooltip');\n  document.body.appendChild(el);\n  _chartTipEl = el;\n  return el;\n}\n\n/* Aggregate task stats for one engineer — used by tooltip + drilldown. */\nfunction _engStats(eng) {\n  const tasks = data.tasks.filter(t => t.engId === eng.id);\n  const counts = { done:0, prog:0, wait:0, hold:0, none:0 };\n  const projects = new Set();\n  let highPrio = 0;\n  tasks.forEach(t => {\n    counts[t.status || 'none'] = (counts[t.status || 'none'] || 0) + 1;\n    if (t.project) projects.add(t.project);\n    if (t.priority === 'high') highPrio++;\n  });\n  return {\n    tasks, counts, highPrio,\n    total: tasks.length,\n    projects: Array.from(projects),\n    util: getUtil(eng).value,\n    isManual: getUtil(eng).isManual\n  };\n}\n\nfunction _showChartTip(engId, x, y) {\n  const eng = data.engineers.find(e => e.id === engId);\n  if (!eng) return;\n  const tip = _ensureChartTip();\n  const s = _engStats(eng);\n  const utilCol = _utilColor(s.util);\n  const projHTML = s.projects.slice(0, 4).map(p =>\n    `<div class=\"chart-tip-proj\">• ${_esc(p)}<\u002Fdiv>`\n  ).join('') + (s.projects.length > 4\n    ? `<div class=\"chart-tip-proj\" style=\"opacity:.6\">+${s.projects.length - 4} more<\u002Fdiv>` : '');\n\n  tip.innerHTML = `\n    <div class=\"chart-tip-name\">${_esc(eng.name)}<\u002Fdiv>\n    <div class=\"chart-tip-util-row\">\n      <div class=\"chart-tip-util\" style=\"color:${utilCol}\">${s.util}%<\u002Fdiv>\n      <div class=\"chart-tip-util-lbl\">${s.isManual ? 'manual' : 'auto'} util<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-tip-row\"><span>Total tasks<\u002Fspan><b>${s.total}<\u002Fb><\u002Fdiv>\n    <div class=\"chart-tip-row\"><span>🔄 In Progress<\u002Fspan><b>${s.counts.prog || 0}<\u002Fb><\u002Fdiv>\n    <div class=\"chart-tip-row\"><span>⏳ Waiting<\u002Fspan><b>${s.counts.wait || 0}<\u002Fb><\u002Fdiv>\n    <div class=\"chart-tip-row\"><span>🔴 On Hold<\u002Fspan><b>${s.counts.hold || 0}<\u002Fb><\u002Fdiv>\n    <div class=\"chart-tip-row\"><span>✅ Done<\u002Fspan><b>${s.counts.done || 0}<\u002Fb><\u002Fdiv>\n    ${s.highPrio ? `<div class=\"chart-tip-row\" style=\"color:#FF8888\"><span>🔥 High priority<\u002Fspan><b>${s.highPrio}<\u002Fb><\u002Fdiv>` : ''}\n    ${s.projects.length ? `\n      <div class=\"chart-tip-projects\">\n        <div class=\"chart-tip-projects-lbl\">Projects<\u002Fdiv>\n        ${projHTML}\n      <\u002Fdiv>` : ''}\n    <div class=\"chart-tip-hint\">Click for details<\u002Fdiv>`;\n\n  // Position — keep on screen\n  tip.classList.add('show');\n  const r = tip.getBoundingClientRect();\n  const margin = 12;\n  let left = x + 14, top = y + 14;\n  if (left + r.width > window.innerWidth - margin) left = x - r.width - 14;\n  if (top + r.height > window.innerHeight - margin) top = y - r.height - 14;\n  if (top < margin) top = margin;\n  if (left < margin) left = margin;\n  tip.style.left = left + 'px';\n  tip.style.top  = top  + 'px';\n}\n\nfunction _moveChartTip(x, y) {\n  if (!_chartTipEl || !_chartTipEl.classList.contains('show')) return;\n  const r = _chartTipEl.getBoundingClientRect();\n  const margin = 12;\n  let left = x + 14, top = y + 14;\n  if (left + r.width  > window.innerWidth  - margin) left = x - r.width  - 14;\n  if (top  + r.height > window.innerHeight - margin) top  = y - r.height - 14;\n  if (top  < margin) top  = margin;\n  if (left < margin) left = margin;\n  _chartTipEl.style.left = left + 'px';\n  _chartTipEl.style.top  = top  + 'px';\n}\n\nfunction _hideChartTip() {\n  if (_chartTipEl) _chartTipEl.classList.remove('show');\n}\n\nfunction _setChartFocus(engId) {\n  const container = document.getElementById('utilChart');\n  if (!container) return;\n  const groups = container.querySelectorAll('.chart-clickable');\n  groups.forEach(g => {\n    const id = g.getAttribute('data-eng');\n    if (!engId) {\n      g.classList.remove('is-dim', 'is-active');\n    } else if (id === engId) {\n      g.classList.add('is-active'); g.classList.remove('is-dim');\n    } else {\n      g.classList.add('is-dim'); g.classList.remove('is-active');\n    }\n  });\n}\n\nfunction _attachChartListeners(container) {\n  if (_chartListenersAttached) return;\n  _chartListenersAttached = true;\n\n  container.addEventListener('mouseover', (e) => {\n    const g = e.target.closest('.chart-clickable');\n    if (!g) return;\n    const id = g.getAttribute('data-eng');\n    if (!id) return;\n    _setChartFocus(id);\n    _showChartTip(id, e.clientX, e.clientY);\n  });\n  container.addEventListener('mousemove', (e) => {\n    const g = e.target.closest('.chart-clickable');\n    if (g) _moveChartTip(e.clientX, e.clientY);\n  });\n  container.addEventListener('mouseleave', () => {\n    _setChartFocus(null);\n    _hideChartTip();\n  });\n  container.addEventListener('click', (e) => {\n    const g = e.target.closest('.chart-clickable');\n    if (!g) return;\n    const id = g.getAttribute('data-eng');\n    if (!id) return;\n    _hideChartTip();\n    _showChartDrilldown(id);\n  });\n}\n\nfunction _showChartDrilldown(engId) {\n  const panel = document.getElementById('chartDrilldown');\n  if (!panel) return;\n  const eng = data.engineers.find(e => e.id === engId);\n  if (!eng) return;\n\n  // Toggle off if clicking same engineer twice\n  if (_chartDrilldownEngId === engId && panel.classList.contains('open')) {\n    _hideChartDrilldown();\n    return;\n  }\n  _chartDrilldownEngId = engId;\n\n  const s = _engStats(eng);\n  const avatarText = eng.initials || '?';\n\n  // Sort tasks: in-progress first, then waiting, hold, none, done\n  const order = { prog:0, wait:1, hold:2, none:3, done:4 };\n  const sortedTasks = s.tasks.slice().sort((a, b) =>\n    (order[a.status] ?? 5) - (order[b.status] ?? 5)\n  );\n  const STATUS_LBL = {\n    done: '✅ Done', prog: '🔄 Progress', wait: '⏳ Waiting',\n    hold: '🔴 Hold', none: '⬜ Not started'\n  };\n  const taskHTML = sortedTasks.length\n    ? sortedTasks.slice(0, 12).map(t => `\n        <div class=\"cdd-task\">\n          <span class=\"cdd-task-name\">${_esc(t.task || t.name || t.title || 'Untitled')}${t.priority === 'high' ? ' <span style=\"color:var(--prio-c)\">🔥<\u002Fspan>' : ''}<\u002Fspan>\n          <span class=\"cdd-task-status st-${t.status || 'none'}\">${STATUS_LBL[t.status] || STATUS_LBL.none}<\u002Fspan>\n        <\u002Fdiv>\n      `).join('') + (sortedTasks.length > 12\n        ? `<div class=\"cdd-task\" style=\"justify-content:center;color:var(--gray-50);font-style:italic\">+${sortedTasks.length - 12} more — open Tasks tab<\u002Fdiv>`\n        : '')\n    : `<div class=\"cdd-empty\">No tasks assigned yet<\u002Fdiv>`;\n\n  panel.innerHTML = `\n    <div class=\"cdd-hdr\">\n      <div class=\"cdd-title-row\">\n        <div class=\"cdd-avatar\">${avatarText}<\u002Fdiv>\n        <div>\n          <div class=\"cdd-name\">${_esc(eng.name)}<\u002Fdiv>\n          <div class=\"cdd-sub\">${s.util}% utilization · ${s.total} task${s.total === 1 ? '' : 's'}${s.projects.length ? ` · ${s.projects.length} project${s.projects.length === 1 ? '' : 's'}` : ''}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"cdd-close\" onclick=\"_hideChartDrilldown()\" aria-label=\"Close\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"cdd-stats\">\n      <div class=\"cdd-stat\"><div class=\"cdd-stat-num\">${s.counts.prog || 0}<\u002Fdiv><div class=\"cdd-stat-lbl\">In Progress<\u002Fdiv><\u002Fdiv>\n      <div class=\"cdd-stat\"><div class=\"cdd-stat-num\">${s.counts.wait || 0}<\u002Fdiv><div class=\"cdd-stat-lbl\">Waiting<\u002Fdiv><\u002Fdiv>\n      <div class=\"cdd-stat\" style=\"${s.counts.hold ? 'border-color:var(--hold-c)' : ''}\"><div class=\"cdd-stat-num\" style=\"${s.counts.hold ? 'color:var(--hold-c)' : ''}\">${s.counts.hold || 0}<\u002Fdiv><div class=\"cdd-stat-lbl\">On Hold<\u002Fdiv><\u002Fdiv>\n      <div class=\"cdd-stat\"><div class=\"cdd-stat-num\" style=\"color:var(--done-c)\">${s.counts.done || 0}<\u002Fdiv><div class=\"cdd-stat-lbl\">Done<\u002Fdiv><\u002Fdiv>\n      <div class=\"cdd-stat\" style=\"${s.highPrio ? 'border-color:var(--prio-c)' : ''}\"><div class=\"cdd-stat-num\" style=\"${s.highPrio ? 'color:var(--prio-c)' : ''}\">${s.highPrio}<\u002Fdiv><div class=\"cdd-stat-lbl\">High Prio<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cdd-tasks\">${taskHTML}<\u002Fdiv>\n    <div class=\"cdd-actions\">\n      <button class=\"cdd-btn-ghost cdd-btn\" onclick=\"_hideChartDrilldown()\">Close<\u002Fbutton>\n      <button class=\"cdd-btn\" onclick=\"goToEngineer('${eng.id}')\">Open in Tasks tab →<\u002Fbutton>\n    <\u002Fdiv>`;\n  panel.classList.add('open');\n}\n\nfunction _hideChartDrilldown() {\n  const panel = document.getElementById('chartDrilldown');\n  if (panel) panel.classList.remove('open');\n  _chartDrilldownEngId = null;\n}\n\nfunction renderUtilChart() {\n  const container = _chartContainer();\n  if (!container) return;\n  _attachChartListeners(container);\n\n  // Sync the switch buttons to the current view (in case of first load)\n  document.querySelectorAll('.cvs-btn').forEach(b => {\n    b.classList.toggle('active', b.dataset.view === _chartView);\n  });\n\n  const engs = data.engineers;\n  const n    = engs.length;\n  if (!n) { container.innerHTML = ''; return; }\n\n  const dark = document.body.classList.contains('dark');\n  const ctx = {\n    gridC: dark ? '#333' : '#EEE',\n    axisC: dark ? '#555' : '#CCC',\n    textC: dark ? '#AAA' : '#666',\n    lblC:  dark ? '#888' : '#999',\n    dark\n  };\n\n  // View-morph fade: only animate fade if container already has content\n  // (i.e. user is switching views; first render doesn't need a swap fade)\n  const hasContent = container.children.length > 0;\n\n  const doRender = () => {\n    switch (_chartView) {\n      case 'donut': _renderDonut(container, engs, ctx); break;\n      case 'pie':   _renderPie  (container, engs, ctx); break;\n      case 'hbar':  _renderHBar (container, engs, ctx); break;\n      case 'bar':\n      default:      _renderBar  (container, engs, ctx); break;\n    }\n    container.classList.remove('is-swapping');\n  };\n\n  if (hasContent) {\n    container.classList.add('is-swapping');\n    setTimeout(doRender, 200);\n  } else {\n    doRender();\n  }\n}\n\n/* ═════ VIEW 1: VERTICAL BARS ═════ */\nfunction _renderBar(container, engs, c) {\n  const W = container.parentElement.clientWidth - 40 || 500;\n  const H = 220;\n  const n = engs.length;\n\n  const leftPad=44, rightPad=12, topPad=24, botPad=30;\n  const chartH = H - topPad - botPad;\n  const chartW = W - leftPad - rightPad;\n  const barW   = Math.min(60, chartW / n - 16);\n  const gap    = (chartW - n * barW) / (n + 1);\n\n  let svg = `<svg viewBox=\"0 0 ${W} ${H}\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:${H}px;display:block\">`;\n  [25,50,75,100].forEach(pct => {\n    const y = topPad + chartH - (pct/100) * chartH;\n    svg += `<line x1=\"${leftPad}\" y1=\"${y}\" x2=\"${W-rightPad}\" y2=\"${y}\" stroke=\"${c.gridC}\" stroke-width=\"1\"/>\n            <text x=\"${leftPad-6}\" y=\"${y+3}\" font-size=\"9\" fill=\"${c.lblC}\" text-anchor=\"end\">${pct}%<\u002Ftext>`;\n  });\n  svg += `<line x1=\"${leftPad}\" y1=\"${topPad+chartH}\" x2=\"${W-rightPad}\" y2=\"${topPad+chartH}\" stroke=\"${c.axisC}\" stroke-width=\"1\"/>`;\n\n  engs.forEach((eng, i) => {\n    const u  = getUtil(eng).value;\n    const x  = leftPad + gap * (i+1) + barW * i;\n    const bH = Math.max((Math.min(u,100)/100) * chartH, 2);\n    const y  = topPad + chartH - bH;\n    const col = _utilColor(u);\n    const name = eng.name.split(' ')[0];\n    const delay = i * 70;\n    svg += `<g class=\"chart-clickable\" data-eng=\"${eng.id}\">`;\n    // Invisible hit area covering full column\n    svg += `<rect x=\"${x-4}\" y=\"${topPad}\" width=\"${barW+8}\" height=\"${chartH+14}\" fill=\"transparent\"/>`;\n    svg += `<rect x=\"${x}\" y=\"${y}\" width=\"${barW}\" height=\"${bH}\" rx=\"3\" fill=\"${col}\" opacity=\"0.88\" class=\"chart-bar anim\" style=\"animation-delay:${delay}ms\"/>`;\n    svg += `<text x=\"${x+barW/2}\" y=\"${y-6}\" font-size=\"11\" fill=\"${col}\" text-anchor=\"middle\" font-weight=\"700\" style=\"opacity:0;animation:fadeInUp .4s ${delay+250}ms forwards\">${u}%<\u002Ftext>`;\n    svg += `<text x=\"${x+barW/2}\" y=\"${H-10}\" font-size=\"10\" fill=\"${c.textC}\" text-anchor=\"middle\" class=\"chart-name-label\">${_esc(name)}<\u002Ftext>`;\n    if (bH > 30) svg += `<text x=\"${x+barW/2}\" y=\"${y+bH/2+4}\" font-size=\"11\" fill=\"white\" text-anchor=\"middle\" font-weight=\"700\" opacity=\"0.95\" style=\"pointer-events:none\">${_esc(eng.initials)}<\u002Ftext>`;\n    svg += `<\u002Fg>`;\n  });\n  svg += '<\u002Fsvg>';\n  container.innerHTML = svg;\n}\n\n/* ═════ VIEW 2: HORIZONTAL BARS ═════ */\nfunction _renderHBar(container, engs, c) {\n  const W = container.parentElement.clientWidth - 40 || 500;\n  const n = engs.length;\n  const rowH = 34;\n  const topPad = 8, botPad = 14;\n  const H = topPad + botPad + n * rowH;\n  const labelW = 110;\n  const barLeft = labelW + 8;\n  const barRight = 60;\n  const barAreaW = W - barLeft - barRight;\n\n  let svg = `<svg viewBox=\"0 0 ${W} ${H}\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:${H}px;display:block\">`;\n  [25,50,75,100].forEach(pct => {\n    const x = barLeft + (pct/100) * barAreaW;\n    svg += `<line x1=\"${x}\" y1=\"${topPad}\" x2=\"${x}\" y2=\"${H-botPad+2}\" stroke=\"${c.gridC}\" stroke-width=\"1\" stroke-dasharray=\"2,3\"/>`;\n    svg += `<text x=\"${x}\" y=\"${H-2}\" font-size=\"9\" fill=\"${c.lblC}\" text-anchor=\"middle\">${pct}%<\u002Ftext>`;\n  });\n\n  engs.forEach((eng, i) => {\n    const u = getUtil(eng).value;\n    const y = topPad + i * rowH + 6;\n    const bH = rowH - 14;\n    const bW = Math.max((Math.min(u,100)/100) * barAreaW, 2);\n    const col = _utilColor(u);\n    const delay = i * 70;\n    svg += `<g class=\"chart-clickable\" data-eng=\"${eng.id}\">`;\n    svg += `<rect x=\"0\" y=\"${y-3}\" width=\"${W}\" height=\"${bH+6}\" fill=\"transparent\"/>`;\n    svg += `<text x=\"${labelW-4}\" y=\"${y + bH/2 + 4}\" font-size=\"11\" fill=\"${c.textC}\" text-anchor=\"end\" font-weight=\"600\" class=\"chart-name-label\">${_esc(eng.name.split(' ')[0])}<\u002Ftext>`;\n    svg += `<rect x=\"${barLeft}\" y=\"${y}\" width=\"${barAreaW}\" height=\"${bH}\" fill=\"${c.gridC}\" opacity=\"0.4\" rx=\"2\"/>`;\n    svg += `<rect x=\"${barLeft}\" y=\"${y}\" width=\"${bW}\" height=\"${bH}\" fill=\"${col}\" opacity=\"0.9\" rx=\"2\" class=\"chart-bar chart-hbar anim\" style=\"animation-delay:${delay}ms\"/>`;\n    svg += `<text x=\"${barLeft + bW + 6}\" y=\"${y + bH/2 + 4}\" font-size=\"11\" fill=\"${col}\" font-weight=\"700\" style=\"opacity:0;animation:fadeInUp .4s ${delay+280}ms forwards\">${u}%<\u002Ftext>`;\n    svg += `<\u002Fg>`;\n  });\n  svg += '<\u002Fsvg>';\n  container.innerHTML = svg;\n}\n\n/* ═════ VIEW 3: DONUT ═════ */\nfunction _renderDonut(container, engs, c) {\n  return _renderPieLike(container, engs, c, /*donut*/true);\n}\n/* ═════ VIEW 4: PIE ═════ */\nfunction _renderPie(container, engs, c) {\n  return _renderPieLike(container, engs, c, /*donut*/false);\n}\n\nfunction _renderPieLike(container, engs, c, isDonut) {\n  const W = container.parentElement.clientWidth - 40 || 500;\n  const H = 260;\n  const cx = Math.min(W, 340) / 2 + 10;\n  const cy = H / 2;\n  const R  = Math.min(cx - 10, cy - 10, 100);\n  const rInner = isDonut ? R * 0.58 : 0;\n\n  const total = engs.reduce((s, e) => s + getUtil(e).value, 0);\n  let svg = `<svg viewBox=\"0 0 ${W} ${H}\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:${H}px;display:block\">`;\n\n  if (total === 0) {\n    svg += `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${R}\" fill=\"${c.gridC}\"/>`;\n    if (isDonut) svg += `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${rInner}\" fill=\"${c.dark?'#1A1A2E':'white'}\"/>`;\n    svg += `<text x=\"${cx}\" y=\"${cy+5}\" font-size=\"14\" fill=\"${c.textC}\" text-anchor=\"middle\">No data<\u002Ftext>`;\n    svg += '<\u002Fsvg>';\n    container.innerHTML = svg;\n    return;\n  }\n\n  let acc = -Math.PI / 2;\n  engs.forEach((eng, i) => {\n    const u = getUtil(eng).value;\n    if (u === 0) return;\n    const frac = u / total;\n    const theta = frac * Math.PI * 2;\n    const x1 = cx + R * Math.cos(acc);\n    const y1 = cy + R * Math.sin(acc);\n    const x2 = cx + R * Math.cos(acc + theta);\n    const y2 = cy + R * Math.sin(acc + theta);\n    const largeArc = theta > Math.PI ? 1 : 0;\n    const col = _utilColor(u);\n    const delay = i * 80;\n\n    let path;\n    if (isDonut) {\n      const ix1 = cx + rInner * Math.cos(acc);\n      const iy1 = cy + rInner * Math.sin(acc);\n      const ix2 = cx + rInner * Math.cos(acc + theta);\n      const iy2 = cy + rInner * Math.sin(acc + theta);\n      path = `M ${x1} ${y1} A ${R} ${R} 0 ${largeArc} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${rInner} ${rInner} 0 ${largeArc} 0 ${ix1} ${iy1} Z`;\n    } else {\n      path = `M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${largeArc} 1 ${x2} ${y2} Z`;\n    }\n    svg += `<g class=\"chart-clickable\" data-eng=\"${eng.id}\">`;\n    svg += `<path d=\"${path}\" fill=\"${col}\" opacity=\"0.92\" stroke=\"${c.dark?'#1A1A2E':'white'}\" stroke-width=\"2\" class=\"chart-wedge anim\" style=\"animation-delay:${delay}ms\"/>`;\n\n    if (frac > 0.06) {\n      const midA = acc + theta / 2;\n      const labelR = isDonut ? (R + rInner) / 2 : R * 0.65;\n      const lx = cx + labelR * Math.cos(midA);\n      const ly = cy + labelR * Math.sin(midA);\n      svg += `<text x=\"${lx}\" y=\"${ly+4}\" font-size=\"11\" font-weight=\"700\" fill=\"white\" text-anchor=\"middle\" style=\"pointer-events:none;opacity:0;animation:fadeInUp .35s ${delay+250}ms forwards\">${_esc(eng.initials)}<\u002Ftext>`;\n    }\n    svg += `<\u002Fg>`;\n    acc += theta;\n  });\n\n  // Donut center — show team average\n  if (isDonut) {\n    const avg = Math.round(total / engs.length);\n    svg += `<text x=\"${cx}\" y=\"${cy-4}\" font-size=\"24\" font-weight=\"700\" fill=\"${_utilColor(avg)}\" text-anchor=\"middle\" style=\"opacity:0;animation:fadeInUp .4s 600ms forwards\">${avg}%<\u002Ftext>`;\n    svg += `<text x=\"${cx}\" y=\"${cy+14}\" font-size=\"9\" fill=\"${c.lblC}\" text-anchor=\"middle\" letter-spacing=\"0.05em\" style=\"opacity:0;animation:fadeInUp .4s 700ms forwards\">TEAM AVG<\u002Ftext>`;\n  }\n\n  // Legend\n  const legX = cx + R + 20;\n  if (legX < W - 60) {\n    engs.forEach((eng, i) => {\n      const u = getUtil(eng).value;\n      const ly = cy - (engs.length * 18) / 2 + i * 20 + 10;\n      const col = _utilColor(u);\n      const delay = 300 + i * 60;\n      svg += `<g class=\"chart-clickable\" data-eng=\"${eng.id}\" style=\"opacity:0;animation:fadeInUp .35s ${delay}ms forwards\">`;\n      svg += `<rect x=\"${legX-4}\" y=\"${ly-12}\" width=\"${W-legX+4}\" height=\"22\" fill=\"transparent\"/>`;\n      svg += `<rect x=\"${legX}\" y=\"${ly-8}\" width=\"11\" height=\"11\" rx=\"2\" fill=\"${col}\"/>`;\n      svg += `<text x=\"${legX+18}\" y=\"${ly}\" font-size=\"11\" fill=\"${c.textC}\" class=\"chart-name-label\">${_esc(eng.name.split(' ')[0])}<\u002Ftext>`;\n      svg += `<text x=\"${legX+18}\" y=\"${ly+11}\" font-size=\"9\" fill=\"${c.lblC}\">${u}% util<\u002Ftext>`;\n      svg += `<\u002Fg>`;\n    });\n  }\n\n  svg += '<\u002Fsvg>';\n  container.innerHTML = svg;\n}\n\n/* ── BLOCKERS LIST ──────────────────────────────────────────── */\n/* Helper: render avatar markup — initials always (photos removed). */\nfunction _avHTML(eng, cls, extra='') {\n  if (!eng) return `<div class=\"${cls}\" ${extra}>?<\u002Fdiv>`;\n  return `<div class=\"${cls}\" ${extra}>${eng.initials || '?'}<\u002Fdiv>`;\n}\n\nfunction renderBlockersList() {\n  const el = document.getElementById('blockerList');\n  const cnt = document.getElementById('blockerCount');\n  if (!el) return;\n  const blocked = data.tasks.filter(t => t.status === 'hold');\n  if (cnt) cnt.textContent = blocked.length ? `${blocked.length} on-hold` : '';\n  if (!blocked.length) { el.innerHTML = `<div class=\"dli-empty\">✅ No tasks on hold<\u002Fdiv>`; return; }\n  el.innerHTML = blocked.map(t => {\n    const eng  = data.engineers.find(e => e.id === t.engId);\n    const notes = t.notes ? t.notes.split('\\n')[0].replace(/^[\\•\\-\\*\\>]+\\s*/,'').slice(0,80) : '';\n    const firstName = eng?.name ? eng.name.split(' ')[0] : '';\n    const avExtra = `onclick=\"event.stopPropagation();goToEngineer('${eng?.id||''}')\" title=\"Jump to ${_esc(firstName)}'s tasks\"`;\n    return `<div class=\"dash-list-item dli-clickable\" onclick=\"goToTask('${t.id}')\" title=\"Jump to this task\">\n      ${_avHTML(eng, 'dli-av', avExtra)}\n      <div class=\"dli-body\">\n        <div class=\"dli-task\">${_esc(t.task)}<\u002Fdiv>\n        <div class=\"dli-meta\"><span class=\"dli-name-link\" onclick=\"event.stopPropagation();goToEngineer('${eng?.id||''}')\">${_esc(eng?.name||'')}<\u002Fspan> · <span style=\"color:var(--orange)\">${_esc(t.project)}<\u002Fspan>${notes?` · ${_esc(notes)}`:''}<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"dli-badge\" style=\"background:var(--hold-bg);color:var(--hold-c)\">On Hold<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ── OVERDUE LIST ───────────────────────────────────────────── */\nfunction renderOverdueList() {\n  const el  = document.getElementById('overdueList');\n  const cnt = document.getElementById('overdueCount');\n  if (!el) return;\n  const today   = new Date(); today.setHours(0,0,0,0);\n  const overdue = data.tasks.filter(t => t.date && new Date(t.date) < today && t.status !== 'done');\n  if (cnt) cnt.textContent = overdue.length ? `${overdue.length} tasks` : '';\n  if (!overdue.length) { el.innerHTML = `<div class=\"dli-empty\">✅ No overdue tasks<\u002Fdiv>`; return; }\n  el.innerHTML = overdue.map(t => {\n    const eng  = data.engineers.find(e => e.id === t.engId);\n    const days = Math.floor((today - new Date(t.date)) / 86400000);\n    const avExtra = `onclick=\"event.stopPropagation();goToEngineer('${eng?.id||''}')\"`;\n    return `<div class=\"dash-list-item dli-clickable\" onclick=\"goToTask('${t.id}')\">\n      ${_avHTML(eng, 'dli-av', avExtra)}\n      <div class=\"dli-body\">\n        <div class=\"dli-task\">${_esc(t.task)}<\u002Fdiv>\n        <div class=\"dli-meta\"><span class=\"dli-name-link\" onclick=\"event.stopPropagation();goToEngineer('${eng?.id||''}')\">${_esc(eng?.name||'')}<\u002Fspan> · ${_esc(t.project)} · Due: ${_esc(t.date)}<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"dli-badge\" style=\"background:var(--hold-bg);color:var(--hold-c)\">${days}d late<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ── HIGH PRIORITY LIST ─────────────────────────────────────── */\nfunction renderPrioList() {\n  const el  = document.getElementById('prioList');\n  const cnt = document.getElementById('prioCount');\n  if (!el) return;\n  const prios = data.tasks.filter(t => t.priority === 'high' && t.status !== 'done');\n  if (cnt) cnt.textContent = prios.length ? `${prios.length} tasks` : '';\n  if (!prios.length) { el.innerHTML = `<div class=\"dli-empty\">No high priority open tasks<\u002Fdiv>`; return; }\n  el.innerHTML = prios.map(t => {\n    const eng = data.engineers.find(e => e.id === t.engId);\n    const SM  = {done:'✅',prog:'🔄',wait:'⏳',hold:'🔴',none:'⬜'};\n    const avExtra = `onclick=\"event.stopPropagation();goToEngineer('${eng?.id||''}')\"`;\n    return `<div class=\"dash-list-item dli-clickable\" onclick=\"goToTask('${t.id}')\">\n      ${_avHTML(eng, 'dli-av', avExtra)}\n      <div class=\"dli-body\">\n        <div class=\"dli-task\">🔥 ${_esc(t.task)}<\u002Fdiv>\n        <div class=\"dli-meta\"><span class=\"dli-name-link\" onclick=\"event.stopPropagation();goToEngineer('${eng?.id||''}')\">${_esc(eng?.name||'')}<\u002Fspan> · ${_esc(t.project)} ${t.date?`· Due: ${_esc(t.date)}`:''}<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"dli-badge\" style=\"background:var(--prog-bg);color:var(--prog-c)\">${SM[t.status]||''} ${_esc(t.status)}<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ── MEETING SUMMARY ────────────────────────────────────────── */\nfunction renderMeetingSummary() {\n  const el = document.getElementById('meetingSummary');\n  if (!el) return;\n  const today    = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});\n  const SM       = {done:'✅ Done',prog:'🔄 In Progress',wait:'⏳ Waiting',hold:'🔴 ON HOLD',none:'⬜ Not Started'};\n  const all      = data.tasks;\n  const blocked  = all.filter(t => t.status==='hold');\n  const overdue  = all.filter(t => { const d=t.date&&new Date(t.date); const n=new Date(); n.setHours(0,0,0,0); return d&&d<n&&t.status!=='done'; });\n  const prios    = all.filter(t => t.priority==='high'&&t.status!=='done');\n\n  let html = `<div style=\"font-size:11px;color:var(--gray-30);margin-bottom:14px\">Engineering Weekly — ${today} · Auto-generated from live task data<\u002Fdiv>`;\n\n  // Executive summary\n  html += `<div class=\"ms-section\">\n    <div class=\"ms-eng\">📊 Executive Summary<\u002Fdiv>\n    <ul class=\"ms-bullets\">\n      <li>Total tasks: <b>${all.length}<\u002Fb> across <b>${data.engineers.length}<\u002Fb> engineers<\u002Fli>\n      <li class=\"${blocked.length?'ms-blocked':''}\">Tasks on hold: <b>${blocked.length}<\u002Fb>${blocked.length?' — review needed':' — none'}<\u002Fli>\n      <li class=\"${overdue.length?'ms-blocked':''}\">Overdue tasks: <b>${overdue.length}<\u002Fb>${overdue.length?' — action needed':' — all on track'}<\u002Fli>\n      <li class=\"${prios.length?'ms-prio':''}\">High priority open: <b>${prios.length}<\u002Fb><\u002Fli>\n      <li>Overall completion: <b>${all.length?Math.round(all.filter(t=>t.status==='done').length/all.length*100):0}%<\u002Fb><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>`;\n\n  // Per-engineer\n  data.engineers.forEach(eng => {\n    const tasks   = data.tasks.filter(t => t.engId === eng.id);\n    if (!tasks.length) return;\n    const {value:u} = getUtil(eng);\n    const done    = tasks.filter(t => t.status==='done');\n    const inprog  = tasks.filter(t => t.status==='prog');\n    const blk     = tasks.filter(t => t.status==='hold');\n    const waiting = tasks.filter(t => t.status==='wait');\n\n    html += `<div class=\"ms-section\"><div class=\"ms-eng\">\n      <span style=\"background:var(--orange);color:white;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700\">${_esc(eng.initials)}<\u002Fspan>\n      ${_esc(eng.name)} <span style=\"font-size:10px;color:var(--gray-50);font-weight:400\">${u}% utilization · ${tasks.length} tasks<\u002Fspan>\n    <\u002Fdiv><ul class=\"ms-bullets\">`;\n\n    if (done.length)    html += done.map(t    => `<li class=\"ms-done\">✅ DONE: ${_esc(t.task)} (${_esc(t.project)})<\u002Fli>`).join('');\n    if (inprog.length)  html += inprog.map(t  => `<li>🔄 IN PROGRESS: ${_esc(t.task)} (${_esc(t.project)})<\u002Fli>`).join('');\n    if (waiting.length) html += waiting.map(t => `<li>⏳ WAITING: ${_esc(t.task)} (${_esc(t.project)})${t.notes?' — '+_esc(t.notes.split('\\n')[0].replace(/^[\\•\\-\\*]+\\s*/,'').slice(0,60)):''}<\u002Fli>`).join('');\n    if (blk.length)     html += blk.map(t     => `<li class=\"ms-blocked\">🔴 ON HOLD: ${_esc(t.task)} (${_esc(t.project)})${t.notes?' — '+_esc(t.notes.split('\\n')[0].replace(/^[\\•\\-\\*]+\\s*/,'').slice(0,60)):''}<\u002Fli>`).join('');\n\n    html += `<\u002Ful><\u002Fdiv>`;\n  });\n\n  // On-hold tasks needing action\n  if (blocked.length) {\n    html += `<div class=\"ms-section\"><div class=\"ms-eng\" style=\"color:var(--hold-c)\">🔴 On-Hold Tasks Requiring Action<\u002Fdiv><ul class=\"ms-bullets\">`;\n    blocked.forEach(t => {\n      const eng = data.engineers.find(e=>e.id===t.engId);\n      const note = t.notes ? t.notes.split('\\n')[0].replace(/^[\\•\\-\\*]+\\s*/,'').slice(0,100) : '';\n      html += `<li class=\"ms-blocked\">${_esc(eng?.name||'')} — ${_esc(t.task)}: ${_esc(note||'No details provided')}<\u002Fli>`;\n    });\n    html += `<\u002Ful><\u002Fdiv>`;\n  }\n\n  el.innerHTML = html;\n}\n\nfunction copyMeetingSummary() {\n  const el = document.getElementById('meetingSummary');\n  if (!el) return;\n  // Build plain text version\n  const plain = el.innerText;\n  navigator.clipboard.writeText(plain)\n    .then(() => toast('Meeting summary copied to clipboard','success'))\n    .catch(() => toast('Copy failed — try selecting and copying manually','error'));\n}\n\nfunction renderPolicies() {\n  const list = document.getElementById('policyList');\n  list.innerHTML = '';\n  data.policies.forEach(p => {\n    list.innerHTML += `\n    <div class=\"policy-row\">\n      <div class=\"policy-icon\">${_esc(p.icon)}<\u002Fdiv>\n      <div class=\"policy-body\">\n        <div class=\"policy-text\">${_esc(p.text)}<\u002Fdiv>\n        <div class=\"policy-meta\">Applies to: ${_esc(p.meta)}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"policy-actions\">\n        <button class=\"icon-btn\" onclick=\"openEditPolicy('${p.id}')\">✎<\u002Fbutton>\n        <button class=\"icon-btn del\" onclick=\"deletePolicyById('${p.id}')\">🗑<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  });\n}\n\n/* ══ NOTES EDITOR HELPERS ═════════════════════════════════════ */\nfunction saveNotesField(taskId, el) {\n  el.style.background = '';\n  // Remove placeholder if present\n  const ph = el.querySelector('.notes-empty');\n  if (ph) { ph.remove(); }\n  const plain = htmlToNotes(el.innerHTML);\n  updateField(taskId, 'notes', plain);\n  // Re-render as bullets\n  const t = data.tasks.find(x => x.id === taskId);\n  if (t) el.innerHTML = t.notes ? notesToHTML(t.notes) : '<span class=\"notes-empty\">Add notes…<\u002Fspan>';\n}\n\nfunction handleNotesPaste(e, el) {\n  e.preventDefault();\n  const text = (e.clipboardData || window.clipboardData).getData('text/plain');\n  if (!text) return;\n  // Remove placeholder\n  const ph = el.querySelector('.notes-empty');\n  if (ph) ph.remove();\n  // Split pasted text into bullets if multi-line or has bullet markers\n  const lines = text.split(/\\r?\\n/).map(l => l.trim()).filter(Boolean);\n  let html = '';\n  if (lines.length > 1 || /^[\\•\\-\\*\\>]|\\d+[\\.\\)]/.test(text.trim())) {\n    const items = lines.map(l => `<li>${escH(l.replace(/^[\\•\\-\\*\\>\\d\\.\\)]+\\s*/,''))}<\u002Fli>`).join('');\n    // Check if cursor is already inside a UL\n    const sel = window.getSelection();\n    const inList = sel.anchorNode && el.querySelector('ul');\n    if (inList) {\n      document.execCommand('insertHTML', false, items);\n    } else {\n      html = `<ul>${items}<\u002Ful>`;\n      document.execCommand('insertHTML', false, html);\n    }\n  } else {\n    document.execCommand('insertText', false, text);\n  }\n}\n\nfunction handleNotesKey(e, el) {\n  if (e.key === 'Enter') {\n    e.preventDefault();\n    const sel = window.getSelection();\n    if (!sel.rangeCount) return;\n    const inList = !!sel.anchorNode.closest?.('li') || !!sel.anchorNode.parentElement?.closest?.('li');\n    if (inList) {\n      document.execCommand('insertHTML', false, '<li><br><\u002Fli>');\n    } else {\n      // Start a bullet list on first enter if there's content\n      const txt = el.innerText.trim();\n      if (txt && !el.querySelector('ul')) {\n        const current = el.innerHTML;\n        el.innerHTML = `<ul><li>${current}<\u002Fli><li><br><\u002Fli><\u002Ful>`;\n        // Move cursor to last li\n        const lis = el.querySelectorAll('li');\n        const last = lis[lis.length-1];\n        const r = document.createRange();\n        r.setStart(last, 0); r.collapse(true);\n        sel.removeAllRanges(); sel.addRange(r);\n      } else {\n        document.execCommand('insertHTML', false, '<ul><li><br><\u002Fli><\u002Ful>');\n      }\n    }\n  }\n}\n\n/* ── helpers for insert zones ── */\nfunction insertZoneHTML(engId, afterId) {\n  const aid = afterId || '';\n  return `<tr class=\"insert-zone\" data-eng-id=\"${engId}\" data-after-id=\"${aid}\">\n    <td colspan=\"10\">\n      <div class=\"insert-bar\" onclick=\"openInsertTask('${engId}','${aid}')\">\n        <div class=\"insert-label\">＋ Insert task here<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ftd>\n  <\u002Ftr>`;\n}\n\n/* Debounced search input + one-click clear for the Tasks tab. */\nlet _searchDebounce;\nfunction onInputSearch() {\n  clearTimeout(_searchDebounce);\n  _searchDebounce = setTimeout(renderTasks, 130);\n}\nfunction clearTaskFilters() {\n  const ids = ['searchInput','filterStatus','filterPrio','filterEng'];\n  ids.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });\n  renderTasks();\n  const s = document.getElementById('searchInput');\n  if (s) s.focus();\n}\n// Press \"/\" anywhere (outside a field) to jump to task search on the Tasks tab.\ndocument.addEventListener('keydown', (e) => {\n  if (e.key !== '/' || e.metaKey || e.ctrlKey || e.altKey) return;\n  const t = e.target;\n  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;\n  const tasksPane = document.getElementById('tab-tasks');\n  const search = document.getElementById('searchInput');\n  if (tasksPane && tasksPane.classList.contains('active') && search) {\n    e.preventDefault();\n    search.focus();\n  }\n});\n\nfunction renderTasks() {\n  const q  = document.getElementById('searchInput').value.toLowerCase();\n  const fs = document.getElementById('filterStatus').value;\n  const fp = document.getElementById('filterPrio').value;\n  const fe = document.getElementById('filterEng').value;\n\n  const sel = document.getElementById('filterEng');\n  const cur = sel.value;\n  sel.innerHTML = '<option value=\"\">All Engineers<\u002Foption>';\n  data.engineers.forEach(e => { sel.innerHTML += `<option value=\"${e.id}\" ${cur===e.id?'selected':''}>${_esc(e.name)}<\u002Foption>`; });\n\n  const container = document.getElementById('taskSections');\n  container.innerHTML = '';\n\n  const engs = fe ? data.engineers.filter(e => e.id === fe) : data.engineers;\n  const tightFilter = !!(q || fs || fp === 'high');\n  let totalMatches = 0;\n\n  engs.forEach(eng => {\n    let tasks = data.tasks.filter(t => t.engId === eng.id);\n    if (fs) tasks = tasks.filter(t => t.status === fs);\n    if (fp === 'high') tasks = tasks.filter(t => t.priority === 'high');\n    if (q)  tasks = tasks.filter(t => ((t.task||'')+' '+(t.project||'')+' '+(t.notes||'')).toLowerCase().includes(q));\n    totalMatches += tasks.length;\n    // While actively searching/filtering, hide engineers with no matches\n    // so results aren't buried under empty sections.\n    if (tightFilter && tasks.length === 0) return;\n\n    const allTasks = data.tasks.filter(t => t.engId === eng.id);\n    const blocked  = allTasks.filter(t => t.status === 'hold').length;\n    const done     = allTasks.filter(t => t.status === 'done').length;\n    const prio     = allTasks.filter(t => t.priority === 'high').length;\n\n    // Build rows with insert zones interspersed\n    const filtering = q || fs || fp === 'high';\n    let bodyRows = '';\n\n    // Insert zone above first task (only when not filtering)\n    if (!filtering) bodyRows += insertZoneHTML(eng.id, '');\n\n    tasks.forEach((t, idx) => {\n      const prioClass = t.priority === 'high' ? 'high-priority-row' : '';\n      const excludedClass = t.excludeFromUtil ? 'excluded-row' : '';\n      const prioFlame = t.priority === 'high' ? '<span class=\"prio-flame\" title=\"High Priority\">🔥 <\u002Fspan>' : '';\n      const prioBtn   = `<button class=\"icon-btn ${t.priority==='high'?'prio-on':''}\" onclick=\"togglePriority('${t.id}')\" title=\"${t.priority==='high'?'Clear priority':'Mark high priority'}\">🔥<\u002Fbutton>`;\n      const excBtn    = `<button class=\"icon-btn ${t.excludeFromUtil?'exc-on':''}\" onclick=\"toggleExclude('${t.id}')\" title=\"${t.excludeFromUtil?'Include in utilization':'Exclude from utilization'}\">${t.excludeFromUtil?'∅':'⊘'}<\u002Fbutton>`;\n      const complexity = t.complexity || 'medium';\n      const progressPct = t.progressPct || 0;\n      const hideDate = !!t.hideDate;\n\n      // Status dropdown with inline styling by status\n      const sCfg = STATUS_MAP[t.status] || STATUS_MAP.none;\n      const statusSelect = `\n        <select class=\"status-select status-${sCfg.cls}\" onchange=\"updateField('${t.id}','status',this.value)\">\n          <option value=\"done\" ${t.status==='done'?'selected':''}>✅ Done<\u002Foption>\n          <option value=\"prog\" ${t.status==='prog'?'selected':''}>🔄 In Progress<\u002Foption>\n          <option value=\"wait\" ${t.status==='wait'?'selected':''}>⏳ Waiting<\u002Foption>\n          <option value=\"hold\" ${t.status==='hold'?'selected':''}>🔴 On Hold<\u002Foption>\n          <option value=\"none\" ${t.status==='none'?'selected':''}>⬜ Not Started<\u002Foption>\n        <\u002Fselect>`;\n\n      // Progress % input — only visible when status is \"prog\"\n      const progressInput = t.status === 'prog' ? `\n        <div class=\"progress-cell\">\n          <input type=\"range\" min=\"0\" max=\"100\" step=\"5\" value=\"${progressPct}\"\n            oninput=\"this.nextElementSibling.textContent=this.value+'%'\"\n            onchange=\"updateField('${t.id}','progressPct',parseInt(this.value))\"\n            class=\"progress-slider\" title=\"% complete\">\n          <span class=\"progress-label\">${progressPct}%<\u002Fspan>\n        <\u002Fdiv>` : '<span style=\"color:var(--gray-30);font-size:10px\">—<\u002Fspan>';\n\n      // Complexity dropdown\n      const complexitySelect = `\n        <select class=\"cplx-select cplx-${complexity}\" onchange=\"updateField('${t.id}','complexity',this.value)\">\n          <option value=\"low\"    ${complexity==='low'   ?'selected':''}>Low<\u002Foption>\n          <option value=\"medium\" ${complexity==='medium'?'selected':''}>Medium<\u002Foption>\n          <option value=\"high\"   ${complexity==='high'  ?'selected':''}>High<\u002Foption>\n        <\u002Fselect>`;\n\n      // Date cell — either editable input OR \"No date\" with toggle\n      const dateCell = hideDate\n        ? `<div class=\"date-hidden\" onclick=\"toggleHideDate('${t.id}')\" title=\"Click to set a date\">\n             <span style=\"color:var(--gray-30);font-size:11px;font-style:italic\">No date<\u002Fspan>\n             <button class=\"icon-btn\" style=\"margin-left:4px\" title=\"Add date\">📅<\u002Fbutton>\n           <\u002Fdiv>`\n        : `<div style=\"display:flex;align-items:center;gap:4px\">\n             <input type=\"date\" value=\"${t.date||''}\" onchange=\"updateField('${t.id}','date',this.value)\" style=\"border:1px solid var(--gray-10);border-radius:3px;padding:4px 6px;font-size:11px;color:var(--gray-70);font-family:inherit;background:var(--white);cursor:pointer;outline:none;width:125px\">\n             <button class=\"icon-btn\" onclick=\"toggleHideDate('${t.id}')\" title=\"Hide date (no specific target)\" style=\"padding:2px 5px\">✕<\u002Fbutton>\n           <\u002Fdiv>`;\n\n      bodyRows += `\n      <tr class=\"task-row ${prioClass} ${excludedClass}\" id=\"tr-${t.id}\" data-task-id=\"${t.id}\">\n        <td style=\"width:28px;padding:0 2px\">\n          <div class=\"quick-btns\">\n            <button class=\"qbtn above\" onclick=\"event.stopPropagation();openInsertTask('${eng.id}','${idx>0?tasks[idx-1].id:''}')\" title=\"Insert above\">↑<\u002Fbutton>\n            <button class=\"qbtn below\" onclick=\"event.stopPropagation();openInsertTask('${eng.id}','${t.id}')\" title=\"Insert below\">↓<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Ftd>\n        <td style=\"width:24px;padding:4px 0\">\n          <span class=\"drag-handle\" title=\"Drag to reorder\"\n            onmousedown=\"startMouseDrag(event,'${t.id}','${eng.id}')\">⠿<\u002Fspan>\n        <\u002Ftd>\n        <td>${prioFlame}<span class=\"proj-tag\" contenteditable=\"true\" style=\"outline:none;border-radius:2px;padding:1px 3px\" onblur=\"updateField('${t.id}','project',this.innerText)\">${_esc(t.project)}<\u002Fspan><\u002Ftd>\n        <td style=\"min-width:180px\"><span contenteditable=\"true\" style=\"outline:none;border-radius:2px;padding:1px 3px;display:block\" onblur=\"updateField('${t.id}','task',this.innerText)\" onfocus=\"this.style.background='var(--orange-l)'\">${_esc(t.task)}<\u002Fspan><\u002Ftd>\n        <td>${statusSelect}<\u002Ftd>\n        <td style=\"min-width:110px\">${progressInput}<\u002Ftd>\n        <td>${complexitySelect}<\u002Ftd>\n        <td style=\"min-width:140px\">${dateCell}<\u002Ftd>\n        <td class=\"notes-td\">\n          <div class=\"notes-editor\" contenteditable=\"true\"\n            onblur=\"saveNotesField('${t.id}',this)\"\n            onfocus=\"this.style.background='var(--orange-l)'\"\n            onpaste=\"handleNotesPaste(event,this)\"\n            onkeydown=\"handleNotesKey(event,this)\"\n            data-taskid=\"${t.id}\"\n          >${t.notes ? notesToHTML(t.notes) : '<span class=\"notes-empty\">Add notes…<\u002Fspan>'}<\u002Fdiv>\n        <\u002Ftd>\n        <td>\n          <div class=\"row-actions\">\n            ${prioBtn}\n            ${excBtn}\n            <button class=\"icon-btn\" onclick=\"openEditTask('${t.id}')\" title=\"Edit\">✎<\u002Fbutton>\n            <button class=\"icon-btn del\" onclick=\"deleteTaskById('${t.id}')\" title=\"Delete\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Ftd>\n      <\u002Ftr>`;\n\n      // Insert zone after each task (only when not filtering)\n      if (!filtering) bodyRows += insertZoneHTML(eng.id, t.id);\n    });\n\n    const isCollapsed = _collapsedEngs.has(eng.id);\n    const chevCls = isCollapsed ? 'chevron' : 'chevron open';\n    const bodyStyle = isCollapsed ? 'style=\"display:none\"' : '';\n    container.innerHTML += `\n    <div class=\"eng-section\" id=\"sec-${eng.id}\">\n      <div class=\"eng-hdr\" onclick=\"toggleSection('${eng.id}',event)\">\n        <div class=\"eng-hdr-left\">\n          <div class=\"eng-av\">${_esc(eng.initials)}<\u002Fdiv>\n          <div>\n            <div class=\"eng-nm\">${_esc(eng.name)}<\u002Fdiv>\n            <div class=\"eng-mt\">${(() => {\n              // Derive active projects from the engineer's actual non-done tasks.\n              const active = [...new Set(\n                allTasks.filter(t => t.status !== 'done').map(t => t.project).filter(Boolean)\n              )];\n              const projLabel = active.length\n                ? active.map(_esc).join(' / ')\n                : (allTasks.length ? 'All tasks completed' : 'No active tasks');\n              return `${getUtil(eng).value}% utilization · ${projLabel}`;\n            })()}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"eng-hdr-right\">\n          <span class=\"chip total\">${allTasks.length} task${allTasks.length!==1?'s':''}<\u002Fspan>\n          ${blocked ? `<span class=\"chip blocked\">${blocked} on-hold<\u002Fspan>` : ''}\n          ${prio    ? `<span class=\"chip prio\">🔥 ${prio}<\u002Fspan>` : ''}\n          ${done    ? `<span class=\"chip done\">${done} done<\u002Fspan>` : ''}\n          <div class=\"eng-actions\" onclick=\"event.stopPropagation()\">\n            <button class=\"icon-btn\" onclick=\"openEditEngineer('${eng.id}')\">✎<\u002Fbutton>\n          <\u002Fdiv>\n          <span class=\"${chevCls}\" id=\"chev-${eng.id}\">▼<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"body-${eng.id}\" ${bodyStyle}>\n        <table class=\"task-tbl\">\n          <thead>\n            <tr>\n              <th style=\"width:28px\"><\u002Fth>\n              <th style=\"width:24px\"><\u002Fth>\n              <th>Project<\u002Fth><th>Task / Phase<\u002Fth><th>Status<\u002Fth>\n              <th>% Done<\u002Fth><th>Complexity<\u002Fth>\n              <th>Target Date<\u002Fth><th>Notes<\u002Fth><th><\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            ${bodyRows}\n            <tr class=\"add-task-row\">\n              <td colspan=\"10\">\n                <button class=\"add-task-btn\" onclick=\"openInsertTask('${eng.id}','__end__')\">\n                  ＋ Add task for ${_esc(eng.name.split(' ')[0])}\n                <\u002Fbutton>\n              <\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  });\n\n  // Live result count + Clear affordance + friendly empty state\n  const anyFilter = !!(q || fs || fp === 'high' || fe);\n  const countEl = document.getElementById('searchCount');\n  const clearEl = document.getElementById('searchClear');\n  if (countEl) countEl.textContent = anyFilter ? `${totalMatches} match${totalMatches === 1 ? '' : 'es'}` : '';\n  if (clearEl) clearEl.style.display = anyFilter ? '' : 'none';\n  if (tightFilter && totalMatches === 0) {\n    container.innerHTML = `<div class=\"tasks-empty\">\n      <div class=\"te-ico\">🔍<\u002Fdiv>\n      <div class=\"te-title\">No tasks match your search<\u002Fdiv>\n      <div class=\"te-sub\">Try a different keyword, or clear the filters to see everything.<\u002Fdiv>\n      <button class=\"te-btn\" onclick=\"clearTaskFilters()\">✕ Clear filters<\u002Fbutton>\n    <\u002Fdiv>`;\n  }\n\n  // Refresh global lock button state after rendering sections\n  renderLockButton();\n}\n\nfunction renderRefs() {\n  const grid = document.getElementById('refSectionsGrid');\n  if (!grid) return;\n  grid.innerHTML = '';\n  if (!data.refSections) return;\n\n  data.refSections.forEach(section => {\n    const items = section.items || [];\n    let itemsHTML = '';\n\n    if (section.type === 'links') {\n      itemsHTML = items.map(l => {\n        const url = l.url || '';\n        // Validate URL scheme to block javascript: and data: URLs\n        const safeUrl = (url.startsWith('http') || url.startsWith('onenote') || url.startsWith('mailto:'))\n          ? _safeUrl(url) : null;\n        const linkEl = safeUrl\n          ? `<a class=\"ref-link\" href=\"${_esc(safeUrl)}\" target=\"_blank\" rel=\"noopener noreferrer\">↗ ${_esc(l.name)}<\u002Fa>`\n          : `<span class=\"ref-no-link\" title=\"No URL set\">⊘ No URL<\u002Fspan>`;\n        return `<div class=\"ref-row\">\n          <div class=\"ref-label\">${_esc(l.name)}<\u002Fdiv>\n          <div style=\"flex:1\">${linkEl}${l.note?`<div class=\"ref-note\" style=\"margin-top:2px\">${_esc(l.note)}<\u002Fdiv>`:''}<\u002Fdiv>\n          <div class=\"row-actions\">\n            <button class=\"icon-btn\" onclick=\"openEditItem('${section.id}','${l.id}')\">✎<\u002Fbutton>\n            <button class=\"icon-btn del\" onclick=\"deleteItem('${section.id}','${l.id}')\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n      }).join('');\n    } else if (section.type === 'codes') {\n      itemsHTML = items.map(c => `\n        <div class=\"code-row\">\n          <div class=\"code-proj\">${_esc(c.proj)}<\u002Fdiv>\n          <div class=\"code-detail\">\n            <div class=\"code-val\">${_esc(c.code||'')}<\u002Fdiv>\n            <div class=\"code-owner\">${_esc(c.owner||'')}<\u002Fdiv>\n            ${c.note ? `<div class=\"code-flag\">${_esc(c.note)}<\u002Fdiv>` : ''}\n          <\u002Fdiv>\n          <div class=\"row-actions\">\n            <button class=\"icon-btn\" onclick=\"openEditItem('${section.id}','${c.id}')\">✎<\u002Fbutton>\n            <button class=\"icon-btn del\" onclick=\"deleteItem('${section.id}','${c.id}')\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>`).join('');\n    } else {\n      // Generic \"notes\" type — two fields: label + value\n      itemsHTML = items.map(i => `\n        <div class=\"ref-row\">\n          <div class=\"ref-label\">${_esc(i.label||'')}<\u002Fdiv>\n          <div style=\"flex:1;color:var(--gray-50);font-size:12px\">${_esc(i.value||'')}${i.note?`<div class=\"ref-note\" style=\"margin-top:2px\">${_esc(i.note)}<\u002Fdiv>`:''}<\u002Fdiv>\n          <div class=\"row-actions\">\n            <button class=\"icon-btn\" onclick=\"openEditItem('${section.id}','${i.id}')\">✎<\u002Fbutton>\n            <button class=\"icon-btn del\" onclick=\"deleteItem('${section.id}','${i.id}')\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>`).join('');\n    }\n\n    grid.innerHTML += `\n      <div class=\"card\">\n        <div class=\"card-hdr\">\n          <div class=\"card-hdr-title\">${_esc(section.icon||'📄')} ${_esc(section.title)}<\u002Fdiv>\n          <div style=\"display:flex;gap:4px\">\n            <button class=\"icon-btn\" onclick=\"openAddItem('${section.id}')\">＋ Add<\u002Fbutton>\n            <button class=\"icon-btn\" onclick=\"openEditSection('${section.id}')\" title=\"Edit section\">✎<\u002Fbutton>\n            <button class=\"icon-btn del\" onclick=\"deleteSection('${section.id}')\" title=\"Delete section\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>${itemsHTML || '<div class=\"dli-empty\">No items yet — click ＋ Add<\u002Fdiv>'}<\u002Fdiv>\n      <\u002Fdiv>`;\n  });\n}\n\n/* ══ REFERENCE SECTIONS — CRUD ═══════════════════════════════ */\nfunction openAddSection() {\n  _editId = null;\n  document.getElementById('rs-title').textContent = 'Add New Section';\n  document.getElementById('rs-del-btn').style.display = 'none';\n  document.getElementById('rs-name').value = '';\n  document.getElementById('rs-icon').value = '📄';\n  document.getElementById('rs-type').value = 'links';\n  openModal('sectionModal');\n}\nfunction openEditSection(sid) {\n  const s = data.refSections.find(x => x.id === sid);\n  if (!s) return;\n  _editId = sid;\n  document.getElementById('rs-title').textContent = 'Edit Section';\n  document.getElementById('rs-del-btn').style.display = '';\n  document.getElementById('rs-name').value = s.title;\n  document.getElementById('rs-icon').value = s.icon || '📄';\n  document.getElementById('rs-type').value = s.type;\n  openModal('sectionModal');\n}\nfunction saveSection() {\n  const obj = {\n    id: _editId || uid(),\n    title: document.getElementById('rs-name').value.trim(),\n    icon:  document.getElementById('rs-icon').value.trim() || '📄',\n    type:  document.getElementById('rs-type').value,\n    items: _editId ? (data.refSections.find(x => x.id === _editId)?.items || []) : []\n  };\n  if (!obj.title) { toast('Section title required','error'); return; }\n  if (!data.refSections) data.refSections = [];\n  if (_editId) {\n    const i = data.refSections.findIndex(x => x.id === _editId);\n    data.refSections[i] = obj;\n  } else {\n    data.refSections.push(obj);\n  }\n  save(); renderRefs(); closeModal('sectionModal'); toast('Section saved','success');\n}\nfunction deleteCurrentSection() {\n  if (!_editId) return;\n  if (!confirm('Delete this section and all its items?')) return;\n  data.refSections = data.refSections.filter(x => x.id !== _editId);\n  save(); renderRefs(); closeModal('sectionModal'); toast('Section deleted','success');\n}\nfunction deleteSection(sid) {\n  if (!confirm('Delete this section and all its items?')) return;\n  data.refSections = data.refSections.filter(x => x.id !== sid);\n  save(); renderRefs(); toast('Section deleted','success');\n}\n\n/* ── ITEM ADD / EDIT / DELETE ──────────────────────────────── */\nlet _currentSectionId = null;\nfunction openAddItem(sid) {\n  _editId = null; _currentSectionId = sid;\n  const s = data.refSections.find(x => x.id === sid);\n  if (!s) return;\n  configureItemModalFor(s.type);\n  clearItemModalFields();\n  document.getElementById('im-title').textContent = `Add to ${s.title}`;\n  document.getElementById('im-del-btn').style.display = 'none';\n  openModal('itemModal');\n}\nfunction openEditItem(sid, itemId) {\n  const s = data.refSections.find(x => x.id === sid); if (!s) return;\n  const it = (s.items||[]).find(x => x.id === itemId); if (!it) return;\n  _editId = itemId; _currentSectionId = sid;\n  configureItemModalFor(s.type);\n  document.getElementById('im-title').textContent = `Edit in ${s.title}`;\n  document.getElementById('im-del-btn').style.display = '';\n  if (s.type === 'links') {\n    document.getElementById('im-f1').value = it.name || '';\n    document.getElementById('im-f2').value = it.url  || '';\n    document.getElementById('im-f3').value = it.note || '';\n  } else if (s.type === 'codes') {\n    document.getElementById('im-f1').value = it.proj  || '';\n    document.getElementById('im-f2').value = it.code  || '';\n    document.getElementById('im-f3').value = it.owner || '';\n    document.getElementById('im-f4').value = it.note  || '';\n  } else {\n    document.getElementById('im-f1').value = it.label || '';\n    document.getElementById('im-f2').value = it.value || '';\n    document.getElementById('im-f3').value = it.note  || '';\n  }\n  openModal('itemModal');\n}\nfunction configureItemModalFor(type) {\n  const labels = {\n    links: ['Display Name','URL (https://… or onenote://)','Short Note (optional)'],\n    codes: ['Project / Task','Code','Owner (email)','Flag / Note'],\n    notes: ['Label','Value','Note (optional)']\n  };\n  const set = labels[type] || labels.notes;\n  document.getElementById('im-l1').textContent = set[0];\n  document.getElementById('im-l2').textContent = set[1];\n  document.getElementById('im-l3').textContent = set[2];\n  document.getElementById('im-row4').style.display = type === 'codes' ? '' : 'none';\n  if (type === 'codes') document.getElementById('im-l4').textContent = set[3];\n}\nfunction clearItemModalFields() {\n  ['im-f1','im-f2','im-f3','im-f4'].forEach(i => document.getElementById(i).value='');\n}\nfunction saveItem() {\n  const s = data.refSections.find(x => x.id === _currentSectionId);\n  if (!s) return;\n  const f1 = document.getElementById('im-f1').value.trim();\n  const f2 = document.getElementById('im-f2').value.trim();\n  const f3 = document.getElementById('im-f3').value.trim();\n  const f4 = document.getElementById('im-f4').value.trim();\n  if (!f1) { toast('First field required','error'); return; }\n\n  let obj = { id: _editId || uid() };\n  if (s.type === 'links')      { obj.name = f1; obj.url = f2; obj.note = f3; }\n  else if (s.type === 'codes') { obj.proj = f1; obj.code = f2; obj.owner = f3; obj.note = f4; }\n  else                         { obj.label = f1; obj.value = f2; obj.note = f3; }\n\n  if (!s.items) s.items = [];\n  if (_editId) {\n    const i = s.items.findIndex(x => x.id === _editId);\n    s.items[i] = obj;\n  } else {\n    s.items.push(obj);\n  }\n  save(); renderRefs(); closeModal('itemModal'); toast('Saved','success');\n}\nfunction deleteCurrentItem() {\n  if (!_editId || !_currentSectionId) return;\n  const s = data.refSections.find(x => x.id === _currentSectionId);\n  if (!s) return;\n  s.items = (s.items||[]).filter(x => x.id !== _editId);\n  save(); renderRefs(); closeModal('itemModal'); toast('Deleted','success');\n}\nfunction deleteItem(sid, itemId) {\n  if (!confirm('Delete this item?')) return;\n  const s = data.refSections.find(x => x.id === sid); if (!s) return;\n  s.items = (s.items||[]).filter(x => x.id !== itemId);\n  save(); renderRefs(); toast('Deleted','success');\n}\n\n/* ══ INLINE EDIT ══════════════════════════════════════════════ */\nfunction updateField(id, field, val) {\n  const t = data.tasks.find(x => x.id === id);\n  if (!t) return;\n\n  // Global lock gate: if someone else holds the lock, refuse the edit\n  if (!canEdit()) {\n    renderTasks();  // revert the UI change by re-rendering from data\n    return;\n  }\n\n  // Normalize value by type — strings get trimmed, numbers/booleans pass through\n  const cleaned = (typeof val === 'string') ? val.trim() : val;\n  if (t[field] === cleaned) return;   // no-op if unchanged\n  const oldVal = t[field];\n  t[field] = cleaned;\n  t._localEditTs = Date.now();   // stamp for merge conflict resolution\n\n  // Log the change (changelog)\n  if (typeof logChange === 'function') {\n    logChange('task', 'update',\n      `${t.project || 'Task'}: ${field} changed`,\n      [{ field, old: oldVal, new: cleaned }]\n    );\n  }\n\n  // Auto-complete: if progress reaches 100%, promote the task to Done\n  if (field === 'progressPct' && Number(cleaned) >= 100) {\n    t.status = 'done';\n    toast('✅ Task auto-completed at 100%', 'success');\n  }\n  // If status changes away from \"In Progress\", reset progress so it doesn't linger\n  if (field === 'status' && cleaned !== 'prog' && cleaned !== 'done') {\n    t.progressPct = 0;\n  }\n  // If status flips to Done, force progress to 100 for consistency\n  if (field === 'status' && cleaned === 'done') {\n    t.progressPct = 100;\n    // 🎉 Celebrate the completion with a small confetti burst from the row\n    try {\n      const row = document.querySelector(`tr[data-task-id=\"${id}\"]`);\n      if (row) {\n        const rect = row.getBoundingClientRect();\n        _confettiBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);\n      }\n    } catch(e) {}\n  }\n\n  // Flash the row with a subtle \"saving\" then \"saved\" visual\n  _flashRowSave(id);\n\n  // Fields that change utilization/logic → push to cloud IMMEDIATELY (no 1.4s debounce)\n  // so a quick page refresh can't wipe the change\n  const criticalFields = ['progressPct','status','complexity','excludeFromUtil','priority','hideDate','date'];\n  const pushNow = criticalFields.includes(field);\n\n  // Update local fallback immediately (synchronous)\n  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n  scheduleSave(pushNow);\n\n  // Critical fields also need the task row re-rendered so the visible progress bar\n  // stays in sync after auto-completion or status changes\n  if (field === 'progressPct' || field === 'status') {\n    renderTasks();\n  }\n\n  // Always refresh
