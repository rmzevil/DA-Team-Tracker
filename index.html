 dependent dashboard widgets\n  renderUtil();\n  renderOverviewWidgets();\n  toast('Saved', 'success');\n}\n\n/* ══ TOGGLE SECTION ══════════════════════════════════════════ */\n/* ══ ENGINEER SECTION COLLAPSE STATE ═══════════════════════════\n   Persisted in localStorage so it survives renderTasks rebuilds\n   (triggered by sync ticks, edits, tab switches) and page reloads.\n   New engineers default to expanded. */\nconst LS_COLLAPSED = 'ob_collapsed_engs';\nlet _collapsedEngs = (() => {\n  try {\n    const raw = localStorage.getItem(LS_COLLAPSED);\n    return new Set(raw ? JSON.parse(raw) : []);\n  } catch (e) { return new Set(); }\n})();\nfunction _persistCollapsed() {\n  try { localStorage.setItem(LS_COLLAPSED, JSON.stringify([..._collapsedEngs])); } catch(e) {}\n}\n\nfunction toggleSection(engId, e) {\n  if (e && (e.target.closest('.eng-actions') || e.target.closest('button'))) return;\n  const body = document.getElementById('body-' + engId);\n  const chev = document.getElementById('chev-' + engId);\n  if (body.style.display === 'none') {\n    body.style.display = ''; chev.classList.add('open');\n    _collapsedEngs.delete(engId);\n  } else {\n    body.style.display = 'none'; chev.classList.remove('open');\n    _collapsedEngs.add(engId);\n  }\n  _persistCollapsed();\n}\n\nfunction expandAllSections() {\n  data.engineers.forEach(eng => {\n    const body = document.getElementById('body-' + eng.id);\n    const chev = document.getElementById('chev-' + eng.id);\n    if (body) body.style.display = '';\n    if (chev) chev.classList.add('open');\n    _collapsedEngs.delete(eng.id);\n  });\n  _persistCollapsed();\n  toast('All sections expanded', 'success');\n}\n\nfunction collapseAllSections() {\n  data.engineers.forEach(eng => {\n    const body = document.getElementById('body-' + eng.id);\n    const chev = document.getElementById('chev-' + eng.id);\n    if (body) body.style.display = 'none';\n    if (chev) chev.classList.remove('open');\n    _collapsedEngs.add(eng.id);\n  });\n  _persistCollapsed();\n  toast('All sections collapsed', 'success');\n}\n\n/* ══ MODAL HELPERS ════════════════════════════════════════════ */\nfunction openModal(id)  {\n  const el = document.getElementById(id);\n  if (!el) { console.error('openModal: element not found:', id); return; }\n  el.classList.add('open');\n\n  // Diagnostic: if there's still a high-z-index overlay above this modal that\n  // would block interaction, log it. Helps diagnose \"modal opens but inputs\n  // don't respond\" reports without needing to reproduce.\n  const lo = document.getElementById('loadingOverlay');\n  if (lo && lo.offsetParent !== null) {\n    console.warn(`[modal] ${id} opened while loadingOverlay still present — inputs may be blocked. Removing it now.`);\n    lo.remove();\n  }\n}\nfunction closeModal(id) {\n  document.getElementById(id).classList.remove('open');\n  if (id === 'taskModal') {\n    const h = document.getElementById('insert-hint-text');\n    if (h) h.remove();\n    _insertAfterTaskId = null;\n    _insertEngId = null;\n  }\n}\ndocument.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));\n\nlet _editId = null;\n\n/* UTIL MODE TOGGLE */\nfunction toggleUtilMode() {\n  const manual = document.getElementById('em-manual-toggle').checked;\n  document.getElementById('util-manual-field').style.display = manual ? '' : 'none';\n  document.getElementById('util-mode-label').textContent = manual ? 'Manual override — enter % below' : 'Auto-calculated from tasks';\n}\n\n/* ══ POINTER-BASED DRAG & DROP ════════════════════════════════\n   Uses mousemove/mouseup instead of HTML5 drag API.\n   Eliminates page-scroll, ghost-image, and double-render issues.\n══════════════════════════════════════════════════════════════ */\nlet _drag = null;  // active drag state object\n\nfunction startMouseDrag(e, taskId, engId) {\n  if (e.button !== 0) return;       // left click only\n  e.preventDefault();\n  e.stopPropagation();\n\n  const row = document.getElementById('tr-' + taskId);\n  if (!row) return;\n\n  const task = data.tasks.find(t => t.id === taskId);\n  const rect = row.getBoundingClientRect();\n\n  // Create lightweight ghost pill (NOT a clone of the whole row)\n  const ghost = document.createElement('div');\n  ghost.style.cssText = [\n    'position:fixed','pointer-events:none','z-index:9999',\n    'background:#fff','border:2px solid var(--orange)','border-radius:6px',\n    'padding:7px 16px','font-size:12px','font-weight:600',\n    'box-shadow:0 8px 28px rgba(0,0,0,0.18)','white-space:nowrap',\n    'max-width:360px','overflow:hidden','text-overflow:ellipsis',\n    `left:${e.clientX + 14}px`,`top:${e.clientY - 18}px`,\n    'transform:rotate(1.5deg)','transition:transform .1s',\n    'color:var(--gray-90)'\n  ].join(';');\n  ghost.innerHTML = `<span style=\"color:var(--orange);margin-right:6px\">⠿<\u002Fspan>${task?.project||''} — ${(task?.task||'').slice(0,48)}`;\n  document.body.appendChild(ghost);\n\n  row.classList.add('is-dragging');\n  document.body.style.userSelect = 'none';\n  document.body.style.cursor = 'grabbing';\n\n  _drag = { taskId, engId, ghost, row, dropTarget: null };\n\n  document.addEventListener('mousemove', _onDragMove, { passive: true });\n  document.addEventListener('mouseup',   _onDragUp);\n}\n\nfunction _onDragMove(e) {\n  if (!_drag) return;\n  const { ghost } = _drag;\n\n  // Move ghost with cursor\n  ghost.style.left = (e.clientX + 14) + 'px';\n  ghost.style.top  = (e.clientY - 18) + 'px';\n\n  // Clear previous drop indicators\n  document.querySelectorAll('.task-row.drag-over-top,.task-row.drag-over-bottom')\n    .forEach(r => r.classList.remove('drag-over-top','drag-over-bottom'));\n  document.querySelectorAll('.insert-zone.drop-active')\n    .forEach(z => z.classList.remove('drop-active'));\n  _drag.dropTarget = null;\n\n  // Ghost is pointer-events:none so elementFromPoint sees through it\n  const el = document.elementFromPoint(e.clientX, e.clientY);\n  if (!el) return;\n\n  const taskRow   = el.closest('.task-row');\n  const insertZone = el.closest('.insert-zone');\n\n  if (taskRow && taskRow !== _drag.row) {\n    const r = taskRow.getBoundingClientRect();\n    const above = e.clientY < r.top + r.height / 2;\n    taskRow.classList.add(above ? 'drag-over-top' : 'drag-over-bottom');\n    _drag.dropTarget = { type: 'row', el: taskRow, above };\n  } else if (insertZone) {\n    insertZone.classList.add('drop-active');\n    _drag.dropTarget = { type: 'zone', el: insertZone };\n  }\n}\n\nfunction _onDragUp(e) {\n  if (!_drag) return;\n  const { taskId, ghost, row, dropTarget } = _drag;\n\n  // Cleanup visuals\n  ghost.remove();\n  row.classList.remove('is-dragging');\n  document.body.style.userSelect = '';\n  document.body.style.cursor = '';\n  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('drag-over-top','drag-over-bottom'));\n  document.querySelectorAll('.insert-zone').forEach(z => z.classList.remove('drop-active'));\n  document.removeEventListener('mousemove', _onDragMove);\n  document.removeEventListener('mouseup',   _onDragUp);\n  _drag = null;\n\n  if (!dropTarget) return;\n\n  if (dropTarget.type === 'row') {\n    const targetId    = dropTarget.el.id.replace('tr-', '');\n    if (taskId === targetId) return;\n    const section     = dropTarget.el.closest('.eng-section');\n    const targetEngId = section ? section.id.replace('sec-', '') : '';\n\n    const srcIdx = data.tasks.findIndex(t => t.id === taskId);\n    if (srcIdx === -1) return;\n    const [moved] = data.tasks.splice(srcIdx, 1);\n    moved.engId = targetEngId;\n    const tgtIdx = data.tasks.findIndex(t => t.id === targetId);\n    data.tasks.splice(dropTarget.above ? tgtIdx : tgtIdx + 1, 0, moved);\n    save(); renderAll(); toast('Task reordered', 'success');\n    scheduleSave(true);  // immediate push after drag\n\n  } else if (dropTarget.type === 'zone') {\n    // Read engId / afterId from data attributes set on the zone\n    const zone    = dropTarget.el;\n    const zEngId  = zone.dataset.engId  || '';\n    const afterId = zone.dataset.afterId !== undefined ? zone.dataset.afterId : '__end__';\n\n    const srcIdx = data.tasks.findIndex(t => t.id === taskId);\n    if (srcIdx === -1) return;\n    const [moved] = data.tasks.splice(srcIdx, 1);\n    moved.engId = zEngId;\n\n    if (afterId === '') {\n      const firstIdx = data.tasks.findIndex(t => t.engId === zEngId);\n      data.tasks.splice(firstIdx === -1 ? 0 : firstIdx, 0, moved);\n    } else if (afterId === '__end__') {\n      const lastIdx = [...data.tasks].reduce((l, t, i) => t.engId === zEngId ? i : l, -1);\n      data.tasks.splice(lastIdx + 1, 0, moved);\n    } else {\n      const refIdx = data.tasks.findIndex(t => t.id === afterId);\n      data.tasks.splice(refIdx === -1 ? data.tasks.length : refIdx + 1, 0, moved);\n    }\n    save(); renderAll(); toast('Task moved', 'success');\n    scheduleSave(true);\n  }\n}\n\n/* ══ POSITION-AWARE INSERT ════════════════════════════════════ */\nlet _insertAfterTaskId = null;   // null = append, '' = prepend, 'txxx' = after that task\nlet _insertEngId       = null;\n\n/* Called from insert zones and ↑↓ quick buttons */\nfunction openInsertTask(engId, afterId) {\n  if (!canEdit()) return;\n  // If no engineer was specified (e.g. from keyboard shortcut), default to the first one\n  if (!engId && data.engineers.length) {\n    engId = data.engineers[0].id;\n    afterId = '__end__';\n  }\n  if (!engId) {\n    toast('Add an engineer first', 'error');\n    return;\n  }\n  _insertEngId       = engId;\n  // afterId: '' = top, '__end__' = append, 'txxx' = after that task\n  _insertAfterTaskId = afterId;\n  _editId = null;\n\n  const isTop = afterId === '';\n  const isEnd = afterId === '__end__';\n  let hint = '';\n  if (isTop)  hint = 'Will be inserted at the top';\n  else if (isEnd) hint = 'Will be appended at the bottom';\n  else {\n    const ref = data.tasks.find(t => t.id === afterId);\n    hint = ref ? `Will be inserted below \"${ref.task.slice(0,40)}…\"` : 'Will be inserted at position';\n  }\n\n  document.getElementById('taskModalTitle').textContent = 'Add Task';\n  document.getElementById('taskModalTitle').title = hint;\n  document.getElementById('tm-del-btn').style.display = 'none';\n  ['tm-proj','tm-task','tm-notes'].forEach(id => document.getElementById(id).value = '');\n  document.getElementById('tm-status').value = 'none';\n  document.getElementById('tm-prio').value   = 'normal';\n  document.getElementById('tm-date').value   = '';\n\n  // Copy project from reference task as default\n  if (afterId && afterId !== '__end__' && afterId !== '') {\n    const ref = data.tasks.find(t => t.id === afterId);\n    if (ref) document.getElementById('tm-proj').value = ref.project;\n  }\n\n  const sel = document.getElementById('tm-eng');\n  sel.innerHTML = data.engineers.map(e => `<option value=\"${e.id}\" ${e.id===engId?'selected':''}>${_esc(e.name)}<\u002Foption>`).join('');\n\n  // Show position hint below modal title\n  let hintEl = document.getElementById('insert-hint-text');\n  if (!hintEl) {\n    hintEl = document.createElement('div');\n    hintEl.id = 'insert-hint-text';\n    hintEl.style.cssText = 'font-size:11px;color:var(--orange);margin-bottom:16px;padding:6px 10px;background:var(--orange-l);border-radius:3px;border-left:3px solid var(--orange)';\n    document.getElementById('taskModalTitle').insertAdjacentElement('afterend', hintEl);\n  }\n  hintEl.textContent = '📍 ' + hint;\n\n  openModal('taskModal');\n}\n\n/* Legacy shim so old openAddTask calls still work */\nfunction openAddTask(engId) { openInsertTask(engId, '__end__'); }\nfunction openEditTask(id) {\n  if (!canEdit()) return;\n  const t = data.tasks.find(x => x.id === id);\n  if (!t) return;\n  _editId = id;\n  document.getElementById('taskModalTitle').textContent = 'Edit Task';\n  document.getElementById('tm-del-btn').style.display = '';\n  const sel = document.getElementById('tm-eng');\n  sel.innerHTML = data.engineers.map(e => `<option value=\"${e.id}\" ${e.id===t.engId?'selected':''}>${_esc(e.name)}<\u002Foption>`).join('');\n  document.getElementById('tm-proj').value   = t.project;\n  document.getElementById('tm-task').value   = t.task;\n  document.getElementById('tm-status').value = t.status;\n  document.getElementById('tm-prio').value   = t.priority || 'normal';\n  document.getElementById('tm-date').value   = t.date || '';\n  document.getElementById('tm-notes').value  = t.notes;\n  openModal('taskModal');\n}\nfunction saveTask() {\n  if (!canEdit()) return;\n  // Preserve existing fields that aren't in the modal (complexity, progress, exclude, hideDate)\n  const existing = _editId ? data.tasks.find(x => x.id === _editId) : null;\n  const obj = {\n    id: _editId || uid(),\n    engId:    document.getElementById('tm-eng').value,\n    project:  document.getElementById('tm-proj').value.trim(),\n    task:     document.getElementById('tm-task').value.trim(),\n    status:   document.getElementById('tm-status').value,\n    priority: document.getElementById('tm-prio').value,\n    date:     document.getElementById('tm-date').value,\n    notes:    document.getElementById('tm-notes').value.trim(),\n    // Preserve fields not exposed in the modal\n    complexity:      existing?.complexity ?? 'medium',\n    progressPct:     existing?.progressPct ?? 0,\n    excludeFromUtil: existing?.excludeFromUtil ?? false,\n    hideDate:        existing?.hideDate ?? !document.getElementById('tm-date').value,\n    _localEditTs:    Date.now(),\n  };\n  if (!obj.task) { toast('Task name is required','error'); return; }\n\n  if (_editId) {\n    // Edit in place — preserve position\n    const i = data.tasks.findIndex(x => x.id === _editId);\n    if (i !== -1) data.tasks[i] = obj;\n    else data.tasks.push(obj);\n    const diff = diffObjects(existing, obj, ['engId','project','task','status','priority','date','notes']);\n    logChange('task', 'update', `Edited: ${obj.project || 'task'} — ${obj.task}`, diff);\n  } else {\n    // New task — insert at the tracked position\n    const afterId = _insertAfterTaskId;\n    if (afterId === '__end__' || afterId === null || afterId === undefined) {\n      const lastIdx = [...data.tasks].reduce((last, t, i) => t.engId === obj.engId ? i : last, -1);\n      data.tasks.splice(lastIdx + 1, 0, obj);\n    } else if (afterId === '') {\n      const firstIdx = data.tasks.findIndex(t => t.engId === obj.engId);\n      data.tasks.splice(firstIdx === -1 ? 0 : firstIdx, 0, obj);\n    } else {\n      const refIdx = data.tasks.findIndex(t => t.id === afterId);\n      data.tasks.splice(refIdx === -1 ? data.tasks.length : refIdx + 1, 0, obj);\n    }\n    _insertAfterTaskId = null;\n    _insertEngId = null;\n    const eng = data.engineers.find(e => e.id === obj.engId);\n    logChange('task', 'create', `Created: ${obj.project || 'task'} — ${obj.task}${eng ? ` (${eng.name})` : ''}`);\n  }\n\n  // Clean up hint\n  const hintEl = document.getElementById('insert-hint-text');\n  if (hintEl) hintEl.remove();\n\n  save(); renderAll(); closeModal('taskModal'); toast('Task saved','success');\n}\nfunction deleteCurrentTask()  {\n  if (!canEdit()) return;\n  if (!_editId) return;\n  const t = data.tasks.find(x => x.id === _editId);\n  if (t) logChange('task', 'delete', `Deleted: ${t.project || 'task'} — ${t.task}`);\n  data.tasks = data.tasks.filter(x => x.id !== _editId);\n  _tombstone('task', _editId);\n  save(); renderAll(); closeModal('taskModal'); toast('Deleted','success');\n}\nfunction deleteTaskById(id)   {\n  if (!canEdit()) return;\n  if (!confirm('Delete this task?')) return;\n  const t = data.tasks.find(x => x.id === id);\n  if (t) logChange('task', 'delete', `Deleted: ${t.project || 'task'} — ${t.task}`);\n  data.tasks = data.tasks.filter(x => x.id !== id);\n  _tombstone('task', id);\n  save(); renderAll(); toast('Deleted','success');\n}\n\n/* Tombstones — track recently-deleted IDs so the cloud merge doesn't\n   resurrect them. Without this, deleting a task and reloading before\n   the 1.4s save debounce completes would silently bring it back from\n   the still-stale cloud record. Tombstones are kept for 7 days then\n   garbage-collected (long enough to ensure all clients have synced). */\nconst TOMBSTONE_TTL_MS = 7 * 24 * 60 * 60 * 1000;\nfunction _tombstone(kind, id) {\n  if (!data._tombstones) data._tombstones = [];\n  data._tombstones.push({ kind, id, ts: Date.now() });\n  // GC old entries\n  const cutoff = Date.now() - TOMBSTONE_TTL_MS;\n  data._tombstones = data._tombstones.filter(t => t.ts > cutoff);\n}\nfunction _tombstoneSet(kind) {\n  const cutoff = Date.now() - TOMBSTONE_TTL_MS;\n  return new Set(((data._tombstones || []).filter(t => t.kind === kind && t.ts > cutoff)).map(t => t.id));\n}\n\n/* ENGINEER */\n/* (Photo upload feature removed — initials avatars only.\n   See chat history rationale: JSONBin 1MB cap was unviable with photos.) */\n\nfunction openAddEngineer() {\n  _editId = null;\n  document.getElementById('engModalTitle').textContent = 'Add Engineer';\n  document.getElementById('em-del-btn').style.display = 'none';\n  ['em-name','em-init','em-util','em-role'].forEach(id => document.getElementById(id).value = '');\n  document.getElementById('em-projs-display').textContent = 'Will populate once tasks are added';\n  document.getElementById('em-manual-toggle').checked = false;\n  document.getElementById('util-manual-field').style.display = 'none';\n  document.getElementById('util-mode-label').textContent = 'Auto-calculated from tasks';\n  document.getElementById('util-auto-preview').textContent = 'Will calculate once tasks are added.';\n  openModal('engModal');\n}\nfunction openEditEngineer(id) {\n  const e = data.engineers.find(x => x.id === id);\n  if (!e) return;\n  _editId = id;\n  document.getElementById('engModalTitle').textContent = 'Edit Engineer';\n  document.getElementById('em-del-btn').style.display = '';\n  document.getElementById('em-name').value  = e.name;\n  document.getElementById('em-init').value  = e.initials;\n  document.getElementById('em-role').value  = e.role;\n\n  // Active projects — live-derived, readonly\n  const engTasks = data.tasks.filter(t => t.engId === id);\n  const activeProjects = [...new Set(\n    engTasks.filter(t => t.status !== 'done').map(t => t.project).filter(Boolean)\n  )];\n  document.getElementById('em-projs-display').textContent = activeProjects.length\n    ? activeProjects.join(', ')\n    : (engTasks.length ? 'All tasks completed' : 'No active tasks');\n\n  const isManual = e.manualUtil !== null && e.manualUtil !== undefined && e.manualUtil !== '';\n  document.getElementById('em-manual-toggle').checked = isManual;\n  document.getElementById('util-manual-field').style.display = isManual ? '' : 'none';\n  document.getElementById('util-mode-label').textContent = isManual ? 'Manual override — enter % below' : 'Auto-calculated from tasks';\n  document.getElementById('em-util').value = isManual ? e.manualUtil : '';\n  const auto = calcUtil(id);\n  document.getElementById('util-auto-preview').textContent = `Auto-calculated value: ${auto}% (based on ${engTasks.length} tasks)`;\n  openModal('engModal');\n}\nfunction saveEngineer() {\n  if (!canEdit()) return;\n  const isManual = document.getElementById('em-manual-toggle').checked;\n\n  // Preserve existing projects[] and flag for backward compat with version snapshots,\n  // though they're no longer displayed anywhere in the UI.\n  let existingProjects = [];\n  let existingFlag = '';\n  if (_editId) {\n    const existing = data.engineers.find(x => x.id === _editId);\n    if (existing) {\n      existingProjects = existing.projects || [];\n      existingFlag     = existing.flag     || '';\n    }\n  }\n\n  const obj = {\n    id:         _editId || uid(),\n    name:       document.getElementById('em-name').value.trim(),\n    initials:   document.getElementById('em-init').value.trim().toUpperCase().slice(0,2),\n    role:       document.getElementById('em-role').value.trim() || 'Delivery Architect',\n    projects:   existingProjects,  // legacy field, kept for backward compat only\n    flag:       existingFlag,       // legacy field, kept for backward compat only\n    manualUtil: isManual ? (parseInt(document.getElementById('em-util').value) || 0) : null,\n    _localEditTs: Date.now(),\n  };\n  if (!obj.name) { toast('Name is required','error'); return; }\n  if (_editId) {\n    const existing = data.engineers.find(x => x.id === _editId);\n    const i = data.engineers.findIndex(x => x.id === _editId);\n    data.engineers[i] = obj;\n    const diff = diffObjects(existing, obj, ['name','initials','role','manualUtil']);\n    logChange('engineer', 'update', `Edited engineer: ${obj.name}`, diff);\n  } else {\n    data.engineers.push(obj);\n    logChange('engineer', 'create', `Added engineer: ${obj.name}`);\n  }\n  save(); renderAll(); closeModal('engModal'); toast('Engineer saved','success');\n}\nfunction deleteCurrentEngineer() {\n  if (!canEdit()) return;\n  if (!_editId) return;\n  if (!confirm('Delete this engineer and all their tasks?')) return;\n  const eng = data.engineers.find(x => x.id === _editId);\n  const taskCount = data.tasks.filter(x => x.engId === _editId).length;\n  data.engineers = data.engineers.filter(x => x.id !== _editId);\n  data.tasks     = data.tasks.filter(x => x.engId !== _editId);\n  if (eng) logChange('engineer', 'delete', `Deleted engineer: ${eng.name} (${taskCount} tasks removed)`);\n  save(); renderAll(); closeModal('engModal'); toast('Engineer deleted','success');\n}\n\n/* ══ GENERIC ENTITY CRUD HELPER ══════════════════════════════\n   Consolidates the repeated open/save/delete pattern across\n   Policies / Links / Codes / (potentially future entities).\n\n   Config object defines:\n     collection   — name of the array on `data` (e.g. 'policies')\n     modalId      — DOM id of the modal overlay\n     titleId      — (optional) DOM id of a title element to set\n     delBtnId     — DOM id of the in-modal delete button\n     fields       — [{id, prop, default, trim, required}]  maps DOM → object\n     rerender     — function called after save/delete\n     confirmMsg   — prompt shown before deleteById()\n═══════════════════════════════════════════════════════════════ */\nfunction _applyEntityFields(cfg, obj, fromRecord) {\n  cfg.fields.forEach(f => {\n    const el = document.getElementById(f.id);\n    if (!el) return;\n    if (fromRecord) {\n      el.value = fromRecord[f.prop] ?? f.default ?? '';\n    } else if (obj) {\n      let v = el.value;\n      if (f.trim !== false) v = v.trim();\n      obj[f.prop] = v || f.default || '';\n    } else {\n      el.value = f.default ?? '';\n    }\n  });\n}\n\nfunction entityOpen(cfg, id, titleLabels) {\n  _editId = id || null;\n  const record = id ? data[cfg.collection].find(x => x.id === id) : null;\n  if (id && !record) return;\n\n  if (cfg.titleId && titleLabels) {\n    document.getElementById(cfg.titleId).textContent = id ? titleLabels.edit : titleLabels.add;\n  }\n  const delBtn = document.getElementById(cfg.delBtnId);\n  if (delBtn) delBtn.style.display = id ? '' : 'none';\n\n  _applyEntityFields(cfg, null, record);\n  openModal(cfg.modalId);\n}\n\nfunction entitySave(cfg, successMsg = 'Saved') {\n  if (!canEdit()) return;\n  const obj = { id: _editId || uid() };\n  _applyEntityFields(cfg, obj, null);\n\n  // Required-field validation\n  const missing = cfg.fields.find(f => f.required && !obj[f.prop]);\n  if (missing) { toast(`${missing.label || missing.prop} required`, 'error'); return; }\n\n  const coll = data[cfg.collection];\n  const isEdit = !!_editId;\n  const existing = isEdit ? coll.find(x => x.id === _editId) : null;\n  if (isEdit) {\n    const i = coll.findIndex(x => x.id === _editId);\n    if (i !== -1) coll[i] = obj; else coll.push(obj);\n  } else {\n    coll.push(obj);\n  }\n\n  // Log the change\n  if (typeof logChange === 'function') {\n    const label = cfg.collection.replace(/s$/, '');\n    const summary = obj.name || obj.text || obj.proj || obj.code || label;\n    if (isEdit) {\n      const diff = diffObjects(existing, obj, cfg.fields.map(f => f.prop));\n      logChange(label, 'update', `Edited ${label}: ${summary}`, diff);\n    } else {\n      logChange(label, 'create', `Added ${label}: ${summary}`);\n    }\n  }\n\n  save();\n  if (cfg.rerender) cfg.rerender();\n  closeModal(cfg.modalId);\n  toast(successMsg, 'success');\n}\n\nfunction entityDeleteCurrent(cfg) {\n  if (!canEdit()) return;\n  if (!_editId) return;\n  const existing = data[cfg.collection].find(x => x.id === _editId);\n  data[cfg.collection] = data[cfg.collection].filter(x => x.id !== _editId);\n  if (existing && typeof logChange === 'function') {\n    const label = cfg.collection.replace(/s$/, '');\n    const summary = existing.name || existing.text || existing.proj || existing.code || label;\n    logChange(label, 'delete', `Deleted ${label}: ${summary}`);\n  }\n  save();\n  if (cfg.rerender) cfg.rerender();\n  closeModal(cfg.modalId);\n  toast('Deleted', 'success');\n}\n\nfunction entityDeleteById(cfg, id) {\n  if (!canEdit()) return;\n  if (!confirm(cfg.confirmMsg || 'Delete this item?')) return;\n  const existing = data[cfg.collection].find(x => x.id === id);\n  data[cfg.collection] = data[cfg.collection].filter(x => x.id !== id);\n  if (existing && typeof logChange === 'function') {\n    const label = cfg.collection.replace(/s$/, '');\n    const summary = existing.name || existing.text || existing.proj || existing.code || label;\n    logChange(label, 'delete', `Deleted ${label}: ${summary}`);\n  }\n  save();\n  if (cfg.rerender) cfg.rerender();\n  toast('Deleted', 'success');\n}\n\n/* POLICY */\nconst _policyCfg = {\n  collection: 'policies',\n  modalId: 'policyModal',\n  delBtnId: 'pm-del-btn',\n  rerender: () => renderPolicies(),\n  confirmMsg: 'Delete this policy?',\n  fields: [\n    { id: 'pm-icon', prop: 'icon', default: '☑' },\n    { id: 'pm-text', prop: 'text', required: true, label: 'Text' },\n    { id: 'pm-meta', prop: 'meta', default: 'ALL DAs' },\n  ],\n};\nfunction openAddPolicy()         { entityOpen(_policyCfg, null); }\nfunction openEditPolicy(id)      { entityOpen(_policyCfg, id); }\nfunction savePolicy()            { entitySave(_policyCfg, 'Policy saved'); }\nfunction deleteCurrentPolicy()   { entityDeleteCurrent(_policyCfg); }\nfunction deletePolicyById(id)    { entityDeleteById(_policyCfg, id); }\n\n/* LINK */\nconst _linkCfg = {\n  collection: 'links',\n  modalId: 'linkModal',\n  titleId: 'lm-title',\n  delBtnId: 'lm-del-btn',\n  rerender: () => renderRefs(),\n  confirmMsg: 'Delete this link?',\n  fields: [\n    { id: 'lm-name', prop: 'name', required: true, label: 'Name' },\n    { id: 'lm-url',  prop: 'url' },\n    { id: 'lm-note', prop: 'note' },\n  ],\n};\nfunction openAddLink()      { entityOpen(_linkCfg, null, { add: 'Add Link', edit: 'Edit Link' }); }\nfunction openEditLink(id)   { entityOpen(_linkCfg, id,   { add: 'Add Link', edit: 'Edit Link' }); }\nfunction saveLink()         { entitySave(_linkCfg, 'Link saved'); }\nfunction deleteCurrentLink(){ entityDeleteCurrent(_linkCfg); }\nfunction deleteLinkById(id) { entityDeleteById(_linkCfg, id); }\n\n/* CODE (Prime codes) */\nconst _codeCfg = {\n  collection: 'codes',\n  modalId: 'codeModal',\n  titleId: 'cm-title',\n  delBtnId: 'cm-del-btn',\n  rerender: () => renderRefs(),\n  confirmMsg: 'Delete this prime code?',\n  fields: [\n    { id: 'cm-proj',  prop: 'proj',  required: true, label: 'Project' },\n    { id: 'cm-code',  prop: 'code' },\n    { id: 'cm-owner', prop: 'owner' },\n    { id: 'cm-note',  prop: 'note' },\n  ],\n};\nfunction openAddCode()      { entityOpen(_codeCfg, null, { add: 'Add Prime Code', edit: 'Edit Prime Code' }); }\nfunction openEditCode(id)   { entityOpen(_codeCfg, id,   { add: 'Add Prime Code', edit: 'Edit Prime Code' }); }\nfunction saveCode()         { entitySave(_codeCfg, 'Code saved'); }\nfunction deleteCurrentCode(){ entityDeleteCurrent(_codeCfg); }\nfunction deleteCodeById(id) { entityDeleteById(_codeCfg, id); }\n\n/* ══ TABS ════════════════════════════════════════════════════ */\nfunction switchTab(name, btn) {\n  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));\n  document.querySelectorAll('.nav-tab').forEach(b => {\n    b.classList.remove('active');\n    b.setAttribute('aria-selected', 'false');\n  });\n  const pane = document.getElementById('tab-' + name);\n  if (pane) pane.classList.add('active');\n  if (btn) {\n    btn.classList.add('active');\n    btn.setAttribute('aria-selected', 'true');\n  }\n  if (name === 'export') generateOneNote();\n  if (name === 'changelog') renderChangelog();\n}\n\n/* Arrow-key navigation between tabs (WAI-ARIA tablist pattern) */\ndocument.addEventListener('keydown', (e) => {\n  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;\n  if (!e.target || !e.target.classList || !e.target.classList.contains('nav-tab')) return;\n  const tabs = Array.from(document.querySelectorAll('.nav-tab'));\n  const i = tabs.indexOf(e.target);\n  if (i === -1) return;\n  e.preventDefault();\n  const next = e.key === 'ArrowRight'\n    ? tabs[(i + 1) % tabs.length]\n    : tabs[(i - 1 + tabs.length) % tabs.length];\n  next.focus();\n  next.click();\n});\n\n/* ══ EXPORT ══════════════════════════════════════════════════ */\nfunction generateOneNote() {\n  const SL = {done:'✅ Done',prog:'🔄 In Progress',wait:'⏳ Pending',hold:'🔴 On Hold/Blocked',none:'⬜ Not Started'};\n  const line = '════════════════════════════════════════════════════════════';\n  const thin = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';\n  const dash = '────────────────────────────────────────────────────────────';\n  let out = [];\n  out.push(line); out.push(' ORANGE BUSINESS — DA TEAM TRACKER'); out.push(` Generated: ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`); out.push(line); out.push('');\n  out.push(thin); out.push(' 👥  TEAM UTILIZATION'); out.push(thin);\n  data.engineers.forEach(e => {\n    const {value:u,isManual} = getUtil(e);\n    const tasks = data.tasks.filter(t=>t.engId===e.id);\n    out.push(`  ${e.name.padEnd(18)} ${String(u+'%').padEnd(6)} Tasks:${tasks.length} Blocked:${tasks.filter(t=>t.status==='hold').length} ${isManual?'[manual]':'[auto]'}`);\n  });\n  out.push(''); out.push(' STATUS: ✅ Done | 🔄 In Progress | ⏳ Waiting | 🔴 On Hold | ⬜ Not Started'); out.push('');\n  out.push(thin); out.push(' 📋  POLICIES'); out.push(thin);\n  data.policies.forEach(p => { out.push(`  ${p.icon}  ${p.text}`); out.push(`     → ${p.meta}`); out.push(''); });\n  data.engineers.forEach(eng => {\n    out.push(thin); out.push(` 👤  ${eng.name.toUpperCase()}  (${getUtil(eng).value}%)`); out.push(thin);\n    const tasks = data.tasks.filter(t=>t.engId===eng.id);\n    if (!tasks.length) { out.push('  No tasks assigned.'); out.push(''); return; }\n    tasks.forEach(t => {\n      out.push(` ▌ ${t.project}${t.priority==='high'?' 🔥 HIGH PRIORITY':''}`);\n      out.push(dash);\n      out.push(`  Task:   ${t.task}`);\n      out.push(`  Status: ${SL[t.status]||t.status}`);\n      out.push(`  Date:   ${t.date||'TBD'}`);\n      if (t.notes) { out.push('  Notes:'); t.notes.split('\\n').forEach(n=>out.push(`    ${n}`)); }\n      out.push('');\n    });\n  });\n  out.push(thin); out.push(' 📌  REFERENCES'); out.push(thin);\n  out.push(''); out.push('  🔗 LINKS'); out.push(dash);\n  data.links.forEach(l => out.push(`  ${l.name.padEnd(22)} ${l.url||'[No URL]'}${l.note?' — '+l.note:''}`));\n  out.push(''); out.push('  🔑 PRIME CODES'); out.push(dash);\n  data.codes.forEach(c => { out.push(`  ${c.proj.padEnd(18)} ${c.code}`); out.push(`                     ${c.owner}${c.note?' | '+c.note:''}`); });\n  out.push(''); out.push(line);\n  document.getElementById('oneNoteOut').value = out.join('\\n');\n}\nfunction copyOneNote() {\n  const ta = document.getElementById('oneNoteOut');\n  navigator.clipboard.writeText(ta.value).then(() => toast('Copied to clipboard','success')).catch(() => { ta.select(); document.execCommand('copy'); toast('Copied','success'); });\n}\n\n/* ══ PDF EXPORT (print-to-PDF via dedicated print window) ═══ */\nfunction exportPDF() {\n  const today = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});\n  const SL    = {done:'✅ Done',prog:'🔄 In Progress',wait:'⏳ Waiting',hold:'🔴 On Hold',none:'⬜ Not Started'};\n  const CL    = {low:'Low',medium:'Medium',high:'High'};\n\n  // Inline-embedded print-optimized HTML\n  const sections = data.engineers.map(eng => {\n    const tasks = data.tasks.filter(t => t.engId === eng.id);\n    if (!tasks.length) return '';\n    const {value:u, isManual} = getUtil(eng);\n    const rows = tasks.map(t => `\n      <tr>\n        <td>${t.priority==='high'?'🔥 ':''}${escH(t.project||'')}<\u002Ftd>\n        <td>${escH(t.task||'')}<\u002Ftd>\n        <td>${SL[t.status]||''}<\u002Ftd>\n        <td>${t.status==='prog' ? (t.progressPct||0)+'%' : ''}<\u002Ftd>\n        <td>${CL[t.complexity]||'Medium'}<\u002Ftd>\n        <td>${t.hideDate?'—':(t.date||'')}<\u002Ftd>\n        <td style=\"font-size:10px\">${escH(t.notes||'').replace(/\\n/g,'<br>')}<\u002Ftd>\n      <\u002Ftr>`).join('');\n    return `\n      <h2 style=\"color:#FF7900;border-bottom:2px solid #FF7900;padding-bottom:3px;margin-top:22px\">\n        ${escH(eng.name)} — ${u}% utilization ${isManual?'(manual)':'(auto)'} — ${tasks.length} tasks\n      <\u002Fh2>\n      <table style=\"width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px\">\n        <thead><tr style=\"background:#FFF4EC;color:#E66A00\">\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">Project<\u002Fth>\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">Task<\u002Fth>\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">Status<\u002Fth>\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">% Done<\u002Fth>\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">Complexity<\u002Fth>\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">Date<\u002Fth>\n          <th style=\"text-align:left;padding:5px;border:1px solid #ddd\">Notes<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>${rows}<\u002Ftbody>\n      <\u002Ftable>`;\n  }).join('');\n\n  const html = `<!DOCTYPE html>\n<html><head><meta charset=\"UTF-8\"><title>DA Team Tracker — ${today}<\u002Ftitle>\n<style>\n@page { size: A4 landscape; margin: 14mm; }\nbody { font-family: Helvetica, Arial, sans-serif; color:#222; font-size:11px; }\nh1 { color:#FF7900; margin:0 0 4px; font-size:22px; }\n.sub { color:#666; font-size:11px; margin-bottom:14px; }\ntable { page-break-inside: avoid; }\ntr { page-break-inside: avoid; }\nthead { display: table-header-group; }\ntd { padding:5px; border:1px solid #ddd; vertical-align:top; }\nh2 { page-break-after: avoid; }\n<\u002Fstyle><\u002Fhead>\n<body onload=\"window.print();\">\n<h1>Orange Business — DA Team Tracker<\u002Fh1>\n<div class=\"sub\">Generated: ${today} · ${data.tasks.length} total tasks · ${data.engineers.length} engineers<\u002Fdiv>\n${sections}\n<\u002Fbody><\u002Fhtml>`;\n\n  const w = window.open('', '_blank');\n  if (!w) { toast('Popup blocked — allow popups for this site', 'error'); return; }\n  w.document.write(html);\n  w.document.close();\n  toast('Print dialog opened — choose \"Save as PDF\"', 'success');\n}\n\n/* ══ EXCEL EXPORT (SheetJS) ═══════════════════════════════════ */\nfunction exportExcel() {\n  if (typeof XLSX === 'undefined') { toast('Excel library failed to load — check internet connection','error'); return; }\n  const today  = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});\n  const SL     = {done:'Done',prog:'In Progress',wait:'Waiting',hold:'On Hold',none:'Not Started'};\n  const CL     = {low:'Low',medium:'Medium',high:'High'};\n  const wb     = XLSX.utils.book_new();\n\n  // ── Sheet 1: Tasks ──\n  const taskRows = [['Engineer','Project','Task','Status','% Done','Complexity','Priority','Target Date','Excluded','Notes']];\n  data.engineers.forEach(eng => {\n    data.tasks.filter(t => t.engId === eng.id).forEach(t => {\n      taskRows.push([\n        eng.name, t.project||'', t.task||'',\n        SL[t.status]||t.status,\n        t.status==='prog' ? (t.progressPct||0) + '%' : '',\n        CL[t.complexity]||'Medium',\n        t.priority==='high' ? 'HIGH' : 'Normal',\n        t.hideDate ? '—' : (t.date||''),\n        t.excludeFromUtil ? 'Yes' : '',\n        (t.notes||'').replace(/\\n/g, ' | ')\n      ]);\n    });\n  });\n  const ws1 = XLSX.utils.aoa_to_sheet(taskRows);\n  ws1['!cols'] = [{wch:16},{wch:18},{wch:40},{wch:14},{wch:8},{wch:11},{wch:9},{wch:12},{wch:9},{wch:60}];\n  XLSX.utils.book_append_sheet(wb, ws1, 'Tasks');\n\n  // ── Sheet 2: Utilization ──\n  const utilRows = [['Engineer','Role','Utilization %','Mode','Tasks','In Progress','On Hold','Done','Waiting','High Priority','Projects']];\n  data.engineers.forEach(eng => {\n    const {value:u, isManual} = getUtil(eng);\n    const ts = data.tasks.filter(t => t.engId === eng.id);\n    const activeProjects = [...new Set(\n      ts.filter(t => t.status !== 'done').map(t => t.project).filter(Boolean)\n    )];\n    utilRows.push([\n      eng.name, eng.role||'',\n      u + '%', isManual ? 'Manual' : 'Auto',\n      ts.length,\n      ts.filter(t=>t.status==='prog').length,\n      ts.filter(t=>t.status==='hold').length,\n      ts.filter(t=>t.status==='done').length,\n      ts.filter(t=>t.status==='wait').length,\n      ts.filter(t=>t.priority==='high').length,\n      activeProjects.join(', ')\n    ]);\n  });\n  const ws2 = XLSX.utils.aoa_to_sheet(utilRows);\n  ws2['!cols'] = [{wch:16},{wch:22},{wch:14},{wch:9},{wch:8},{wch:12},{wch:9},{wch:8},{wch:10},{wch:14},{wch:36}];\n  XLSX.utils.book_append_sheet(wb, ws2, 'Utilization');\n\n  // ── Sheet 3: References ──\n  const refRows = [['Section','Type','Field 1','Field 2','Field 3','Field 4']];\n  (data.refSections||[]).forEach(s => {\n    (s.items||[]).forEach(i => {\n      if (s.type === 'links') refRows.push([s.title, 'Link', i.name||'', i.url||'', i.note||'', '']);\n      else if (s.type === 'codes') refRows.push([s.title, 'Code', i.proj||'', i.code||'', i.owner||'', i.note||'']);\n      else refRows.push([s.title, 'Note', i.label||'', i.value||'', i.note||'', '']);\n    });\n  });\n  const ws3 = XLSX.utils.aoa_to_sheet(refRows);\n  ws3['!cols'] = [{wch:20},{wch:8},{wch:30},{wch:40},{wch:30},{wch:30}];\n  XLSX.utils.book_append_sheet(wb, ws3, 'References');\n\n  XLSX.writeFile(wb, `da_tracker_${today.replace(/\\s/g,'_')}.xlsx`);\n  toast('Excel file downloaded', 'success');\n}\n\n/* Open import modal and reset UI state from any previous attempt. */\nfunction _openImportModal() {\n  const ta = document.getElementById('importJSON');\n  const fi = document.getElementById('importFileInput');\n  const hint = document.getElementById('importFileHint');\n  const checkbox = document.getElementById('importPushCloud');\n  if (ta) ta.value = '';\n  if (fi) fi.value = '';\n  if (hint) hint.textContent = 'Or paste JSON content below ↓';\n  if (checkbox) checkbox.checked = false;\n  _resetImportUI();\n  openModal('importModal');\n}\n\n/* ══ IMPORT FLOW ════════════════════════════════════════════════\n   Three usage modes:\n   1. Local-only preview: import to current browser only (other users\n      won't see it; gets overwritten on next sync if not lock-holder).\n   2. Cloud restore: replace shared cloud state with imported data.\n      Requires lock acquisition. All team members converge.\n   3. Standalone deployment: import on a fresh JSONBin / different\n      deployment. The \"Push to cloud\" toggle handles this if checked.\n════════════════════════════════════════════════════════════════════ */\n\nlet _importStaged = null;   // parsed-and-validated payload, waiting for confirm\n\n/* Triggered when a file is chosen via the file input */\nfunction _handleImportFile(e) {\n  const file = e.target.files && e.target.files[0];\n  if (!file) return;\n  if (file.size > 10 * 1024 * 1024) {\n    _setImportWarning('File too large (>10MB).', 'error');\n    return;\n  }\n  const hint = document.getElementById('importFileHint');\n  if (hint) hint.textContent = `Selected: ${file.name} (${Math.round(file.size/1024)}KB)`;\n\n  const reader = new FileReader();\n  reader.onload = (ev) => {\n    const text = ev.target.result || '';\n    document.getElementById('importJSON').value = text;\n    _validateAndStageImport(text);\n  };\n  reader.onerror = () => _setImportWarning('Failed to read file.', 'error');\n  reader.readAsText(file);\n}\n\n/* Triggered as the user pastes / types into the textarea */\nfunction _handleImportPaste() {\n  const text = document.getElementById('importJSON').value || '';\n  if (!text.trim()) {\n    _resetImportUI();\n    return;\n  }\n  _validateAndStageImport(text);\n}\n\nfunction _resetImportUI() {\n  _importStaged = null;\n  const preview = document.getElementById('importPreview');\n  const warning = document.getElementById('importWarning');\n  const cloudRow = document.getElementById('importCloudRow');\n  const btn = document.getElementById('importBtn');\n  if (preview) preview.style.display = 'none';\n  if (warning) warning.style.display = 'none';\n  if (cloudRow) cloudRow.style.display = 'none';\n  if (btn) { btn.disabled = true; btn.textContent = 'Import'; }\n}\n\nfunction _setImportWarning(msg, level) {\n  const w = document.getElementById('importWarning');\n  if (!w) return;\n  w.style.display = '';\n  w.style.background = level === 'error' ? '#FFE5E5' : '#FFF4E5';\n  w.style.borderLeftColor = level === 'error' ? 'var(--hold-c)' : 'var(--prog-c)';\n  w.innerHTML = msg;\n}\n\n/* Parse + validate the JSON; populate preview; configure cloud-push UI. */\nfunction _validateAndStageImport(raw) {\n  let parsed;\n  try {\n    parsed = JSON.parse(raw);\n  } catch (e) {\n    _resetImportUI();\n    _setImportWarning('Invalid JSON — ' + (e.message || 'parse error'), 'error');\n    return;\n  }\n  if (!parsed || typeof parsed !== 'object') {\n    _resetImportUI();\n    _setImportWarning('Invalid JSON — expected an object.', 'error');\n    return;\n  }\n\n  // Accept both the new {meta, data, versions} format and the legacy {data, versions}\n  const incomingData = parsed.data || parsed;\n  if (!incomingData.engineers || !Array.isArray(incomingData.engineers)) {\n    _resetImportUI();\n    _setImportWarning('Missing required field: <code>engineers[]<\u002Fcode>', 'error');\n    return;\n  }\n  if (!incomingData.tasks || !Array.isArray(incomingData.tasks)) {\n    _resetImportUI();\n    _setImportWarning('Missing required field: <code>tasks[]<\u002Fcode>', 'error');\n    return;\n  }\n  const incomingVersions = (parsed.versions && Array.isArray(parsed.versions)) ? parsed.versions : [];\n\n  _importStaged = { data: incomingData, versions: incomingVersions, meta: parsed.meta || null };\n\n  // Preview\n  const preview = document.getElementById('importPreview');\n  if (preview) {\n    const m = parsed.meta;\n    const origin = m ? `<div style=\"margin-top:4px;font-size:10.5px;color:var(--gray-50)\">From: ${_esc(m.exportedBy || 'unknown')} on ${m.exportedAt ? new Date(m.exportedAt).toLocaleString() : 'unknown date'}${m.exportedFromBin ? ` · bin ${_esc(m.exportedFromBin).slice(0,8)}…` : ''}<\u002Fdiv>` : '';\n    preview.style.display = '';\n    preview.innerHTML = `\n      <strong>Backup contents:<\u002Fstrong>\n      ${incomingData.engineers.length} engineer${incomingData.engineers.length===1?'':'s'} ·\n      ${incomingData.tasks.length} task${incomingData.tasks.length===1?'':'s'} ·\n      ${(incomingData.policies||[]).length} polic${(incomingData.policies||[]).length===1?'y':'ies'} ·\n      ${incomingVersions.length} snapshot${incomingVersions.length===1?'':'s'} ·\n      ${(incomingData.refSections||[]).length} reference section${(incomingData.refSections||[]).length===1?'':'s'} ·\n      ${(incomingData.changelog||[]).length} changelog entr${(incomingData.changelog||[]).length===1?'y':'ies'}\n      ${origin}\n    `;\n  }\n\n  // Cloud push UI — only relevant when there's a cloud to push to\n  const cloudRow = document.getElementById('importCloudRow');\n  const canPushDirect = window.location.protocol !== 'file:';\n  if (cloudRow) cloudRow.style.display = canPushDirect ? '' : 'none';\n\n  // Lock-state warning\n  const checkbox = document.getElementById('importPushCloud');\n  const warningHTML = canPushDirect\n    ? (isLockHeldByMe()\n        ? `<strong>You hold the lock<\u002Fstrong> — checking \"Push to shared cloud\" will replace remote data and propagate to all team members.`\n        : `<strong>You don't hold the lock.<\u002Fstrong> If \"Push to shared cloud\" is checked, the import will acquire the lock, write to cloud, then release. Other browsers will adopt this state on their next sync (~12s).`)\n    : `<strong>file:// mode<\u002Fstrong> — cloud push is unavailable. Import is local-only.`;\n  _setImportWarning(warningHTML, 'info');\n\n  const btn = document.getElementById('importBtn');\n  if (btn) {\n    btn.disabled = false;\n    btn.textContent = canPushDirect && checkbox && checkbox.checked\n      ? 'Import + Push to Cloud'\n      : 'Import (local only)';\n  }\n  // Reactive button label\n  if (checkbox) {\n    checkbox.onchange = () => {\n      if (btn) btn.textContent = checkbox.checked ? 'Import + Push to Cloud' : 'Import (local only)';\n    };\n  }\n}\n\nasync function importJSON() {\n  if (!_importStaged) {\n    // Allow direct paste-then-click without prior validation\n    _validateAndStageImport(document.getElementById('importJSON').value || '');\n    if (!_importStaged) return;\n  }\n\n  const checkbox = document.getElementById('importPushCloud');\n  const wantCloudPush = checkbox && checkbox.checked && window.location.protocol !== 'file:';\n\n  const incoming = _importStaged.data;\n  const incomingVersions = _importStaged.versions;\n\n  // Strip ephemeral fields from the imported payload — no inheriting\n  // someone else's lock or tombstone list.\n  delete incoming.globalLock;\n  delete incoming._tombstones;\n\n  if (!wantCloudPush) {\n    // Local-only mode. Apply to current state and warn that cloud will\n    // overwrite this on next sync if user doesn't hold the lock.\n    try {\n      data = incoming;\n      versions = incomingVersions;\n      migrateData();\n      try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n      try { localStorage.setItem(LS_VERS, JSON.stringify(versions)); } catch(e) {}\n      renderAll(); renderVersionSidebar(); updateSbBadge(); renderLockButton();\n      closeModal('importModal');\n      _resetImportUI();\n      if (isLockHeldByMe()) {\n        // We hold the lock — schedule a normal save, will propagate\n        scheduleSave(true);\n        toast(`Imported locally — pushing to cloud (lock held)`, 'success');\n      } else {\n        toast(`Imported locally — will be overwritten on next cloud sync (~12s) unless you lock first`, 'error');\n      }\n    } catch (e) {\n      console.error('Import (local) failed:', e);\n      toast('Import failed — see console for details', 'error');\n    }\n    return;\n  }\n\n  // Cloud-push mode. Multi-step:\n  //   1. Acquire the global lock (so our write isn't blocked by strict-lock)\n  //   2. Write imported data to cloud\n  //   3. Release the lock\n  // If we already hold the lock, skip steps 1 and 3.\n  const btn = document.getElementById('importBtn');\n  if (btn) { btn.disabled = true; btn.textContent = 'Importing…'; }\n\n  const alreadyHadLock = isLockHeldByMe();\n  let acquired = false;\n\n  try {\n    if (!alreadyHadLock) {\n      // Need to claim the lock first.\n      if (getCurrentUser() === 'Unknown') {\n        throw new Error('Set your name first (top-right name chip), then try again.');\n      }\n      toast('Acquiring lock for cloud import…', 'success');\n      acquired = await acquireGlobalLock();\n      if (!acquired) {\n        // acquireGlobalLock already toasted the reason\n        if (btn) { btn.disabled = false; btn.textContent = 'Import + Push to Cloud'; }\n        return;\n      }\n    }\n\n    // Apply the imported data locally (preserving the freshly-acquired lock)\n    const myLock = data.globalLock;   // keep current valid lock\n    data = incoming;\n    versions = incomingVersions;\n    if (myLock) data.globalLock = myLock;\n    migrateData();\n    try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}\n    try { localStorage.setItem(LS_VERS, JSON.stringify(versions)); } catch(e) {}\n    renderAll(); renderVersionSidebar(); updateSbBadge(); renderLockButton();\n\n    // Direct cloud write (we hold the lock, so pushToCloud will succeed)\n    setSyncState('saving');\n    const body = _buildCloudPayload();\n    const res = await fetch(BIN_URL, {\n      method: 'PUT', mode: 'cors',\n      headers: { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' },\n      body\n    });\n    if (!res.ok) {\n      const txt = await res.text().catch(() => '');\n      throw new Error(`Cloud write failed: HTTP ${res.status}${txt ? ' — ' + txt.slice(0,200) : ''}`);\n    }\n    setSyncState('synced');\n    logChange('system', 'update', `📥 Imported backup (${incoming.tasks.length} tasks, ${incoming.engineers.length} engineers)`);\n\n    // If we acquired the lock just for the import, release it now so others can edit\n    if (acquired && !alreadyHadLock) {\n      await releaseGlobalLock(true);   // silent: avoid double-toast\n    }\n\n    closeModal('importModal');\n    _resetImportUI();\n    toast(`✓ Imported and pushed to cloud — team will sync within 12s`, 'success');\n  } catch (err) {\n    console.error('Cloud import failed:', err);\n    setSyncState('error', err.message);\n    toast(`Import failed: ${err.message}`, 'error');\n    // Best-effort: if we acquired the lock for this import, release it\n    if (acquired && !alreadyHadLock) {\n      try { await releaseGlobalLock(true); } catch (e) {}\n    }\n    if (btn) { btn.disabled = false; btn.textContent = 'Import + Push to Cloud'; }\n  }\n}\nfunction confirmReset() {\n  if (!confirm('Reset ALL data to defaults? This will affect all team members.')) return;\n  data = JSON.parse(JSON.stringify(DEFAULT_DATA));\n  versions = [];\n  save(); renderAll(); renderVersionSidebar(); updateSbBadge();\n  scheduleSave(true);\n  toast('Reset to defaults — pushed to shared database','success');\n}\n\n/* ══ TOAST ═══════════════════════════════════════════════════ */\nfunction toast(msg, type='success') {\n  const wrap = document.getElementById('toastWrap');\n  const t = document.createElement('div');\n  t.className = `toast ${type}`;\n  // Build safely: icon span + escaped message text node\n  const iconSpan = document.createElement('span');\n  iconSpan.className = 'toast-icon';\n  iconSpan.textContent = type === 'success' ? '✓' : '✕';\n  t.appendChild(iconSpan);\n  t.appendChild(document.createTextNode(' ' + (msg || '')));\n  wrap.appendChild(t);\n  setTimeout(() => t.remove(), 3500);\n}\n\n/* ══ SAVE ANIMATIONS ═════════════════════════════════════════\n   Brief visual feedback on inline edits and sync confirmations.\n══════════════════════════════════════════════════════════════ */\nfunction _flashRowSave(taskId) {\n  const row = document.querySelector(`tr[data-task-id=\"${taskId}\"]`);\n  if (!row) return;\n  row.classList.remove('row-saving', 'row-saved');\n  // Force reflow so re-adding the class restarts the animation\n  void row.offsetWidth;\n  row.classList.add('row-saving');\n  setTimeout(() => {\n    row.classList.remove('row-saving');\n    row.classList.add('row-saved');\n    setTimeout(() => row.classList.remove('row-saved'), 900);\n  }, 350);\n}\n\n/* Page-edge glow whenever sync status flips to 'synced' */\nfunction _flashSaveGlow() {\n  let el = document.getElementById('saveGlow');\n  if (!el) {\n    el = document.createElement('div');\n    el.id = 'saveGlow';\n    document.body.appendChild(el);\n  }\n  el.classList.remove('active');\n  void el.offsetWidth;\n  el.classList.add('active');\n  setTimeout(() => el.classList.remove('active'), 1200);\n}\n\n/* Confetti burst when a task is marked Done */\nfunction _confettiBurst(x, y) {\n  const colors = ['#FF7900', '#008A00', '#0066CC', '#FFB84D', '#CC0000'];\n  for (let i = 0; i < 14; i++) {\n    const p = document.createElement('div');\n    p.className = 'confetti-piece';\n    p.style.left = x + 'px';\n    p.style.top  = y + 'px';\n    p.style.background = colors[i % colors.length];\n    const angle = (Math.PI * 2 * i) / 14 + Math.random() * 0.4;\n    const dist  = 50 + Math.random() * 40;\n    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');\n    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');\n    p.style.animationDelay = (Math.random() * 0.08) + 's';\n    document.body.appendChild(p);\n    setTimeout(() => p.remove(), 1000);\n  }\n}\n\n/* ══════════════════════════════════════════════════════════\n   VERSION HISTORY SYSTEM\n══════════════════════════════════════════════════════════ */\nconst VER_KEY = 'ob_da_versions_v1';\n// versions[] is declared up top so it's available to the hydration block\nlet _sidebarOpen = false;\n\nfunction loadVersions() {\n  try { const r = localStorage.getItem(VER_KEY); if (r) versions = JSON.parse(r); }\n  catch(e) { versions = []; }\n}\nfunction saveVersions() {\n  try { localStorage.setItem(VER_KEY, JSON.stringify(versions)); }\n  catch(e) { toast('⚠ Storage quota reached — consider deleting old snapshots','error'); }\n}\n\nfunction fmtDate(ts) {\n  const d = new Date(ts);\n  const dd = String(d.getDate()).padStart(2,'0');\n  const mm = String(d.getMonth()+1).padStart(2,'0');\n  const yyyy = d.getFullYear();\n  return `${dd}/${mm}/${yyyy}`;\n}\nfunction fmtTime(ts) {\n  const d = new Date(ts);\n  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});\n}\n\n/* ── SAVE SNAPSHOT ─────────────────────────────────────────\n   Replaces the old one-click \"save with today's date\" behaviour\n   with a modal that lets the user pick any date + custom label.\n   Default state of the modal = today's date + auto-generated label,\n   so old behaviour is one click away (just press Save). */\n\nfunction saveWeeklyVersion() {\n  // Public entry point — preserves old call sites (sidebar button etc.)\n  openSaveSnapshotModal();\n}\n\nfunction openSaveSnapshotModal() {\n  if (!canEdit()) return;\n  const today = new Date();\n  const dateInput  = document.getElementById('ss-date');\n  const quickSel   = document.getElementById('ss-quick');\n  const labelInput = document.getElementById('ss-label');\n\n  // Default to today\n  dateInput.value = _toIsoDate(today);\n  quickSel.value  = 'today';\n  labelInput.value = `Engineering Weekly ${fmtDate(today.getTime())}`;\n  labelInput.dataset.userEdited = 'false';\n\n  // Bind handlers (idempotent — overwriting is fine)\n  quickSel.onchange = () => {\n    const d = _ssQuickToDate(quickSel.value);\n    if (d) dateInput.value = _toIsoDate(d);\n    if (quickSel.value !== 'custom') _ssRefreshFromDate();\n  };\n  dateInput.onchange = () => {\n    quickSel.value = 'custom';\n    _ssRefreshFromDate();\n  };\n  labelInput.oninput = () => {\n    labelInput.dataset.userEdited = 'true';\n    _ssCheckConflict();\n  };\n\n  _ssRefreshStats();\n  _ssRefreshFromDate();\n  openModal('saveSnapshotModal');\n  setTimeout(() => labelInput.focus(), 60);\n}\n\nfunction _toIsoDate(d) {\n  const yyyy = d.getFullYear();\n  const mm = String(d.getMonth()+1).padStart(2,'0');\n  const dd = String(d.getDate()).padStart(2,'0');\n  return `${yyyy}-${mm}-${dd}`;\n}\n\nfunction _ssQuickToDate(key) {\n  const d = new Date();\n  d.setHours(12, 0, 0, 0); // noon — TZ-safe\n  if (key === 'today')     return d;\n  if (key === 'yesterday') { d.setDate(d.getDate() - 1); return d; }\n  if (key === 'last-friday') {\n    // Walk back to most recent Friday (not today if today is Friday — go to last week's)\n    const day = d.getDay(); // 0=Sun..6=Sat; 5=Fri\n    const back = day >= 5 ? day - 5 + 7 : day + 2;\n    d.setDate(d.getDate() - back);\n    return d;\n  }\n  if (key === 'last-monday') {\n    const day = d.getDay();\n    const back = day === 0 ? 6 : day === 1 ? 7 : day - 1;\n    d.setDate(d.getDate() - back);\n    return d;\n  }\n  return null;\n}\n\nfunction _ssRefreshFromDate() {\n  const dateInput  = document.getElementById('ss-date');\n  const labelInput = document.getElementById('ss-label');\n  if (!dateInput.value) return;\n  // Only auto-fill label if user hasn't customized\n  if (labelInput.dataset.userEdited !== 'true') {\n    const d = new Date(dateInput.value + 'T12:00:00');\n    labelInput.value = `Engineering Weekly ${fmtDate(d.getTime())}`;\n  }\n  _ssCheckConflict();\n}\n\nfunction _ssCheckConflict() {\n  const dateInput = document.getElementById('ss-date');\n  const warningEl = document.getElementById('ss-warning');\n  if (!dateInput || !warningEl) return;\n  if (!dateInput.value) { warningEl.style.display = 'none'; return; }\n  const target = new Date(dateInput.value + 'T12:00:00');\n  const targetStr = target.toDateString();\n  const existing = versions.find(v => new Date(v.timestamp).toDateString() === targetStr);\n  if (existing) {\n    warningEl.style.display = 'block';\n    warningEl.innerHTML = `⚠ A snapshot already exists on this date: <b>${_esc(existing.label)}<\u002Fb>. Saving will overwrite it.`;\n  } else {\n    warningEl.style.display = 'none';\n  }\n}\n\nfunction _ssRefreshStats() {\n  const projects = new Set(data.tasks.map(t => t.project).filter(Boolean));\n  const set = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n; };\n  set('ss-stat-tasks',    data.tasks.length);\n  set('ss-stat-engs',     data.engineers.length);\n  set('ss-stat-projects', projects.size);\n}\n\nfunction confirmSaveSnapshot() {\n  const dateInput  = document.getElementById('ss-date');\n  const labelInput = document.getElementById('ss-label');\n  if (!dateInput.value) { toast('Pick a date', 'error'); return; }\n\n  const target = new Date(dateInput.value + 'T12:00:00');\n  const label  = (labelInput.value || '').trim()\n              || `Engineering Weekly ${fmtDate(target.getTime())}`;\n\n  // Dedupe by calendar day — overwrite without a second confirm\n  // (the modal already shows a warning so the user knows).\n  const targetStr = target.toDateString();\n  versions = versions.filter(v => new Date(v.timestamp).toDateString() !== targetStr);\n\n  const snap = {\n    id: uid(),\n    label,\n    timestamp: target.getTime(),\n    taskCount: data.tasks.length,\n    engCount:  data.engineers.length,\n    snapshot:  JSON.parse(JSON.stringify(data))\n  };\n  versions.push(snap);\n  // Keep chronological order regardless of when the user backdates\n  versions.sort((a, b) => a.timestamp - b.timestamp);\n\n  saveVersions();\n  renderVersionSidebar();\n  updateSbBadge();\n  closeModal('saveSnapshotModal');\n  toast(`✓ Saved: ${label}`, 'success');\n  if (typeof logChange === 'function') {\n    logChange('system', 'create', `📅 Saved snapshot: \"${label}\"`);\n  }\n}\n\n/* ── REVERT ─────────────────────────────────────────────── */\nfunction revertToVersion(vId) {\n  const v = versions.find(x => x.id === vId);\n  if (!v) return;\n  if (!confirm(`Revert to:\\n\"${v.label}\"\\n\\nYour current working state will be replaced. This cannot be undone.`)) return;\n\n  data = JSON.parse(JSON.stringify(v.snapshot));\n\n  save();\n  renderAll();\n  renderVersionSidebar();\n  toast(`↩ Reverted to ${v.label}`, 'success');\n}\n\n/* ── DELETE SNAPSHOT ────────────────────────────────────── */\nfunction deleteVersion(vId) {\n  const v = versions.find(x => x.id === vId);\n  if (!v || !confirm(`Delete snapshot:\\n\"${v.label}\"?\\n\\nThis cannot be undone.`)) return;\n  versions = versions.filter(x => x.id !== vId);\n  saveVersions();\n  renderVersionSidebar();\n  updateSbBadge();\n  toast('Snapshot deleted', 'success');\n}\n\n/* ── DIFF HELPER ────────────────────────────────────────── */\nfunction diffSnapshots(oldSnap, newSnap) {\n  const oldIds = new Set(oldSnap.tasks.map(t => t.id));\n  const newIds = new Set(newSnap.tasks.map(t => t.id));\n  const added   = newSnap.tasks.filter(t => !oldIds.has(t.id));\n  const removed = oldSnap.tasks.filter(t => !newIds.has(t.id));\n  const changed = newSnap.tasks.filter(t => {\n    if (!oldIds.has(t.id)) return false;\n    const old = oldSnap.tasks.find(x => x.id === t.id);\n    return old && (old.status !== t.status || old.task !== t.task || old.priority !== t.priority);\n  });\n  return { added, removed, changed };\n}\n\n/* ── PREVIEW ────────────────────────────────────────────── */\nfunction previewVersion(vId) {\n  const v = versions.find(x => x.id === vId);\n  if (!v) return;\n  const snap = v.snapshot;\n\n  // Compare with current data\n  const diff = diffSnapshots(snap, data);  // what changed since this version\n\n  const SM = { done:'✅', prog:'🔄', wait:'⏳', hold:'🔴', none:'⬜' };\n\n  let html = `<div class=\"ver-summary-bar\">\n    <b>📅 ${_esc(v.label)}<\u002Fb>&nbsp;&nbsp;·&nbsp;&nbsp;\n    ${snap.engineers.length} engineers&nbsp;&nbsp;·&nbsp;&nbsp;\n    ${snap.taskCount||snap.tasks.length} tasks&nbsp;&nbsp;·&nbsp;&nbsp;\n    Saved at ${fmtTime(v.timestamp)}\n  <\u002Fdiv>`;\n\n  // Show diff summary if there are changes\n  const hasChanges = diff.added.length || diff.removed.length || diff.changed.length;\n  if (hasChanges) {\n    html += `<div style=\"display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap\">`;\n    if (diff.added.length)   html += `<span style=\"background:var(--done-bg);color:var(--done-c);border-radius:3px;padding:3px 10px;font-size:11px;font-weight:700\">＋${diff.added.length} added since this version<\u002Fspan>`;\n    if (diff.removed.length) html += `<span style=\"background:var(--hold-bg);color:var(--hold-c);border-radius:3px;padding:3px 10px;font-size:11px;font-weight:700\">−${diff.removed.length} removed since this version<\u002Fspan>`;\n    if (diff.changed.length) html += `<span style=\"background:var(--prog-bg);color:var(--prog-c);border-radius:3px;padding:3px 10px;font-size:11px;font-weight:700\">~ ${diff.changed.length} status changed<\u002Fspan>`;\n    html += `<\u002Fdiv>`;\n  }\n\n  snap.engineers.forEach(eng => {\n    const tasks = snap.tasks.filter(t => t.engId === eng.id);\n    if (!tasks.length) return;\n    html += `<div class=\"ver-eng-block\">\n      <div class=\"ver-eng-name\">\n        <span class=\"ver-eng-av\">${_esc(eng.initials)}<\u002Fspan>\n        ${_esc(eng.name)}\n        <span style=\"font-size:10px;color:var(--gray-50);font-weight:400\">${tasks.length} tasks<\u002Fspan>\n      <\u002Fdiv>\n      <table class=\"ver-task-tbl\"><tbody>`;\n    tasks.forEach(t => {\n      const isNew     = !data.tasks.some(x => x.id === t.id) ? false : false;  // was in snap\n      const nowGone   = !data.tasks.some(x => x.id === t.id);\n      const nowDiff   = (() => { const cur = data.tasks.find(x => x.id === t.id); return cur && cur.status !== t.status; })();\n      const rowClass  = nowGone ? 'diff-gone' : nowDiff ? 'diff-changed' : '';\n      const curStatus = (() => { const c = data.tasks.find(x => x.id === t.id); return c ? ` → ${SM[c.status]||''} ${c.status}` : ''; })();\n      html += `<tr class=\"${rowClass}\">\n        <td style=\"color:var(--orange);font-weight:600;white-space:nowrap;width:130px\">${_esc(t.project)}<\u002Ftd>\n        <td>${t.priority==='high'?'🔥 ':''} ${_esc(t.task)}<\u002Ftd>\n        <td style=\"white-space:nowrap\">${SM[t.status]||'⬜'} ${t.status}${nowDiff?`<span style=\"color:var(--prog-c);font-size:10px\">${curStatus}<\u002Fspan>`:''}<\u002Ftd>\n        ${nowGone?`<td style=\"color:var(--hold-c);font-size:10px\">deleted<\u002Ftd>`:'<td><\u002Ftd>'}\n      <\u002Ftr>`;\n    });\n    html += `<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n  });\n\n  // Show tasks added since this snapshot\n  if (diff.added.length) {\n    html += `<div class=\"ver-eng-block\" style=\"border-top:2px dashed var(--done-c);padding-top:14px;margin-top:6px\">\n      <div class=\"ver-eng-name\" style=\"color:var(--done-c)\">＋ New tasks added since this version<\u002Fdiv>\n      <table class=\"ver-task-tbl\"><tbody>`;\n    diff.added.forEach(t => {\n      const eng = data.engineers.find(e => e.id === t.engId);\n      html += `<tr class=\"diff-new\">\n        <td style=\"color:var(--done-c);font-weight:600;width:130px\">${_esc(t.project)}<\u002Ftd>\n        <td>${_esc(t.task)}<\u002Ftd>\n        <td>${SM[t.status]||'⬜'} ${t.status}<\u002Ftd>\n        <td style=\"color:var(--gray-50);font-size:10px\">${_esc(eng?.name||'')}<\u002Ftd>\n      <\u002Ftr>`;\n    });\n    html += `<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n  }\n\n  // Build or reuse preview modal\n  if (!document.getElementById('previewModal')) {\n    const pm = document.createElement('div');\n    pm.id = 'previewModal'; pm.className = 'overlay';\n    pm.innerHTML = `<div class=\"modal\" style=\"width:700px;max-width:96vw\">\n      <div class=\"modal-title\" id=\"pm-vtitle\"><\u002Fdiv>\n      <div id=\"pm-vbody\" style=\"max-height:58vh;overflow-y:auto;padding-right:4px\"><\u002Fdiv>\n      <div class=\"modal-footer\">\n        <button class=\"btn btn-danger\" id=\"pm-revert-btn\" style=\"margin-right:auto\">↩ Revert to This Version<\u002Fbutton>\n        <button class=\"btn btn-cancel\" onclick=\"closeModal('previewModal')\">Close<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n    pm.addEventListener('click', e => { if (e.target === pm) closeModal('previewModal'); });\n    document.body.appendChild(pm);\n  }\n  document.getElementById('pm-vtitle').textContent = v.label;\n  document.getElementById('pm-vbody').innerHTML = html;\n  document.getElementById('pm-revert-btn').onclick = () => { closeModal('previewModal'); revertToVersion(vId); };\n  openModal('previewModal');\n}\n\n/* ── RENDER SIDEBAR LIST ────────────────────────────────── */\nfunction renderVersionSidebar() {\n  const list  = document.getElementById('versionList');\n  const count = document.getElementById('vsbCount');\n  if (!list) return;\n\n  if (!versions.length) {\n    list.innerHTML = `<div class=\"vsb-empty\"><strong>No snapshots yet<\u002Fstrong>Click \"Save This Week's Snapshot\" after your weekly call to log this week's state.<\u002Fdiv>`;\n    if (count) count.textContent = 'No snapshots saved';\n    return;\n  }\n\n  // Sort oldest → newest (like OneNote)\n  const sorted = [...versions].sort((a,b) => a.timestamp - b.timestamp);\n  const latest = sorted[sorted.length - 1];\n  if (count) count.textContent = `${sorted.length} snapshot${sorted.length!==1?'s':''}`;\n\n  list.innerHTML = sorted.map(v => {\n    const isCur = v.id === latest.id;\n    return `<div class=\"vsb-item ${isCur?'vsb-current':''}\" onclick=\"previewVersion('${v.id}')\">\n      <div class=\"vsb-dot\"><\u002Fdiv>\n      <div class=\"vsb-label\">\n        ${v.label}\n        <span class=\"vsb-meta\">${v.taskCount} tasks · ${v.engCount} engineers · ${fmtTime(v.timestamp)}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"vsb-actions\">\n        <button class=\"vsb-btn\" onclick=\"event.stopPropagation();revertToVersion('${v.id}')\" title=\"Revert to this version\">↩ Revert<\u002Fbutton>\n        <button class=\"vsb-btn vdel\" onclick=\"event.stopPropagation();deleteVersion('${v.id}')\" title=\"Delete snapshot\">🗑<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  // Auto-scroll to latest (bottom)\n  setTimeout(() => { list.scrollTop = list.scrollHeight; }, 50);\n}\n\nfunction updateSbBadge() {\n  const n = versions.length;\n  const b   = document.getElementById('sbBadge');\n  const rrB = document.getElementById('rrBadge');\n  if (b)   b.textContent   = n;\n  if (rrB) {\n    rrB.textContent = n;\n    rrB.style.display = n > 0 ? '' : 'none';\n  }\n  _updateStorageInfo();\n}\n\n/* Compute payload size as % of JSONBin 1MB cap — shown in versions sidebar footer. */\nfunction _updateStorageInfo() {\n  const info = document.getElementById('vsbStorageInfo');\n  if (!info) return;\n  let totalKB;\n  try {\n    // Measure raw payload WITHOUT trimming — this display tells the user\n    // their actual data size, including the parts auto-trim would remove\n    // on the next save. Useful for \"do I need to clean up?\" visibility.\n    const body = JSON.stringify({ appData: data, versions });\n    totalKB = Math.round(body.length / 1024);\n  } catch (e) { totalKB = 0; }\n  // JSONBin free tier = 100KB per record. Show usage as % of that.\n  const limitPct = Math.min(100, Math.round((totalKB / 100) * 100));\n  const colour = limitPct > 90 ? 'var(--prio-c)' : limitPct > 75 ? 'var(--prog-c)' : 'rgba(255,255,255,0.5)';\n  info.innerHTML = `<span style=\"color:${colour}\">Storage: ${totalKB}KB / 100KB (${limitPct}%)<\u002Fspan>`;\n}\n\n/* ── SIDEBAR TOGGLE ─────────────────────────────────────── */\nfunction toggleSidebar() {\n  _sidebarOpen = !_sidebarOpen;\n  document.getElementById('vSidebar').classList.toggle('open', _sidebarOpen);\n  document.getElementById('mainWrap').classList.toggle('sb-open', _sidebarOpen);\n  const sbBtn = document.getElementById('sbToggleBtn');\n  if (sbBtn) sbBtn.classList.toggle('active', _sidebarOpen);\n  const rrBtn = document.getElementById('rrVersionsBtn');\n  if (rrBtn) rrBtn.classList.toggle('lock-active', _sidebarOpen);\n}\n\n/* ── EXPORT / IMPORT include versions ───────────────────── */\nfunction downloadJSON() {\n  // Strip per-session state from the export so it's a clean portable backup.\n  // The lock encodes \"userId X is editing right now\" — meaningless on another\n  // browser. Tombstones are recently-deleted IDs to suppress on sync — also\n  // meaningless on a fresh deployment. Both would cause confusing behavior\n  // on import (instant read-only mode, silent task deletion) so we strip them.\n  const slim = JSON.parse(JSON.stringify(data));\n  delete slim.globalLock;\n  delete slim._tombstones;\n\n  // Snapshot metadata — useful for traceability when sharing the file\n  const meta = {\n    exportedAt:       Date.now(),\n    exportedBy:       getCurrentUser(),\n    exportedFromBin:  BIN_ID,\n    schemaVersion:    SYNC_SCHEMA_VERSION,\n    appVersion:       'da-tracker-v4',\n    counts: {\n      engineers: slim.engineers ? slim.engineers.length : 0,\n      tasks:     slim.tasks ? slim.tasks.length : 0,\n      versions:  versions.length,\n    },\n  };\n\n  const blob = new Blob([JSON.stringify({ meta, data: slim, versions }, null, 2)], { type:'application/json' });\n  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);\n  a.download = `da_tracker_${fmtDate(Date.now()).replace(/\\//g,'-')}.json`; a.click();\n  URL.revokeObjectURL(a.href);\n  toast(`Backup downloaded — ${meta.counts.tasks} tasks, ${meta.counts.engineers} engineers, ${meta.counts.versions} snapshots`, 'success');\n}\n\n/* ══ INIT ════════════════════════════════════════════════════ */\n\n// Hard safety net: under no circumstances let the loading overlay\n// stay up longer than 8 seconds. If this fires, something in the\n// init sequence threw and `hideLoading()` was never reached —\n// without this, the overlay (z-index 9000) would intercept every\n// click and make modals appear \"frozen\" even though they rendered.\nsetTimeout(() => {\n  const el = document.getElementById('loadingOverlay');\n  if (el) {\n    console.warn('Loading overlay safety-net fired at 8s — init may have errored.');\n    el.remove();\n  }\n}, 8000);\n\n(async () => {\n  try {\n    // Apply saved theme before load to avoid flash\n    applyTheme(localStorage.getItem('ob_theme') || 'light');\n\n    // FIRST: render with locally-cached data (already hydrated from\n    // localStorage at script-parse time). This is the critical step —\n    // user sees their last-known state immediately, never blank.\n    migrateData();\n    renderAll();\n    renderVersionSidebar();\n    updateSbBadge();\n    renderUserBadge();\n    renderLockButton();\n\n    // THEN: try to fetch cloud and merge any newer remote changes on top.\n    // If cloud fetch is slow or fails, the user already has the cached\n    // view — they aren't blocked.\n    await loadFromCloud();\n\n    // Lock policy on page reload:\n    //   - If WE hold the lock and heartbeat is FRESH (<2 min) → user is\n    //     genuinely mid-session in another tab; resume heartbeat.\n    //   - If WE hold the lock and heartbeat is STALE (≥2 min) → we left it\n    //     dangling from a previous session. Release it on the user's behalf\n    //     so they don't auto-broadcast \"I'm editing\" without consent.\n    //   - If someone ELSE holds the lock → leave alone; renderLockButton\n    //     will show their state.\n    const STALE_LOCK_MS = 2 * 60 * 1000;\n    if (data.globalLock && data.globalLock.userId === getUserId()) {\n      const age = Date.now() - (data.globalLock.heartbeatTs || 0);\n      if (age < STALE_LOCK_MS) {\n        // Active session — keep going, but DON'T bump heartbeatTs so we\n        // don't churn the cloud record on every reload.\n        startLockHeartbeat();\n      } else {\n        // Stale — clean up so we don't silently broadcast presence\n        console.info('Releasing stale lock from previous session (age:', Math.round(age/1000), 's).');\n        data.globalLock = null;\n        scheduleSave(false);\n      }\n    }\n\n    renderAll();\n    renderVersionSidebar();\n    updateSbBadge();\n    renderUserBadge();\n    renderLockButton();\n  } catch (err) {\n    console.error('Init failed:', err);\n    toast(`Init error: ${err.message || err}`, 'error');\n  } finally {\n    // ALWAYS hide the loading overlay, even if rendering threw — otherwise\n    // the user is stuck behind a 92%-opaque white wash that blocks all input.\n    hideLoading();\n  }\n\n  // Show name entry modal on first visit. We require a name before any edits\n  // so the lock + changelog attribution works. No delay — gate before any interaction.\n  if (!localStorage.getItem(LS_USER_NAME)) {\n    showNameModal();\n  }\n})();\n\nfunction showNameModal() {\n  const modal = document.getElementById('nameModal');\n  if (!modal) return;\n  modal.classList.add('open');\n  // Focus the input for instant typing\n  setTimeout(() => {\n    const input = document.getElementById('nm-name');\n    if (input) input.focus();\n  }, 100);\n}\n\nfunction submitNameModal() {\n  const input = document.getElementById('nm-name');\n  if (!input) return;\n  const name = (input.value || '').trim().slice(0, 40);\n  if (!name) {\n    input.style.borderColor = 'var(--hold-c)';\n    input.focus();\n    return;\n  }\n  setCurrentUser(name);\n  document.getElementById('nameModal').classList.remove('open');\n  toast(`Welcome, ${name}!`, 'success');\n}\n\n// Re-render chart on window resize\nwindow.addEventListener('resize', () => {\n  renderUtilChart();\n});\n\n/* ══ CHANGELOG RENDERING ════════════════════════════════════ */\nfunction renderUserBadge() {\n  const el = document.getElementById('cl-user-name');\n  if (el) el.textContent = getCurrentUser();\n}\n\nfunction _entityIcon(entity) {\n  return {\n    task:      '📋',\n    engineer:  '👤',\n    reference: '🔗',\n    policy:    '📜',\n    link:      '🔗',\n    code:      '🔑',\n    system:    '⚙',\n  }[entity] || '•';\n}\nfunction _actionColor(action) {\n  return {\n    create: 'var(--done-c)',\n    update: 'var(--prog-c)',\n    delete: 'var(--hold-c)',\n    import: 'var(--wait-c)',\n    revert: 'var(--wait-c)',\n  }[action] || 'var(--gray-50)';\n}\nfunction _actionLabel(action) {\n  return {\n    create: 'Created',\n    update: 'Updated',\n    delete: 'Deleted',\n    import: 'Imported',\n    revert: 'Reverted',\n  }[action] || action;\n}\n\nfunction _relTime(ts) {\n  const diff = (Date.now() - ts) / 1000;\n  if (diff < 60) return 'just now';\n  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;\n  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;\n  if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;\n  return new Date(ts).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });\n}\nfunction _fmtValue(v) {\n  if (v === null || v === undefined || v === '') return '∅';\n  if (typeof v === 'boolean') return v ? 'yes' : 'no';\n  if (typeof v === 'string' && v.length > 60) return v.slice(0, 60) + '…';\n  return String(v);\n}\n\nfunction renderChangelog() {\n  const list = document.getElementById('cl-list');\n  if (!list) return;\n  renderUserBadge();\n\n  const entries = (data.changelog || []).slice().reverse();   // newest first\n  const q       = (document.getElementById('cl-search')?.value || '').trim().toLowerCase();\n  const fe      = document.getElementById('cl-filter-entity')?.value || '';\n  const fa      = document.getElementById('cl-filter-action')?.value || '';\n\n  const filtered = entries.filter(e => {\n    if (fe && e.entity !== fe) return false;\n    if (fa && e.action !== fa) return false;\n    if (q) {\n      const hay = (e.summary + ' ' + e.user + ' ' + (e.details ? JSON.stringify(e.details) : '')).toLowerCase();\n      if (!hay.includes(q)) return false;\n    }\n    return true;\n  });\n\n  if (!filtered.length) {\n    list.innerHTML = `<div class=\"cl-empty\">${entries.length ? 'No entries match your filters' : 'No changes logged yet'}<\u002Fdiv>`;\n    return;\n  }\n\n  // Group by day for a cleaner scan\n  const byDay = {};\n  filtered.forEach(e => {\n    const d = new Date(e.ts);\n    const key = d.toISOString().slice(0, 10);\n    if (!byDay[key]) byDay[key] = [];\n    byDay[key].push(e);\n  });\n\n  let html = '';\n  Object.keys(byDay).forEach(dayKey => {\n    const d = new Date(dayKey + 'T00:00:00');\n    const today = new Date(); today.setHours(0,0,0,0);\n    const diffDays = Math.round((today - d) / 86400000);\n    const label = diffDays === 0 ? 'Today' : diffDays === 1 ? 'Yesterday'\n                : d.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });\n    html += `<div class=\"cl-day\"><div class=\"cl-day-label\">${label}<\u002Fdiv>`;\n    byDay[dayKey].forEach(e => {\n      const time = new Date(e.ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });\n      const detailsHtml = e.details && e.details.length\n        ? `<ul class=\"cl-details\">${e.details.map(d =>\n            `<li><b>${_esc(d.field)}:<\u002Fb> <span class=\"cl-old\">${_esc(_fmtValue(d.old))}<\u002Fspan> <span class=\"cl-arrow\">→<\u002Fspan> <span class=\"cl-new\">${_esc(_fmtValue(d.new))}<\u002Fspan><\u002Fli>`\n          ).join('')}<\u002Ful>`\n        : '';\n      html += `\n        <div class=\"cl-entry\">\n          <div class=\"cl-icon\">${_entityIcon(e.entity)}<\u002Fdiv>\n          <div class=\"cl-body\">\n            <div class=\"cl-summary\">\n              <span class=\"cl-action\" style=\"color:${_actionColor(e.action)}\">${_actionLabel(e.action)}<\u002Fspan>\n              <span class=\"cl-summary-text\">${_esc(e.summary || '')}<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"cl-meta\">\n              <span class=\"cl-user-name\">${_esc(e.user || 'Unknown')}<\u002Fspan>\n              <span class=\"cl-sep\">·<\u002Fspan>\n              <span class=\"cl-rel\">${_relTime(e.ts)}<\u002Fspan>\n              <span class=\"cl-sep\">·<\u002Fspan>\n              <span class=\"cl-time\">${time}<\u002Fspan>\n            <\u002Fdiv>\n            ${detailsHtml}\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n    });\n    html += '<\u002Fdiv>';\n  });\n  list.innerHTML = html;\n}\n\nfunction exportChangelogCsv() {\n  const rows = [['Timestamp', 'User', 'Entity', 'Action', 'Summary', 'Details']];\n  (data.changelog || []).forEach(e => {\n    const detailsStr = e.details ? e.details.map(d => `${d.field}:
